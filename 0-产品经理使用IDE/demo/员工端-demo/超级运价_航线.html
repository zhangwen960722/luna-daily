<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>航线 & 船期 - 超级运价</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
<script src="https://unpkg.com/element-plus"></script>
<style>
:root{--el-color-primary:#2DA44E;--bg:#F0F2F5;--card-bg:#fff;--text:#303133;--text-secondary:#909399}
*{box-sizing:border-box}
body{margin:0;padding:16px;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);font-size:14px;line-height:1.5}
.top-nav{display:none}
.top-nav .logo{font-weight:700;font-size:16px;color:var(--el-color-primary)}
.top-nav .breadcrumb{font-size:13px;color:var(--text-secondary)}
.top-nav .breadcrumb span{color:var(--text)}
.page{padding:16px 20px;max-width:1400px;margin:0 auto}
.page-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.page-hd-left h2{margin:0;font-size:18px;font-weight:600}
.page-hd-left .subtitle{margin-top:4px;font-size:13px;color:var(--text-secondary)}
.page-hd-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.card{background:var(--card-bg);border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);padding:20px;margin-bottom:16px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.card-header h3{margin:0;font-size:15px;font-weight:600}
.filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.el-table th{background:#FAFAFA!important;color:#606266;font-weight:600;font-size:13px}
.el-table td{font-size:13px}
.empty-state{text-align:center;padding:48px 20px;color:var(--text-secondary)}
.empty-state p{margin:8px 0}
.is-readonly{pointer-events:none;opacity:0.7}
</style>
</head>
<body>
<div id="app">
  <div class="page" style="padding: 0; margin: 0; max-width: none;">
    <div class="card" style="padding:0; margin-bottom: 0;">
      <el-tabs v-model="activeTab" style="padding:0 20px">
        <!-- Tab 1: 航线管理 -->
        <el-tab-pane label="航线管理" name="route">
          <div style="display:flex;justify-content:space-between;align-items:center;margin:12px 0">
            <h3 style="margin:0;font-size:15px;font-weight:600">航线列表</h3>
            <el-button type="primary" @click="openAddRoute">新增航线</el-button>
          </div>
          <el-table :data="routes" border stripe>
            <el-table-column prop="code" label="航线代码" min-width="130"></el-table-column>
            <el-table-column label="出发港" min-width="160"><template #default="s">{{s.row.originName}}（{{s.row.originCode}}）</template></el-table-column>
            <el-table-column label="目的港" min-width="160"><template #default="s">{{s.row.destName}}（{{s.row.destCode}}）</template></el-table-column>
            <el-table-column prop="supplier" label="船司" min-width="120"></el-table-column>
            <el-table-column prop="estDays" label="预计运输天数" min-width="110"></el-table-column>
            <el-table-column label="关联渠道" min-width="200"><template #default="s"><el-tag v-for="c in s.row.channels" :key="c" size="small" style="margin-right:4px">{{c}}</el-tag></template></el-table-column>
            <el-table-column label="状态" width="80" align="center"><template #default="s"><el-tag :type="s.row.status==='正常'?'success':'danger'" size="small">{{ s.row.status }}</el-tag></template></el-table-column>
            <el-table-column label="操作" width="160" fixed="right" align="center">
              <template #default="s">
                <el-button size="small" @click="openEditRoute(s.row,s.$index)">编辑</el-button>
                <el-button size="small" :type="s.row.status==='正常'?'warning':''" @click="toggleRouteStatus(s.row,s.$index)">{{ s.row.status==='正常'?'禁用':'启用' }}</el-button>
              </template>
            </el-table-column>
          </el-table>
        </el-tab-pane>

        <!-- Tab 2: 船期录入 -->
        <el-tab-pane label="船期录入" name="sailing">
          <div style="display:flex;justify-content:space-between;align-items:center;margin:12px 0">
            <div style="display:flex;align-items:center;gap:12px">
              <h3 style="margin:0;font-size:15px;font-weight:600">船期录入</h3>
              <el-select v-model="selectedBatchName" placeholder="选择批次" style="width:260px" @change="onSailingBatchChange">
                <el-option v-for="b in batches" :key="b.name" :label="b.name+' ('+b.status+')'" :value="b.name"></el-option>
              </el-select>
            </div>
            <div style="display:flex;gap:8px">
              <a href="超级运价_工作台.html" style="font-size:12px;color:#2DA44E;text-decoration:none;line-height:32px">→ 前往运价工作台</a>
              <template v-if="selectedBatchName">
                <el-button size="small" @click="showImportDialog=true">导入船期</el-button>
                <el-button size="small" type="primary" @click="openAddSailing">新增船期</el-button>
              </template>
            </div>
          </div>
          <div v-if="!selectedBatchName" class="empty-state">
            <p>请选择一个批次开始录入船期</p>
            <p style="font-size:12px;color:#909399">提示：新建批次请前往 <a href="超级运价_工作台.html" style="color:#2DA44E">运价更新工作台</a></p>
          </div>
          <el-table v-else :data="sailingList" border stripe>
            <el-table-column prop="routeName" label="航线" min-width="200"></el-table-column>
            <el-table-column label="截单时间（按本地仓）" min-width="240"><template #default="s2"><el-tag v-for="(d,wh) in s2.row.cutoffTimes" :key="wh" size="small" style="margin-right:4px;margin-bottom:2px">{{wh}}: {{d}}</el-tag></template></el-table-column>
            <el-table-column prop="etd" label="ETD" width="90"></el-table-column>
            <el-table-column prop="eta" label="ETA" width="90"></el-table-column>
            <el-table-column prop="voyageDays" label="航程" width="70"></el-table-column>
            <el-table-column prop="fastestPickup" label="最快提取" width="90"></el-table-column>
            <el-table-column label="操作" width="80" fixed="right"><template #default="s2"><el-button size="small" @click="openEditSailing(s2.row,s2.$index)">编辑</el-button></template></el-table-column>
          </el-table>
        </el-tab-pane>
      </el-tabs>
    </div>
  </div>

  <!-- 航线弹窗 -->
  <el-dialog v-model="showRouteDialog" :title="(editRouteMode&&routeReadonly)?'查看航线（已禁用）':(editRouteMode?'编辑航线':'新增航线')" width="550px" :close-on-click-modal="false">
    <div :class="{'is-readonly':routeReadonly}">
    <el-form :model="routeForm" label-width="110px">
      <el-form-item label="航线代码" required><el-input v-model="routeForm.code" placeholder="如 CLX"></el-input></el-form-item>
      <el-form-item label="船司" required><el-select v-model="routeForm.supplier" filterable style="width:100%"><el-option label="maston" value="maston"></el-option></el-select></el-form-item>
      <el-row :gutter="16"><el-col :span="12"><el-form-item label="出发港名称" required><el-select v-model="routeForm.originName" filterable style="width:100%" @change="onOriginNameChange"><el-option v-for="p in allPorts" :key="p.code" :label="p.name" :value="p.name"></el-option></el-select></el-form-item></el-col><el-col :span="12"><el-form-item label="出发港代码" required><el-input v-model="routeForm.originCode" placeholder="选名称后自动带出" disabled></el-input></el-form-item></el-col></el-row>
      <el-row :gutter="16"><el-col :span="12"><el-form-item label="目的港名称" required><el-select v-model="routeForm.destName" filterable style="width:100%" @change="onDestNameChange"><el-option v-for="p in allPorts" :key="p.code" :label="p.name" :value="p.name"></el-option></el-select></el-form-item></el-col><el-col :span="12"><el-form-item label="目的港代码" required><el-input v-model="routeForm.destCode" placeholder="选名称后自动带出" disabled></el-input></el-form-item></el-col></el-row>
      <el-form-item label="预计运输天数" required><el-input-number v-model="routeForm.estDays" :min="1" :max="60"></el-input-number></el-form-item>
      <el-form-item label="关联渠道"><el-select v-model="routeForm.channels" multiple filterable><el-option label="美森360" value="美森360"></el-option><el-option label="美森432" value="美森432"></el-option><el-option label="快船600" value="快船600"></el-option></el-select></el-form-item>
    </el-form>
    </div>
    <template #footer><el-button @click="showRouteDialog=false">{{ routeReadonly ? '关闭' : '取消' }}</el-button><el-button v-if="!routeReadonly" type="primary" @click="saveRoute">保存</el-button></template>
  </el-dialog>

  <!-- 船期新增/编辑弹窗 -->
  <el-dialog v-model="showSailingFormDialog" :title="editSailingMode?'编辑船期':'新增船期'" width="600px" :close-on-click-modal="false">
    <el-form :model="sailingForm" label-width="110px">
      <el-form-item label="航线" required><el-select v-model="sailingForm.routeName"><el-option v-for="r in routes" :key="r.code" :label="r.code+' '+r.originName+'→'+r.destName" :value="r.code+' '+r.originName+'→'+r.destName+'('+r.supplier+')'"></el-option></el-select></el-form-item>
      <el-form-item label="截单时间" required>
        <div v-for="(p,i) in sailingForm.cutoffPairs" :key="i" style="display:flex;gap:8px;margin-bottom:6px">
          <el-select v-model="p.wh" placeholder="选择本地仓" style="width:150px" filterable><el-option v-for="w in availableWarehouses(i)" :key="w" :label="w" :value="w"></el-option></el-select>
          <el-date-picker v-model="p.date" type="date" format="M月D日" value-format="M月D日" placeholder="截单日期" style="flex:1"></el-date-picker>
          <el-button size="small" type="danger" circle @click="removeCutoffPair(i)" :disabled="sailingForm.cutoffPairs.length<=1">✕</el-button>
        </div>
        <el-button size="small" text type="primary" @click="addCutoffPair">+ 添加仓库截单时间</el-button>
      </el-form-item>
      <el-row :gutter="16"><el-col :span="12"><el-form-item label="ETD" required><el-date-picker v-model="sailingForm.etd" type="date" format="M月D日" value-format="M月D日" style="width:100%"></el-date-picker></el-form-item></el-col><el-col :span="12"><el-form-item label="ETA" required><el-date-picker v-model="sailingForm.eta" type="date" format="M月D日" value-format="M月D日" style="width:100%"></el-date-picker></el-form-item></el-col></el-row>
      <el-row :gutter="16"><el-col :span="12"><el-form-item label="航程" required><el-input-number v-model="sailingForm.voyageDays" :min="1" :max="60" style="width:100%"></el-input-number></el-form-item></el-col><el-col :span="12"><el-form-item label="最快提取"><el-date-picker v-model="sailingForm.fastestPickup" type="date" format="M月D日" value-format="M月D日" style="width:100%"></el-date-picker></el-form-item></el-col></el-row>
    </el-form>
    <template #footer><el-button @click="showSailingFormDialog=false">取消</el-button><el-button type="primary" @click="saveSailing">保存</el-button></template>
  </el-dialog>

  <!-- 导入船期 -->
  <el-dialog v-model="showImportDialog" title="导入船期" width="500px" :close-on-click-modal="false">
    <div style="margin-bottom:16px;font-size:13px;color:var(--text-secondary)">下载模板后按格式填写，上传 Excel 批量导入船期数据</div>
    <el-form label-width="110px">
      <el-form-item label="周批次"><el-input :model-value="selectedBatchName" disabled></el-input></el-form-item>
      <el-form-item label="上传文件" required>
        <el-upload drag action="#" :auto-upload="false" :limit="1" accept=".xlsx,.xls" style="width:100%">
          <div style="padding:20px 0"><div style="font-size:32px;margin-bottom:8px">📁</div><div style="font-size:13px;color:var(--text-secondary)">将文件拖到此处，或<em style="color:var(--el-color-primary)">点击上传</em></div><div style="font-size:12px;color:#C0C4CC;margin-top:4px">支持 .xlsx / .xls 格式</div></div>
        </el-upload>
      </el-form-item>
      <el-form-item>
        <el-button text type="primary" size="small">📥 下载导入模板</el-button>
      </el-form-item>
    </el-form>
    <template #footer><el-button @click="showImportDialog=false">取消</el-button><el-button type="primary" @click="importSailing">开始导入</el-button></template>
  </el-dialog>
</div>
<script>
function parseChDate(str){if(!str)return null;var m=str.match(/(\d+)月(\d+)日/);if(m)return new Date(2026,parseInt(m[1])-1,parseInt(m[2]));return null}
var LOCAL_WAREHOUSES=['广州仓','汕头仓','义乌仓','泉州仓','厦门仓','深圳仓'];
(function(){var allPorts=[{name:'深圳港',code:'szg'},{name:'上海港',code:'shg'},{name:'盐田港',code:'ytg'},{name:'南沙港',code:'nsg'},{name:'长滩港',code:'ctg'},{name:'洛杉矶港',code:'lsjg'},{name:'杭州',code:'hz'},{name:'北京',code:'bj'},{name:'广州白云',code:'gzby'},{name:'孟菲斯',code:'mem'},{name:'路易斯维尔',code:'sdf'}];var batches=[{name:'2026-W05（1/26-2/1）',week:'2026-W05',start:'2026-01-26',end:'2026-02-01',status:'当前',exchangeRate:'7.2500'},{name:'2026-W04（1/19-1/25）',week:'2026-W04',start:'2026-01-19',end:'2026-01-25',status:'已过期',exchangeRate:'7.1800'},{name:'2026-W06（2/2-2/8）',week:'2026-W06',start:'2026-02-02',end:'2026-02-08',status:'预告',exchangeRate:'7.2500'}];var curBatch=batches.find(function(b){return b.status==='当前'});var app=Vue.createApp({data:function(){return{allPorts:allPorts,activeTab:'route',showRouteDialog:false,editRouteMode:false,editRouteIndex:-1,routeReadonly:false,showSailingFormDialog:false,editSailingMode:false,editSailingIndex:-1,selectedBatchName:curBatch?curBatch.name:'',showImportDialog:false,routes:[{code:'CLX',originCode:'shg',originName:'上海港',destCode:'ctg',destName:'长滩港',supplier:'maston',estDays:'11',status:'正常',channels:['美森360']},{code:'MAX',originCode:'shg',originName:'上海港',destCode:'ctg',destName:'长滩港',supplier:'maston',estDays:'11',status:'正常',channels:['美森432']},{code:'SEA/SEA3',originCode:'ytg',originName:'盐田港',destCode:'ctg',destName:'长滩港',supplier:'maston',estDays:'17',status:'正常',channels:['快船600']}],batches:batches,sailingData:{'2026-W05（1/26-2/1）':[{routeName:'CLX 上海→长滩(MATSON)',cutoffTimes:{'广州仓':'2月1日','汕头仓':'2月1日','义乌仓':'1月30日'},etd:'2月5日',eta:'2月16日',voyageDays:'11天',fastestPickup:'2月17日'},{routeName:'MAX 上海→长滩(MATSON)',cutoffTimes:{'广州仓':'2月2日','汕头仓':'2月2日'},etd:'2月6日',eta:'2月17日',voyageDays:'11天',fastestPickup:'2月18日'},{routeName:'SEA/SEA3 盐田→长滩(COSCO)',cutoffTimes:{'广州仓':'1月31日','汕头仓':'1月31日'},etd:'2月4日',eta:'2月15日',voyageDays:'11天',fastestPickup:'2月16日'}],'2026-W04（1/19-1/25）':[{routeName:'CLX 上海→长滩(MATSON)',cutoffTimes:{'广州仓':'1月25日','汕头仓':'1月25日'},etd:'1月29日',eta:'2月9日',voyageDays:'11天',fastestPickup:'2月10日'}],'2026-W06（2/2-2/8）':[]},routeForm:{code:'',originCode:'',originName:'',destCode:'',destName:'',supplier:'',estDays:11,channels:[]},sailingForm:{routeName:'',cutoffPairs:[{wh:'',date:null}],etd:null,eta:null,voyageDays:11,fastestPickup:null}}},computed:{sailingList:function(){return this.sailingData[this.selectedBatchName]||[]}},methods:{onSailingBatchChange:function(){},openAddRoute:function(){this.editRouteMode=false;this.editRouteIndex=-1;this.routeReadonly=false;this.routeForm={code:'',originCode:'',originName:'',destCode:'',destName:'',supplier:'',estDays:11,channels:[]};this.showRouteDialog=true},openEditRoute:function(row,idx){this.editRouteMode=true;this.editRouteIndex=idx;this.routeReadonly=row.status!=='正常';this.routeForm={code:row.code,originCode:row.originCode,originName:row.originName,destCode:row.destCode,destName:row.destName,supplier:row.supplier,estDays:parseInt(row.estDays),channels:row.channels.slice()};this.showRouteDialog=true},onOriginNameChange:function(){var self=this;var p=this.allPorts.find(function(p){return p.name===self.routeForm.originName});this.routeForm.originCode=p?p.code:''},onDestNameChange:function(){var self=this;var p=this.allPorts.find(function(p){return p.name===self.routeForm.destName});this.routeForm.destCode=p?p.code:''},saveRoute:function(){if(!this.routeForm.code){ElementPlus.ElMessage.warning('请输入航线代码');return}if(!this.routeForm.originCode){ElementPlus.ElMessage.warning('请选择出发港名称');return}if(!this.routeForm.destCode){ElementPlus.ElMessage.warning('请选择目的港名称');return}if(!this.routeForm.supplier){ElementPlus.ElMessage.warning('请选择船司');return}if(this.routeForm.originCode===this.routeForm.destCode){ElementPlus.ElMessage.warning('出发港和目的港不能相同');return}var row={code:this.routeForm.code,originCode:this.routeForm.originCode,originName:this.routeForm.originName,destCode:this.routeForm.destCode,destName:this.routeForm.destName,supplier:this.routeForm.supplier,estDays:String(this.routeForm.estDays),status:this.editRouteMode?this.routes[this.editRouteIndex].status:'正常',channels:this.routeForm.channels};if(this.editRouteMode){this.routes.splice(this.editRouteIndex,1,row);ElementPlus.ElMessage.success('航线编辑成功')}else{this.routes.push(row);ElementPlus.ElMessage.success('航线新增成功')}this.showRouteDialog=false},toggleRouteStatus:function(row,idx){var self=this;var act=row.status==='正常'?'禁用':'启用';var msg=act==='禁用'?'确定禁用航线【'+row.code+'】？禁用后关联渠道和船期不受影响。':'确定启用航线【'+row.code+'】？';ElementPlus.ElMessageBox.confirm(msg,'确认'+act,{confirmButtonText:'确定',cancelButtonText:'取消',type:'warning'}).then(function(){row.status=row.status==='正常'?'已冻结':'正常';self.routes.splice(idx,1,row);ElementPlus.ElMessage.success('已'+act)	}).catch(function(){})},availableWarehouses:function(ci){var used=[];this.sailingForm.cutoffPairs.forEach(function(p,i){if(i!==ci&&p.wh)used.push(p.wh)});return LOCAL_WAREHOUSES.filter(function(w){return used.indexOf(w)===-1})},addCutoffPair:function(){this.sailingForm.cutoffPairs.push({wh:'',date:null})},removeCutoffPair:function(i){this.sailingForm.cutoffPairs.splice(i,1)},openAddSailing:function(){this.editSailingMode=false;this.editSailingIndex=-1;this.sailingForm={routeName:'',cutoffPairs:[{wh:'',date:null}],etd:null,eta:null,voyageDays:11,fastestPickup:null};this.showSailingFormDialog=true},openEditSailing:function(row,idx){this.editSailingMode=true;this.editSailingIndex=idx;var pairs=[];for(var wh in row.cutoffTimes){if(row.cutoffTimes.hasOwnProperty(wh))pairs.push({wh:wh,date:parseChDate(row.cutoffTimes[wh])})}if(pairs.length===0)pairs.push({wh:'',date:null});this.sailingForm={routeName:row.routeName,cutoffPairs:pairs,etd:parseChDate(row.etd),eta:parseChDate(row.eta),voyageDays:parseInt(row.voyageDays)||11,fastestPickup:parseChDate(row.fastestPickup)};this.showSailingFormDialog=true},saveSailing:function(){if(!this.sailingForm.routeName){ElementPlus.ElMessage.warning('请选择航线');return}var ct={},he=false;this.sailingForm.cutoffPairs.forEach(function(p){if(!p.wh){he=true;return}if(!p.date){he=true;return}ct[p.wh]=p.date});if(he){ElementPlus.ElMessage.warning('请完善截单时间');return}if(!this.sailingForm.etd){ElementPlus.ElMessage.warning('请选择ETD');return}if(!this.sailingForm.eta){ElementPlus.ElMessage.warning('请选择ETA');return}var row={routeName:this.sailingForm.routeName,cutoffTimes:ct,etd:this.sailingForm.etd,eta:this.sailingForm.eta,voyageDays:String(this.sailingForm.voyageDays)+'天',fastestPickup:this.sailingForm.fastestPickup||''};if(this.editSailingMode){this.sailingData[this.selectedBatchName].splice(this.editSailingIndex,1,row);ElementPlus.ElMessage.success('船期编辑成功')}else{this.sailingData[this.selectedBatchName].push(row);ElementPlus.ElMessage.success('船期新增成功')}this.showSailingFormDialog=false},importSailing:function(){ElementPlus.ElMessage.success('导入成功，已新增船期记录');this.showImportDialog=false}}});app.use(ElementPlus);app.mount('#app')})();
</script>
</body>
</html>
