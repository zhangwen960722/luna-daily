<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>港口管理 - 主列表</title>
    <!-- 引入 Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- 引入 Element Plus 样式 -->
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
    <!-- 引入 Element Plus 组件库 -->
    <script src="https://unpkg.com/element-plus"></script>
    <!-- 引入 Element Plus 图标 -->
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <style>
        :root {
            --el-color-primary: #2DA44E;
            --el-color-primary-light-3: #6bc083;
            --el-color-primary-light-5: #95cfa4;
            --el-color-primary-light-7: #bee5c6;
            --el-color-primary-light-8: #d3efe8;
            --el-color-primary-light-9: #e9f7ea;
            --el-color-primary-dark-2: #24833e;
        }
        body, html {
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "微软雅黑", Arial, sans-serif;
            height: 100%;
        }
        #app {
            padding: 20px;
            box-sizing: border-box;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        /* 统一卡片样式 */
        .content-card {
            background-color: #fff;
            padding: 20px;
            border-radius: 4px;
            box-shadow: 0 1px 4px rgba(0,21,41,.08);
            margin-bottom: 16px;
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            margin-bottom: 0;
        }

        /* 搜索区域样式 */
        .search-area {
            display: flex;
            gap: 16px;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        .search-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .search-item label {
            color: #606266;
            font-size: 14px;
            font-weight: 500;
        }
        
        /* 统一主列表搜索按钮样式 */
        .btn-search-primary {
            background-color: #2DA44E !important;
            border-color: #2DA44E !important;
            color: #FFFFFF !important;
            height: 32px;
        }
        .btn-search-primary:hover,
        .btn-search-primary:focus,
        .btn-search-primary:active {
            background-color: #2DA44E !important;
            border-color: #2DA44E !important;
            color: #FFFFFF !important;
            opacity: 1 !important;
            filter: none !important;
        }
        .btn-search-primary .el-icon {
            color: #FFFFFF !important;
        }
        
        .btn-search-reset {
            background-color: #FFFFFF !important;
            border-color: #DCDFE6 !important;
            color: #000000 !important;
            height: 32px;
        }
        .btn-search-reset:hover,
        .btn-search-reset:focus,
        .btn-search-reset:active {
            background-color: #E6F2FF !important;
            border-color: #DCDFE6 !important;
            color: #000000 !important;
            opacity: 1 !important;
            filter: none !important;
        }
        .btn-search-reset .el-icon {
            color: #000000 !important;
        }

        /* 操作栏与表格样式 */
        .action-bar {
            margin-bottom: 16px;
            display: flex;
            justify-content: flex-start;
            gap: 10px;
        }
        .table-container {
            flex: 1;
            overflow: hidden;
        }
        .pagination-container {
            margin-top: 16px;
            display: flex;
            justify-content: flex-end;
        }

        /* 表格首行视觉区分优化 */
        .is-readonly { pointer-events: none; opacity: 0.7; }
        .el-table th.el-table__cell {
            background-color: #FAFAFA !important;
            color: #303133;
            font-weight: 500;
        }

        /* 无障碍表单布局 (响应式标签间距) */
        .a11y-form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }
        .a11y-form-label {
            font-size: 14px;
            color: #606266;
            margin-bottom: 8px; /* 桌面端 8px 间距 */
            font-weight: 500;
            text-align: left;
            line-height: 1.2;
        }
        @media screen and (max-width: 768px) {
            .a11y-form-label {
                margin-bottom: 12px; /* 移动端 12px 间距 */
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 搜索区域 -->
        <div class="content-card">
            <div class="search-area">
                <div class="search-item">
                    <el-input v-model="searchForm.portName" placeholder="港口名称" clearable style="width: 200px;"></el-input>
                </div>
                <div class="search-item">
                    <el-input v-model="searchForm.portCode" placeholder="港口代码" clearable style="width: 200px;"></el-input>
                </div>
                <div class="search-item">
                    <el-select v-model="searchForm.type" placeholder="类型" clearable style="width: 180px;">
                        <el-option label="海港" value="海港"></el-option>
                        <el-option label="空港" value="空港"></el-option>
                    </el-select>
                </div>
                <div style="display: flex; gap: 10px;">
                    <el-button class="btn-search-primary" @click="handleSearch">
                        <el-icon style="margin-right: 4px;"><Search /></el-icon>查询
                    </el-button>
                    <el-button class="btn-search-reset" @click="resetSearch">
                        <el-icon style="margin-right: 4px;"><RefreshRight /></el-icon>重置
                    </el-button>
                </div>
                <div style="margin-left: auto;">
                    <el-button type="primary" @click="openDialog('add')">
                        <el-icon style="margin-right: 4px;"><Plus /></el-icon>新增港口
                    </el-button>
                </div>
            </div>
        </div>

        <!-- 主体内容 -->
        <div class="content-card main-content">
            <!-- 数据表格 -->
            <div class="table-container">
                <el-table 
                    :data="tableData" 
                    border 
                    style="width: 100%" 
                    height="100%">
                    <el-table-column prop="portName" label="港口名称" min-width="150" align="center"></el-table-column>
                    <el-table-column prop="portCode" label="港口代码" min-width="150" align="center"></el-table-column>
                    <el-table-column prop="country" label="国家" min-width="120" align="center"></el-table-column>
                    <el-table-column prop="type" label="类型" min-width="120" align="center">
                        <template #default="scope">
                            <el-tag :type="scope.row.type === '海港' ? 'primary' : 'warning'" effect="plain">
                                {{ scope.row.type }}
                            </el-tag>
                        </template>
                    </el-table-column>
                    <el-table-column label="状态" width="80" align="center">
                        <template #default="scope">
                            <el-tag :type="scope.row.status==='正常'?'success':'danger'" size="small">{{ scope.row.status }}</el-tag>
                        </template>
                    </el-table-column>
                    <el-table-column label="操作" width="180" align="center" fixed="right">
                        <template #default="scope">
                            <el-button link type="primary" size="small" @click="openDialog('edit', scope.row)">编辑</el-button>
                            <el-button link :type="scope.row.status==='正常'?'warning':'success'" size="small" @click="togglePortStatus(scope.row)">{{ scope.row.status==='正常'?'禁用':'启用' }}</el-button>
                        </template>
                    </el-table-column>
                </el-table>
            </div>

            <!-- 分页 -->
            <div class="pagination-container">
                <el-pagination
                    v-model:current-page="currentPage"
                    v-model:page-size="pageSize"
                    :page-sizes="[10, 20, 50, 100]"
                    layout="total, sizes, prev, pager, next, jumper"
                    :total="total">
                </el-pagination>
            </div>
        </div>

        <!-- 新增/编辑弹窗 -->
        <el-dialog
            :title="dialogType === 'add' ? '新增港口' : (isPortReadonly ? '查看港口（已禁用）' : '编辑港口')"
            v-model="dialogVisible"
            width="500px"
            destroy-on-close>
            <div :class="{'is-readonly': isPortReadonly}" style="padding: 10px 0;">
                <div class="a11y-form-group">
                    <label for="type-select" class="a11y-form-label">
                        <span style="color: #F56C6C; margin-right: 4px;">*</span>类型
                    </label>
                    <el-select 
                        id="type-select"
                        v-model="formData.type" 
                        placeholder="请选择类型"
                        style="width: 100%;"
                        @change="handleTypeChange">
                        <el-option label="海港" value="海港"></el-option>
                        <el-option label="空港" value="空港"></el-option>
                    </el-select>
                </div>

                <div class="a11y-form-group">
                    <label for="country-select" class="a11y-form-label">
                        <span style="color: #F56C6C; margin-right: 4px;">*</span>国家
                    </label>
                    <el-select 
                        id="country-select"
                        v-model="formData.country" 
                        placeholder="请选择国家"
                        filterable
                        style="width: 100%;">
                        <el-option label="中国" value="中国"></el-option>
                        <el-option label="美国" value="美国"></el-option>
                        <el-option label="英国" value="英国"></el-option>
                        <el-option label="德国" value="德国"></el-option>
                        <el-option label="日本" value="日本"></el-option>
                        <el-option label="加拿大" value="加拿大"></el-option>
                        <el-option label="澳大利亚" value="澳大利亚"></el-option>
                    </el-select>
                </div>

                <div class="a11y-form-group">
                    <label for="port-name-input" class="a11y-form-label">
                        <span style="color: #F56C6C; margin-right: 4px;">*</span>港口名称
                    </label>
                    <el-input 
                        id="port-name-input"
                        v-model="formData.portName" 
                        placeholder="请输入港口名称">
                    </el-input>
                </div>
                
                <div class="a11y-form-group">
                    <label for="port-code-input" class="a11y-form-label">
                        <span style="color: #F56C6C; margin-right: 4px;">*</span>港口代码
                    </label>
                    <el-input 
                        id="port-code-input"
                        v-model="formData.portCode" 
                        :placeholder="formData.type === '海港' ? '请输入五位港口代码' : '请输入三位港口代码'"
                        :maxlength="formData.type === '海港' ? 5 : 3"
                        show-word-limit>
                    </el-input>
                </div>
            </div>
            <template #footer>
                <span class="dialog-footer">
                    <el-button @click="dialogVisible = false">{{ isPortReadonly ? '关闭' : '返回' }}</el-button>
                    <el-button v-if="!isPortReadonly" type="primary" @click="saveData">确定</el-button>
                </span>
            </template>
        </el-dialog>
    </div>

    <script>
        const { createApp, ref, reactive } = Vue;

        const app = createApp({
            setup() {
                // 搜索表单
                const searchForm = reactive({
                    portName: '',
                    portCode: '',
                    type: ''
                });

                // 表格数据
                const tableData = ref([
                    { id: 1, portName: '深圳港', portCode: 'szg', country: '中国', type: '海港', status: '正常' },
                    { id: 2, portName: '上海港', portCode: 'shg', country: '中国', type: '海港', status: '正常' },
                    { id: 3, portName: '盐田港', portCode: 'ytg', country: '中国', type: '海港', status: '正常' },
                    { id: 4, portName: '南沙港', portCode: 'nsg', country: '中国', type: '海港', status: '正常' },
                    { id: 5, portName: '长滩港', portCode: 'ctg', country: '美国', type: '海港', status: '正常' },
                    { id: 6, portName: '洛杉矶港', portCode: 'lsjg', country: '美国', type: '海港', status: '正常' },
                    { id: 7, portName: '杭州', portCode: 'hz', country: '中国', type: '空港', status: '正常' },
                    { id: 8, portName: '北京', portCode: 'bj', country: '中国', type: '空港', status: '正常' },
                    { id: 9, portName: '广州白云', portCode: 'gzby', country: '中国', type: '空港', status: '正常' },
                    { id: 10, portName: '孟菲斯', portCode: 'mem', country: '美国', type: '空港', status: '正常' },
                    { id: 11, portName: '路易斯维尔', portCode: 'sdf', country: '美国', type: '空港', status: '正常' }
                ]);
                
                // 分页
                const currentPage = ref(1);
                const pageSize = ref(20);
                const total = ref(11);
                
                // 搜索逻辑
                const handleSearch = () => {
                    ElementPlus.ElMessage.success('执行搜索');
                };
                const resetSearch = () => {
                    searchForm.portName = '';
                    searchForm.portCode = '';
                    searchForm.type = '';
                    ElementPlus.ElMessage.success('已重置搜索条件');
                };

                // 弹窗控制
                const dialogVisible = ref(false);
                const dialogType = ref('add');
                const isPortReadonly = ref(false);
                const formData = reactive({
                    id: null,
                    portName: '',
                    portCode: '',
                    country: '',
                    type: '海港'
                });

                // 类型切换处理逻辑，清空港口代码
                const handleTypeChange = () => {
                    formData.portCode = '';
                };

                // 打开弹窗
                const openDialog = (type, row) => {
                    dialogType.value = type;
                    isPortReadonly.value = (type === 'edit' && row && row.status !== '正常');
                    if (type === 'edit' && row) {
                        formData.id = row.id;
                        formData.portName = row.portName;
                        formData.portCode = row.portCode;
                        formData.country = row.country;
                        formData.type = row.type;
                    } else {
                        formData.id = null;
                        formData.portName = '';
                        formData.portCode = '';
                        formData.country = '';
                        formData.type = '海港';
                    }
                    dialogVisible.value = true;
                };

                // 切换状态
                const togglePortStatus = (row) => {
                    var act = row.status === '正常' ? '禁用' : '启用';
                    var msg = act === '禁用' ? '确定禁用港口【'+row.portName+'】？' : '确定启用港口【'+row.portName+'】？';
                    ElementPlus.ElMessageBox.confirm(msg, '确认'+act, {confirmButtonText:'确定',cancelButtonText:'取消',type:'warning'}).then(function(){
                        row.status = row.status === '正常' ? '已冻结' : '正常';
                        ElementPlus.ElMessage.success('已'+act);
                    }).catch(function(){});
                };

                // 保存数据
                const saveData = () => {
                    if (!formData.type) {
                        ElementPlus.ElMessage.warning('请选择类型');
                        return;
                    }
                    if (!formData.portName.trim()) {
                        ElementPlus.ElMessage.warning('请输入港口名称');
                        return;
                    }
                    if (!formData.portCode.trim()) {
                        ElementPlus.ElMessage.warning('请输入港口代码');
                        return;
                    }
                    // 港口代码长度校验
                    if (formData.type === '海港' && formData.portCode.trim().length !== 5) {
                        ElementPlus.ElMessage.warning('海港代码必须为5位');
                        return;
                    }
                    if (formData.type === '空港' && formData.portCode.trim().length !== 3) {
                        ElementPlus.ElMessage.warning('空港代码必须为3位');
                        return;
                    }
                    if (!formData.country.trim()) {
                        ElementPlus.ElMessage.warning('请选择国家');
                        return;
                    }
                    
                    ElementPlus.ElMessage.success(dialogType.value === 'add' ? '新增成功' : '编辑成功');
                    dialogVisible.value = false;
                };

                return {
                    searchForm,
                    tableData,
                    currentPage,
                    pageSize,
                    total,
                    handleSearch,
                    resetSearch,
                    dialogVisible,
                    dialogType,
                    isPortReadonly,
                    formData,
                    openDialog,
                    togglePortStatus,
                    saveData
                };
            }
        });

        // 注册所有 Element Plus 图标
        if (window.ElementPlusIconsVue) {
            for (const [key, component] of Object.entries(window.ElementPlusIconsVue)) {
                app.component(key, component);
            }
        }

        app.use(ElementPlus);
        app.mount('#app');
    </script>
</body>
</html>
