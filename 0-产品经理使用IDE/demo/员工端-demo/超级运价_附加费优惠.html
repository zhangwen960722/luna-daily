<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>附加费优惠 - 超级运价</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
<script src="https://unpkg.com/element-plus"></script>
<style>
:root{--el-color-primary:#2DA44E;--bg:#F0F2F5;--card-bg:#fff;--text:#303133;--text-secondary:#909399}
*{box-sizing:border-box}
body{margin:0;padding:16px;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);font-size:14px;line-height:1.5}
.top-nav{display:none}
.top-nav .logo{font-weight:700;font-size:16px;color:var(--el-color-primary)}
.top-nav .breadcrumb{font-size:13px;color:var(--text-secondary)}
.top-nav .breadcrumb span{color:var(--text)}
.page{padding:16px 20px;max-width:1400px;margin:0 auto}
.page-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.page-hd-left h2{margin:0;font-size:18px;font-weight:600}
.page-hd-left .subtitle{margin-top:4px;font-size:13px;color:var(--text-secondary)}
.page-hd-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.card{background:var(--card-bg);border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);padding:20px;margin-bottom:16px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.card-header h3{margin:0;font-size:15px;font-weight:600}
.filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.el-table th{background:#FAFAFA!important;color:#606266;font-weight:600;font-size:13px}
.el-table td{font-size:13px}
.empty-state{text-align:center;padding:48px 20px;color:var(--text-secondary)}
.empty-state p{margin:8px 0}
</style>
</head>
<body>
<div id="app">
  <div class="top-nav">
    <div><span class="logo">飞点 TMS</span><span class="breadcrumb"> / 头程管理 / <span>附加费优惠</span></span></div>
    <span style="font-size:12px;color:var(--text-secondary)">超级运价 v1.0</span>
  </div>
  <div class="page" style="padding: 0; margin: 0; max-width: none;">
    
      <div class="page-hd-right">
        <el-button type="primary" @click="openAdd">新增优惠规则</el-button>
      </div>
    </div>
    <div class="card" style="margin-bottom: 0;">

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h3 style="margin:0;font-size:15px;font-weight:600">附加费优惠</h3>
        <div style="display:flex;align-items:center;gap:8px;">
          <el-button type="primary" @click="openAdd">新增优惠规则</el-button>
        </div>
      </div>
      <el-table :data="list" border stripe>
        <el-table-column prop="name" label="规则名称" min-width="220"></el-table-column>
        <el-table-column prop="surchargeRule" label="目标附加费规则" min-width="150"></el-table-column>
        <el-table-column prop="targetTypeLabel" label="对象类型" width="90"></el-table-column>
        <el-table-column prop="targetName" label="目标" min-width="130"></el-table-column>
        <el-table-column prop="modeLabel" label="优惠方式" width="90"></el-table-column>
        <el-table-column prop="val" label="优惠值" min-width="100"></el-table-column>
        <el-table-column prop="validityLabel" label="有效期" min-width="140"></el-table-column>
        <el-table-column label="操作" width="80" fixed="right">
          <template #default="s"><el-button size="small" @click="openEdit(s.row, s.$index)">编辑</el-button></template>
        </el-table-column>
      </el-table>
    </div>
  </div>
  <el-dialog v-model="showDialog" :title="editMode ? '编辑附加费优惠规则' : '新增附加费优惠规则'" width="550px" :close-on-click-modal="false">
    <el-form :model="form" label-width="130px">
      <el-form-item label="规则名称" required><el-input v-model="form.name" placeholder="VIP-粉末附加费减0.5元"></el-input></el-form-item>
      <el-form-item label="目标附加费规则" required><el-select v-model="form.surchargeRuleId"><el-option label="粉末品名加收" value="R001"></el-option><el-option label="商业地址加收" value="R003"></el-option></el-select></el-form-item>
      <el-form-item label="优惠对象" required><el-select v-model="form.targetType"><el-option label="客户等级" value="level"></el-option><el-option label="客户特批" value="customer"></el-option></el-select></el-form-item>
      <el-form-item label="目标客户等级" required v-if="form.targetType==='level'"><el-select v-model="form.targetLevel"><el-option label="VIP" value="VIP"></el-option><el-option label="普通" value="NORMAL"></el-option></el-select></el-form-item>
      <el-form-item label="目标客户" required v-if="form.targetType==='customer'"><el-input v-model="form.targetCustomer" placeholder="客户名称"></el-input></el-form-item>
      <el-form-item label="优惠方式" required><el-select v-model="form.mode"><el-option label="折扣率" value="rate"></el-option><el-option label="固定减免" value="fixed"></el-option></el-select></el-form-item>
      <el-form-item v-if="form.mode==='rate'" label="折扣率"><el-input-number v-model="form.val" :min="0.0001" :max="9.9999" :precision="4"></el-input-number></el-form-item>
      <el-form-item v-if="form.mode==='fixed'" label="减免金额（元）"><el-input-number v-model="form.val" :min="0.0001" :precision="4"></el-input-number></el-form-item>
      <el-form-item label="有效期"><el-select v-model="form.validity"><el-option label="永久有效" value="permanent"></el-option><el-option label="固定期限" value="period"></el-option><el-option label="单次有效" value="single"></el-option></el-select></el-form-item>
      <template v-if="form.validity==='period'">
        <el-row :gutter="16"><el-col :span="12"><el-form-item label="有效起始" required><el-date-picker v-model="form.validFrom" type="date" value-format="YYYY-MM-DD" style="width:100%"></el-date-picker></el-form-item></el-col><el-col :span="12"><el-form-item label="有效结束" required><el-date-picker v-model="form.validTo" type="date" value-format="YYYY-MM-DD" style="width:100%"></el-date-picker></el-form-item></el-col></el-row>
      </template>
    </el-form>
    <template #footer><el-button @click="showDialog=false">取消</el-button><el-button type="primary" @click="save">保存</el-button></template>
  </el-dialog>
</div>
<script>
(function(){var targetTypeLabel={level:'客户等级',customer:'客户特批'},modeLabel={rate:'折扣率',fixed:'固定减免'},validityLabel={permanent:'永久有效',period:'固定期限',single:'单次有效'},surchargeRules={R001:'粉末品名加收',R003:'商业地址加收'};var app=Vue.createApp({data:function(){return{showDialog:false,editMode:false,editIndex:-1,list:[{name:'VIP-粉末附加费减0.5元',surchargeRule:'粉末品名加收',targetTypeLabel:'客户等级',targetName:'VIP',modeLabel:'固定减免',val:'-0.5000',validityLabel:'永久有效',_raw:{surchargeRuleId:'R001',targetType:'level',targetLevel:'VIP',targetCustomer:'',mode:'fixed',val:0.5,validity:'permanent',validFrom:'',validTo:''}}],form:{name:'',surchargeRuleId:'',targetType:'level',targetLevel:'VIP',targetCustomer:'',mode:'fixed',val:0,validity:'permanent',validFrom:'',validTo:''}}},methods:{openAdd:function(){this.editMode=false;this.editIndex=-1;this.form={name:'',surchargeRuleId:'',targetType:'level',targetLevel:'VIP',targetCustomer:'',mode:'fixed',val:0,validity:'permanent',validFrom:'',validTo:''};this.showDialog=true},openEdit:function(row,idx){this.editMode=true;this.editIndex=idx;var raw=row._raw;this.form={name:row.name,surchargeRuleId:raw.surchargeRuleId,targetType:raw.targetType||'level',targetLevel:raw.targetLevel||'',targetCustomer:raw.targetCustomer||'',mode:raw.mode,val:raw.val,validity:raw.validity||'permanent',validFrom:raw.validFrom||'',validTo:raw.validTo||''};this.showDialog=true},save:function(){if(!this.form.name){ElementPlus.ElMessage.warning('请输入规则名称');return}if(!this.form.surchargeRuleId){ElementPlus.ElMessage.warning('请选择目标附加费规则');return}if(!this.form.targetType){ElementPlus.ElMessage.warning('请选择优惠对象');return}if(!this.form.mode){ElementPlus.ElMessage.warning('请选择优惠方式');return}if(this.form.val===null||this.form.val<=0){ElementPlus.ElMessage.warning('请输入优惠值');return}if(this.form.validity==='period'&&(!this.form.validFrom||!this.form.validTo)){ElementPlus.ElMessage.warning('请选择有效起止日期');return}var targetName=this.form.targetType==='level'?this.form.targetLevel:(this.form.targetCustomer||'未指定');var valStr=this.form.mode==='rate'?this.form.val.toFixed(4):(this.form.val>0?'-'+this.form.val.toFixed(4):this.form.val.toFixed(4));var validityStr=validityLabel[this.form.validity]+(this.form.validity==='period'&&this.form.validFrom?(' '+this.form.validFrom+'~'+this.form.validTo):'');var row={name:this.form.name,surchargeRule:surchargeRules[this.form.surchargeRuleId]||this.form.surchargeRuleId,targetTypeLabel:targetTypeLabel[this.form.targetType],targetName:targetName,modeLabel:modeLabel[this.form.mode],val:valStr,validityLabel:validityStr,_raw:{surchargeRuleId:this.form.surchargeRuleId,targetType:this.form.targetType,targetLevel:this.form.targetLevel,targetCustomer:this.form.targetCustomer,mode:this.form.mode,val:this.form.val,validity:this.form.validity,validFrom:this.form.validFrom,validTo:this.form.validTo}};if(this.editMode){this.list.splice(this.editIndex,1,row);ElementPlus.ElMessage.success('编辑成功')}else{this.list.push(row);ElementPlus.ElMessage.success('新增成功')}this.showDialog=false}}});app.use(ElementPlus);app.mount('#app')})();
</script>
</body>
</html>
