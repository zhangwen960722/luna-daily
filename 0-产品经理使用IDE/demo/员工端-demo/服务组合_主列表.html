<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务组合 - 主列表</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <style>
        :root { --el-color-primary: #2DA44E; --el-bg-color: #F5F7FA; --el-text-color-regular: #606266; }
        body { margin: 0; padding: 16px; background-color: var(--el-bg-color); font-family: sans-serif; box-sizing: border-box; }
        .content-card { background-color: #fff; border-radius: 4px; padding: 16px; box-sizing: border-box; }
        .search-area { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
        .search-item { display: flex; align-items: center; }
        .search-item label { margin-right: 8px; color: var(--el-text-color-regular); font-size: 14px; }
        .table-container { flex: 1; overflow: hidden; margin-top: 16px; }
        .pagination-area { margin-top: 16px; display: flex; justify-content: flex-end; }
        .el-table th.el-table__cell { background-color: #FAFAFA; color: #303133; font-weight: 500; }
        .editable-cell {
            display: flex;
            align-items: center;
            width: 100%;
        }
        /* 自定义折叠面板样式（去掉折叠功能，保持卡片外观） */
        .custom-collapse {
            border-top: none;
            border-bottom: none;
        }
        .custom-collapse .el-collapse-item {
            margin-bottom: 16px;
            border: 1px solid var(--el-border-color);
            border-radius: 4px;
            background-color: #fff;
        }
        .custom-collapse .el-collapse-item__header {
            background-color: #F5F7FA;
            padding: 0 16px;
            font-size: 14px;
            font-weight: 600;
            color: var(--el-text-color-primary);
            border-bottom: 1px solid var(--el-border-color);
            border-radius: 4px 4px 0 0;
            height: 40px;
            line-height: 40px;
            display: flex;
            align-items: center;
        }
        .custom-collapse .el-collapse-item__wrap {
            border-bottom: none;
            padding: 16px;
        }
        .custom-collapse .el-collapse-item__content {
            padding-bottom: 0;
        }

        
  
        
  
        /* 统一主列表搜索按钮样式 */
        .btn-search-primary {
            background-color: #2DA44E !important;
            border-color: #2DA44E !important;
            color: #FFFFFF !important;
        }
        .btn-search-primary:hover,
        .btn-search-primary:focus,
        .btn-search-primary:active {
            background-color: #2DA44E !important;
            border-color: #2DA44E !important;
            color: #FFFFFF !important;
            opacity: 1 !important;
            filter: none !important;
        }
        .btn-search-primary .el-icon {
            color: #FFFFFF !important;
        }
        .btn-search-reset {
            background-color: #FFFFFF !important;
            border-color: #DCDFE6 !important;
            color: #000000 !important;
        }
        .btn-search-reset:hover,
        .btn-search-reset:focus,
        .btn-search-reset:active {
            background-color: #E6F2FF !important;
            border-color: #DCDFE6 !important;
            color: #000000 !important;
            opacity: 1 !important;
            filter: none !important;
        }
        .btn-search-reset .el-icon {
            color: #000000 !important;
        }
    </style>



</head>
<body>
    <div id="app">
        <!-- 查询条件 -->
        <div class="content-card" style="margin-bottom: 16px;">
            <div class="search-area">
                <div class="search-item">
                    <el-input v-model="searchForm.serviceName" placeholder="服务名称" clearable style="width: 250px;"></el-input>
                </div>
                <div class="search-item">
                    <el-select v-model="searchForm.serviceChannel" placeholder="服务渠道" clearable style="width: 200px;">
                        <el-option v-for="channel in availableChannels" :key="channel" :label="channel" :value="channel"></el-option>
                    </el-select>
                </div>
                <div>
                    <el-button class="btn-search-primary" @click="handleSearch">
                        <el-icon style="margin-right: 4px;"><Search /></el-icon>查询
                    </el-button>
                    <el-button class="btn-search-reset" @click="resetSearch">
                        <el-icon style="margin-right: 4px;"><RefreshRight /></el-icon>重置
                    </el-button>
                </div>
                <div style="margin-left: auto;">
                    <el-button type="success" @click="handleAdd">新增服务组合</el-button>
                </div>
            </div>
        </div>

        <!-- 表格区域 -->
        <div class="content-card" style="height: calc(100vh - 106px); display: flex; flex-direction: column;">
            <div class="table-container">
                <el-table :data="tableData" border height="100%" style="width: 100%">
                    <el-table-column prop="serviceName" label="服务名称" min-width="250">
                        <template #default="scope">
                            <div class="editable-cell">
                                <el-input v-model="scope.row.serviceName" placeholder="必填，默认带出服务信息"></el-input>
                            </div>
                        </template>
                    </el-table-column>
                    <el-table-column prop="serviceInfo" label="服务信息" min-width="280" show-overflow-tooltip></el-table-column>
                    <el-table-column prop="status" label="状态" min-width="80">
                        <template #default="scope">
                            <el-tag :type="scope.row.status === '正常' ? 'success' : 'danger'">
                                {{ scope.row.status }}
                            </el-tag>
                        </template>
                    </el-table-column>
                    <el-table-column prop="visibleTo" label="对谁可见" min-width="120" show-overflow-tooltip></el-table-column>
                    <el-table-column label="操作" width="180" fixed="right" align="center">
                        <template #default="scope">
                            <el-button link type="primary" size="small" @click="handleEdit(scope.row)">编辑</el-button>
                            <el-button link :type="scope.row.status === '正常' ? 'danger' : 'success'" size="small" @click="toggleStatus(scope.row)">
                                {{ scope.row.status === '正常' ? '冻结' : '启用' }}
                            </el-button>
                            <el-button link type="danger" size="small" @click="handleDelete(scope.row, scope.$index)">删除</el-button>
                        </template>
                    </el-table-column>
                </el-table>
            </div>

            <!-- 分页 -->
            <div class="pagination-area">
                <el-pagination background layout="total, prev, pager, next" :total="total"></el-pagination>
            </div>
        </div>

        <!-- 新增/编辑弹窗 -->
        <el-dialog v-model="editDialogVisible" :title="dialogTitle" width="1000px" destroy-on-close>
            <el-form :model="editForm" :rules="rules" ref="formRef" label-position="right" label-width="120px">
                <div class="custom-collapse">
                    <!-- 基本信息 -->
                    <div class="el-collapse-item">
                        <div class="el-collapse-item__header" style="cursor: default; pointer-events: none;">
                            <el-icon style="margin-right: 8px; color: var(--el-color-primary);"><Document /></el-icon>
                            基本信息
                        </div>
                        <div class="el-collapse-item__wrap">
                            <div class="el-collapse-item__content">
                                <el-row :gutter="20">
                                    <el-col :span="24">
                                        <el-form-item label="服务名称" prop="serviceName">
                                            <el-input v-model="editForm.serviceName" placeholder="默认带出服务信息"></el-input>
                                        </el-form-item>
                                    </el-col>
                                </el-row>
                                
                                <el-form-item label="服务组合" required>
                                    <el-row :gutter="10" style="width: 100%;">
                                        <el-col :span="4">
                                            <el-form-item prop="tsName" label-width="0" style="margin-bottom: 0;">
                                                <el-select v-model="editForm.tsName" placeholder="服务渠道" style="width: 100%;">
                                                    <el-option label="美森360" value="美森360"></el-option>
                                                    <el-option label="大陆UPS" value="大陆UPS"></el-option>
                                                </el-select>
                                            </el-form-item>
                                        </el-col>
                                        <el-col :span="4">
                                            <el-form-item prop="transportMethod" label-width="0" style="margin-bottom: 0;">
                                                <el-select v-model="editForm.transportMethod" placeholder="运输方式" style="width: 100%;">
                                                    <el-option label="海运" value="海运"></el-option>
                                                    <el-option label="空运" value="空运"></el-option>
                                                </el-select>
                                            </el-form-item>
                                        </el-col>
                                        <el-col :span="4">
                                            <el-form-item prop="deliveryMethod" label-width="0" style="margin-bottom: 0;">
                                                <el-select v-model="editForm.deliveryMethod" placeholder="尾程派送" style="width: 100%;">
                                                    <el-option label="卡派" value="卡派"></el-option>
                                                    <el-option label="快递派" value="快递派"></el-option>
                                                </el-select>
                                            </el-form-item>
                                        </el-col>
                                        <el-col :span="4">
                                            <el-form-item prop="billingMethod" label-width="0" style="margin-bottom: 0;">
                                                <el-select v-model="editForm.billingMethod" placeholder="计费方式" style="width: 100%;">
                                                    <el-option label="KG" value="KG"></el-option>
                                                    <el-option label="CBM" value="CBM"></el-option>
                                                </el-select>
                                            </el-form-item>
                                        </el-col>
                                        <el-col :span="4">
                                            <el-form-item prop="taxType" label-width="0" style="margin-bottom: 0;">
                                                <el-select v-model="editForm.taxType" placeholder="包税方式" style="width: 100%;">
                                                    <el-option label="包税" value="包税"></el-option>
                                                    <el-option label="不包税" value="不包税"></el-option>
                                                    <el-option label="自主税号" value="自主税号"></el-option>
                                                    <el-option label="自税递延" value="自税递延"></el-option>
                                                </el-select>
                                            </el-form-item>
                                        </el-col>
                                        <el-col :span="4">
                                            <el-form-item prop="serviceType" label-width="0" style="margin-bottom: 0;">
                                                <el-select v-model="editForm.serviceType" placeholder="服务类型" style="width: 100%;">
                                                    <el-option label="散货" value="散货"></el-option>
                                                    <el-option label="整柜" value="整柜"></el-option>
                                                </el-select>
                                            </el-form-item>
                                        </el-col>
                                    </el-row>
                                </el-form-item>
                            </div>
                        </div>
                    </div>

                    <!-- 计费规则配置 -->
                    <div class="el-collapse-item">
                        <div class="el-collapse-item__header" style="cursor: default; pointer-events: none;">
                            <el-icon style="margin-right: 8px; color: var(--el-color-primary);"><Money /></el-icon>
                            计费规则配置
                        </div>
                        <div class="el-collapse-item__wrap">
                            <div class="el-collapse-item__content">
                                <el-row :gutter="20">
                                    <el-col :span="8">
                                        <el-form-item label="计泡/方系数" prop="volumeWeightRatio">
                                            <el-input v-model="editForm.volumeWeightRatio" type="number" placeholder="例如：6000"></el-input>
                                        </el-form-item>
                                    </el-col>
                                    <el-col :span="8">
                                        <el-form-item label="计重精度" prop="weightPrecision">
                                            <el-input-number v-model="editForm.weightPrecision" :min="0" :precision="2" style="width: 100%;" controls-position="right"></el-input-number>
                                        </el-form-item>
                                    </el-col>
                                    <el-col :span="8">
                                        <el-form-item label="尺寸精度" prop="sizePrecision">
                                            <el-input-number v-model="editForm.sizePrecision" :min="0" :precision="2" style="width: 100%;" controls-position="right"></el-input-number>
                                        </el-form-item>
                                    </el-col>
                                </el-row>

                                <el-row :gutter="20">
                                    <el-col :span="8">
                                        <el-form-item label="最低箱收费重" prop="minBoxChargeWeight">
                                            <el-input-number v-model="editForm.minBoxChargeWeight" :min="0" :precision="2" style="width: 100%;" controls-position="right"></el-input-number>
                                        </el-form-item>
                                    </el-col>
                                    <el-col :span="8">
                                        <el-form-item label="最低票收费重" prop="minTicketChargeWeight">
                                            <el-input-number v-model="editForm.minTicketChargeWeight" :min="0" :precision="2" style="width: 100%;" controls-position="right"></el-input-number>
                                        </el-form-item>
                                    </el-col>
                                    <el-col :span="8">
                                        <el-form-item label="最小件数" prop="minPieces">
                                            <el-input-number v-model="editForm.minPieces" :min="0" :precision="0" style="width: 100%;" controls-position="right"></el-input-number>
                                        </el-form-item>
                                    </el-col>
                                </el-row>

                                <el-row :gutter="20">
                                    <el-col :span="8">
                                        <el-form-item label="最大件数" prop="maxPieces">
                                            <el-input-number v-model="editForm.maxPieces" :min="0" :precision="0" style="width: 100%;" controls-position="right"></el-input-number>
                                        </el-form-item>
                                    </el-col>
                                </el-row>
                            </div>
                        </div>
                    </div>

                    <!-- 权限配置 -->
                    <div class="el-collapse-item">
                        <div class="el-collapse-item__header" style="cursor: default; pointer-events: none;">
                            <el-icon style="margin-right: 8px; color: var(--el-color-primary);"><Lock /></el-icon>
                            权限配置
                        </div>
                        <div class="el-collapse-item__wrap">
                            <div class="el-collapse-item__content">
                                <el-row :gutter="20">
                                    <el-col :span="12">
                                        <el-form-item label="指定客户" prop="designatedUser">
                                            <el-select v-model="editForm.designatedUser" multiple filterable placeholder="请选择支持多选的客户" style="width: 100%;">
                                                <el-option v-for="customer in availableCustomers" :key="customer" :label="customer" :value="customer"></el-option>
                                            </el-select>
                                        </el-form-item>
                                    </el-col>
                                    <el-col :span="12">
                                        <el-form-item label="客户等级" prop="customerLevel">
                                            <el-select v-model="editForm.customerLevel" multiple placeholder="请选择支持多选的客户等级" style="width: 100%;">
                                                <el-option label="SS" value="SS"></el-option>
                                                <el-option label="S" value="S"></el-option>
                                                <el-option label="A" value="A"></el-option>
                                            </el-select>
                                        </el-form-item>
                                    </el-col>
                                </el-row>
                            </div>
                        </div>
                    </div>
                </div>
            </el-form>
            <template #footer>
                <span class="dialog-footer">
                    <el-button @click="editDialogVisible = false">返回</el-button>
                    <el-button type="primary" @click="saveEdit">保存</el-button>
                </span>
            </template>
        </el-dialog>
    </div>

    <script>
        const { createApp, ref, reactive, watch, onMounted } = Vue;
        const { ElMessage, ElMessageBox } = ElementPlus;

        const app = createApp({
            setup() {
                const searchForm = reactive({ serviceName: '', serviceChannel: '' });
                const total = ref(8);
                
                const availableChannels = ref(['大陆UPS', '美森360', '美森432']);

                const originalTableData = [
                    { serviceName: '美森360-海运-卡派-KG-包税-散货', serviceInfo: '美森360-海运-卡派-KG-包税-散货', status: '正常', visibleTo: '深圳市大卖科技有限公司、义乌市星光进出口有限公司' },
                    { serviceName: '美森360-海运-卡派-KG-不包税-散货', serviceInfo: '美森360-海运-卡派-KG-不包税-散货', status: '正常', visibleTo: '等级: SS, S' },
                    { serviceName: '美森360-海运-卡派-KG-自主税号-散货', serviceInfo: '美森360-海运-卡派-KG-自主税号-散货', status: '正常', visibleTo: '全部可见' },
                    { serviceName: '美森360-海运-卡派-KG-自税递延-散货', serviceInfo: '美森360-海运-卡派-KG-自税递延-散货', status: '正常', visibleTo: '杭州中卖物流有限公司' },
                    { serviceName: '美森360-海运-快递派-CBM-包税-散货', serviceInfo: '美森360-海运-快递派-CBM-包税-散货', status: '正常', visibleTo: '等级: A, B' },
                    { serviceName: '美森360-海运-快递派-CBM-不包税-散货', serviceInfo: '美森360-海运-快递派-CBM-不包税-散货', status: '正常', visibleTo: '全部可见' },
                    { serviceName: '美森360-海运-快递派-CBM-自主税号-散货', serviceInfo: '美森360-海运-快递派-CBM-自主税号-散货', status: '正常', visibleTo: '上海新源供应链有限公司' },
                    { serviceName: '大陆UPS-空运-快递派-KG-包税-散货', serviceInfo: '大陆UPS-空运-快递派-KG-包税-散货', status: '正常', visibleTo: '香港大卖实业有限公司-中国香港' },
                    { serviceName: '大陆UPS-空运-快递派-KG-不包税-散货', serviceInfo: '大陆UPS-空运-快递派-KG-不包税-散货', status: '正常', visibleTo: '全部可见' }
                ];
                
                const tableData = ref([...originalTableData]);

                const availableCustomers = ref([
                    '深圳市大卖科技有限公司',
                    '义乌市星光进出口有限公司',
                    '广州小卖贸易有限责任公司',
                    '杭州中卖物流有限公司',
                    '北京跨境易达电商服务有限公司',
                    '上海新源供应链有限公司',
                    '香港大卖实业有限公司-中国香港',
                    '九龙汇通贸易有限公司-中国香港'
                ]);

                // 初始化
                onMounted(() => {
                    // 同步父级运输服务冻结状态
                    const frozenList = JSON.parse(localStorage.getItem('frozenTransportServices') || '[]');
                    tableData.value.forEach(row => {
                        const tsName = (row.serviceInfo || '').split('-')[0];
                        if (frozenList.includes(tsName)) {
                            row.status = '已冻结';
                        }
                    });

                    const generatedCombinationsStr = sessionStorage.getItem('generatedServiceCombinations');
                    if (generatedCombinationsStr) {
                        try {
                            const combinations = JSON.parse(generatedCombinationsStr);
                            if (Array.isArray(combinations) && combinations.length > 0) {
                                // 插入到前面
                                tableData.value.unshift(...combinations);
                                total.value += combinations.length;
                                ElMessage.success(`成功接收 ${combinations.length} 条自动生成的组合数据！`);
                            }
                            // 消费后清除
                            sessionStorage.removeItem('generatedServiceCombinations');
                        } catch (e) {
                            console.error('Failed to parse generated combinations:', e);
                        }
                    }
                });

                const handleSearch = () => { 
                    tableData.value = originalTableData.filter(item => {
                        const matchName = searchForm.serviceName ? item.serviceName.includes(searchForm.serviceName) : true;
                        // 服务渠道一般是 serviceInfo 的第一部分，我们用包含或者前缀匹配
                        const matchChannel = searchForm.serviceChannel ? item.serviceInfo.startsWith(searchForm.serviceChannel) : true;
                        return matchName && matchChannel;
                    });
                    total.value = tableData.value.length;
                    ElMessage.success('执行查询成功'); 
                };
                
                const resetSearch = () => { 
                    searchForm.serviceName = ''; 
                    searchForm.serviceChannel = ''; 
                    tableData.value = [...originalTableData];
                    total.value = tableData.value.length;
                    ElMessage.success('已重置');
                };

                // 弹窗逻辑
                const formRef = ref(null);
                const editDialogVisible = ref(false);
                const dialogTitle = ref('新增服务组合');
                const dialogMode = ref('add');
                const currentEditRow = ref(null);

                const editForm = reactive({
                    serviceName: '',
                    tsName: '',
                    transportMethod: '',
                    deliveryMethod: '',
                    billingMethod: '',
                    taxType: '',
                    serviceType: '',
                    weightPrecision: 0,
                    sizePrecision: 0,
                    minBoxChargeWeight: 0,
                    minTicketChargeWeight: 0,
                    minPieces: 0,
                    maxPieces: 0,
                    volumeWeightRatio: '',
                    designatedUser: [],
                    customerLevel: []
                });

                const rules = {
                    serviceName: [{ required: true, message: '请输入服务名称', trigger: 'blur' }],
                    tsName: [{ required: true, message: '请选择服务渠道', trigger: 'change' }],
                    transportMethod: [{ required: true, message: '请选择运输方式', trigger: 'change' }],
                    deliveryMethod: [{ required: true, message: '请选择尾程派送', trigger: 'change' }],
                    billingMethod: [{ required: true, message: '请选择计费方式', trigger: 'change' }],
                    taxType: [{ required: true, message: '请选择包税方式', trigger: 'change' }],
                    serviceType: [{ required: true, message: '请选择服务类型', trigger: 'change' }],
                    volumeWeightRatio: [{ required: true, message: '请输入计泡/方系数', trigger: 'blur' }],
                    maxPieces: [
                        {
                            validator: (rule, value, callback) => {
                                if (editForm.minPieces !== undefined && value !== undefined && value < editForm.minPieces) {
                                    callback(new Error('最大件数不能小于最小件数'));
                                } else {
                                    callback();
                                }
                            },
                            trigger: 'change'
                        }
                    ]
                };

                // 自动生成服务名称
                watch([
                    () => editForm.tsName,
                    () => editForm.transportMethod,
                    () => editForm.deliveryMethod,
                    () => editForm.billingMethod,
                    () => editForm.taxType,
                    () => editForm.serviceType
                ], (newVals) => {
                    const combination = newVals.filter(v => v).join('-');
                    if (combination) {
                        editForm.serviceName = combination;
                    }
                });

                const resetForm = () => {
                    Object.assign(editForm, {
                        serviceName: '', tsName: '', transportMethod: '',
                        deliveryMethod: '', billingMethod: '', taxType: '', serviceType: '',
                        weightPrecision: 0, sizePrecision: 0,
                        minBoxChargeWeight: 0, minTicketChargeWeight: 0, minPieces: 0, maxPieces: 0,
                        volumeWeightRatio: '',
                        designatedUser: [], customerLevel: []
                    });
                    if (formRef.value) formRef.value.clearValidate();
                };

                const handleAdd = () => {
                    dialogTitle.value = '新增服务组合';
                    dialogMode.value = 'add';
                    resetForm();
                    editDialogVisible.value = true;
                };

                const handleEdit = (row) => {
                    dialogTitle.value = '编辑服务组合';
                    dialogMode.value = 'edit';
                    currentEditRow.value = row;
                    
                    const parts = (row.serviceInfo || '').split('-');
                    
                    Object.assign(editForm, {
                        serviceName: row.serviceName || '',
                        tsName: parts[0] || '',
                        transportMethod: parts[1] || '',
                        deliveryMethod: parts[2] || '',
                        billingMethod: parts[3] || '',
                        taxType: parts[4] || '',
                        serviceType: parts[5] || '',
                        weightPrecision: row.weightPrecision || 0,
                        sizePrecision: row.sizePrecision || 0,
                        minBoxChargeWeight: row.minBoxChargeWeight || 0,
                        minTicketChargeWeight: row.minTicketChargeWeight || 0,
                        minPieces: row.minPieces || 0,
                        maxPieces: row.maxPieces || 0,
                        volumeWeightRatio: row.volumeWeightRatio || '',
                        designatedUser: row.designatedUser ? row.designatedUser.split('、') : (row.visibleTo && row.visibleTo !== '全部' ? row.visibleTo.split('、') : []),
                        customerLevel: row.customerLevel ? row.customerLevel.split('、') : []
                    });
                    editDialogVisible.value = true;
                };

                const toggleStatus = (row) => {
                    if (row.status === '已冻结') {
                        // 校验其关联的运输服务是否也被冻结了
                        const tsName = (row.serviceInfo || '').split('-')[0];
                        const frozenList = JSON.parse(localStorage.getItem('frozenTransportServices') || '[]');
                        if (frozenList.includes(tsName)) {
                            ElMessage.warning(`所属运输服务【${tsName}】处于“已冻结”状态，不允许单独启用该服务组合！`);
                            return;
                        }
                        
                        ElMessageBox.confirm(`确定要启用服务组合【${row.serviceName}】吗？`, '提示', { type: 'warning' }).then(() => {
                            row.status = '正常';
                            ElMessage.success('已启用该服务组合');
                        }).catch(() => {});
                    } else {
                        ElMessageBox.confirm(`确定要冻结服务组合【${row.serviceName}】吗？`, '提示', { type: 'warning' }).then(() => {
                            row.status = '已冻结';
                            ElMessage.success('已冻结该服务组合');
                        }).catch(() => {});
                    }
                };

                const handleDelete = (row, index) => {
                    ElMessageBox.confirm(
                        `确定要删除服务组合 "${row.serviceName}" 吗？`,
                        '警告',
                        {
                            confirmButtonText: '确定',
                            cancelButtonText: '取消',
                            type: 'warning',
                        }
                    ).then(() => {
                        tableData.value.splice(index, 1);
                        total.value -= 1;
                        ElMessage({
                            type: 'success',
                            message: '删除成功',
                        });
                    }).catch(() => {
                        // 取消删除
                    });
                };

                const saveEdit = () => {
                    if (!formRef.value) return;
                    formRef.value.validate((valid) => {
                        if (valid) {
                            const newRow = {
                                serviceName: editForm.serviceName,
                                serviceInfo: [
                                    editForm.tsName, editForm.transportMethod, editForm.deliveryMethod,
                                    editForm.billingMethod, editForm.taxType, editForm.serviceType
                                ].filter(v => v).join('-'),
                                status: '正常',
                                visibleTo: editForm.designatedUser.length ? editForm.designatedUser.join('、') : '全部',
                                weightPrecision: editForm.weightPrecision,
                                sizePrecision: editForm.sizePrecision,
                                minBoxChargeWeight: editForm.minBoxChargeWeight,
                                minTicketChargeWeight: editForm.minTicketChargeWeight,
                                minPieces: editForm.minPieces,
                                maxPieces: editForm.maxPieces,
                                volumeWeightRatio: editForm.volumeWeightRatio,
                                designatedUser: editForm.designatedUser.join('、'),
                                customerLevel: editForm.customerLevel.join('、')
                            };

                            if (dialogMode.value === 'add') {
                                tableData.value.unshift(newRow);
                                total.value += 1;
                                ElMessage.success('新增保存成功');
                            } else {
                                Object.assign(currentEditRow.value, newRow);
                                ElMessage.success('编辑保存成功');
                            }
                            editDialogVisible.value = false;
                        }
                    });
                };

                return { 
                    searchForm, tableData, total, handleSearch, resetSearch,
                    formRef, editDialogVisible, dialogTitle, editForm, rules,
                    handleAdd, handleEdit, handleDelete, saveEdit, toggleStatus,
                    availableCustomers, availableChannels
                };
            }
        });
        app.use(ElementPlus);
        app.mount('#app');
    </script>
</body>
</html>
