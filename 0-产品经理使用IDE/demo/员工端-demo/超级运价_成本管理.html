<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>成本项管理 - 超级运价</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
<script src="https://unpkg.com/element-plus"></script>
<style>
:root{--el-color-primary:#2DA44E;--bg:#F0F2F5;--card-bg:#fff;--text:#303133;--text-secondary:#909399;--border-light:#EBEEF5}
*{box-sizing:border-box}
body{margin:0;padding:16px;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);font-size:14px;line-height:1.5}
.page-layout{display:flex;gap:16px;height:calc(100vh - 32px)}
.seg-panel{width:200px;flex-shrink:0;background:var(--card-bg);border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);padding:20px 0;display:flex;flex-direction:column}
.seg-panel-header{padding:0 20px 16px;font-size:15px;font-weight:600;border-bottom:1px solid var(--border-light)}
.seg-list{flex:1;overflow-y:auto;padding:8px 0}
.seg-item{padding:12px 20px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;border-left:3px solid transparent;transition:background .15s}
.seg-item:hover{background:#F5F7FA}
.seg-item.active{background:#F0F9EB;border-left-color:#2DA44E;font-weight:600;color:#2DA44E}
.seg-item .count{font-size:11px;color:var(--text-secondary);background:#F0F2F5;padding:1px 8px;border-radius:10px}
.seg-item.active .count{background:#C8E6C9;color:#2DA44E}
.content-panel{flex:1;background:var(--card-bg);border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);padding:20px;display:flex;flex-direction:column;overflow:hidden}
.content-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-shrink:0;flex-wrap:wrap;gap:8px}
.content-toolbar h3{margin:0;font-size:15px;font-weight:600}
.el-table th{background:#FAFAFA!important;color:#606266;font-weight:600;font-size:13px}
.el-table td{font-size:13px}
.row-disabled td{background:#FAFAFA!important;color:#C0C4CC}
.is-readonly { pointer-events: none; opacity: 0.7; }
</style>
</head>
<body>
<div id="app">
  <div class="page-layout">
    <div class="seg-panel">
      <div class="seg-panel-header">成本段</div>
      <div class="seg-list">
        <div v-for="seg in segGroups" :key="seg.name" class="seg-item" :class="{active: activeSeg===seg.name}" @click="selectSeg(seg.name)">
          <span>{{ seg.name }}</span>
          <span class="count">{{ seg.count }}</span>
        </div>
      </div>
    </div>
    <div class="content-panel">
      <div class="content-toolbar">
        <h3>{{ activeSeg }} — 成本项模板</h3>
        <el-button type="primary" @click="openAdd">新增成本项</el-button>
      </div>
      <el-table :data="segItems" border stripe style="flex:1">
        <el-table-column prop="name" label="成本项" min-width="180"></el-table-column>
        <el-table-column label="是否换汇" width="100" align="center">
          <template #default="s"><el-tag :type="s.row.cur==='RMB'?'info':'warning'" size="small">{{s.row.cur==='RMB'?'否':'是'}}</el-tag></template>
        </el-table-column>
        <el-table-column prop="dp" label="建议默认价" width="120" align="right">
          <template #default="s">
            <span v-if="s.row._useDefaultPrice">{{ s.row.dp }} <span style="font-size:11px;color:#909399">{{ s.row.cur }}</span></span>
            <span v-else style="color:#C0C4CC">—</span>
          </template>
        </el-table-column>
        <el-table-column label="启用默认价" width="100" align="center">
          <template #default="s"><el-tag :type="s.row._useDefaultPrice?'success':'info'" size="small">{{s.row._useDefaultPrice?'已启用':'未启用'}}</el-tag></template>
        </el-table-column>
        <el-table-column label="状态" width="80" align="center">
          <template #default="s"><el-tag :type="s.row.enabled?'success':'danger'">{{s.row.enabled?'正常':'已冻结'}}</el-tag></template>
        </el-table-column>
        <el-table-column label="操作" width="220" align="center" fixed="right">
          <template #default="s">
            <el-button size="small" @click="openEdit(s.row)">编辑</el-button>
            <el-button v-if="!(s.row._preset && s.row.seg==='派送段')" size="small" @click="openBatchUpdate(s.row)">批量更新</el-button>
            <el-button size="small" :type="s.row.enabled?'danger':'success'" :disabled="s.row._preset" @click="toggleStatus(s.row)">{{s.row.enabled?'冻结':'启用'}}</el-button>
          </template>
        </el-table-column>
      </el-table>
    </div>
  </div>
  <el-dialog v-model="showEdit" :title="editMode?(isReadonly?'查看成本项':'编辑成本项'):'新增成本项'" width="460px" :close-on-click-modal="false">
    <div :class="{'is-readonly': isReadonly}">
    <el-form :model="editForm" label-width="100px">
      <el-form-item label="所属段"><span style="color:#303133;font-weight:600">{{ activeSeg }}</span></el-form-item>
      <el-form-item label="成本项名称" required><el-input v-model="editForm.name"></el-input></el-form-item>
      <el-row :gutter="12">
        <el-col :span="12"><el-form-item label="建议默认价" required><el-input-number v-model="editForm.dpVal" :min="0" :precision="2" style="width:100%" controls-position="right"></el-input-number></el-form-item></el-col>
        <el-col :span="12"><el-form-item label="币种" required><el-select v-model="editForm.cur" style="width:100%"><el-option label="RMB" value="RMB"></el-option><el-option label="USD" value="USD"></el-option></el-select></el-form-item></el-col>
      </el-row>
      <el-form-item label="是否换汇" required><el-tag :type="editForm.cur==='RMB'?'info':'warning'" size="small">{{editForm.cur==='RMB'?'否':'是'}}</el-tag><span style="margin-left:8px;font-size:12px;color:#909399">根据币种自动确定，不可编辑</span></el-form-item>
    </el-form>
    </div>
    <template #footer><el-button @click="showEdit=false">{{ isReadonly ? '关闭' : '取消' }}</el-button><el-button v-if="!isReadonly" type="primary" @click="saveEdit">保存</el-button></template>
  </el-dialog>
  <el-dialog v-model="showBuDialog" title="批量更新建议默认价" width="700px" :close-on-click-modal="false">
    <div :class="{'is-readonly': buRow && !buRow.enabled}">
    <el-form label-width="110px">
      <el-row :gutter="16"><el-col :span="12"><el-form-item label="成本项名称"><el-input :model-value="buRow?buRow.name:''" disabled></el-input></el-form-item></el-col><el-col :span="12"><el-form-item label="币种"><el-input :model-value="buRow?buRow.cur:''" disabled></el-input></el-form-item></el-col></el-row>
      <el-row :gutter="16"><el-col :span="12"><el-form-item label="原建议默认价"><el-input :model-value="buRow?buRow.dp:''" disabled></el-input></el-form-item></el-col><el-col :span="12"><el-form-item label="新建议默认价" required><el-input-number v-model="buForm.newPrice" :min="0" :precision="2" style="width:100%"></el-input-number></el-form-item></el-col></el-row>
    </el-form>
    <el-divider>同步到关联服务组合</el-divider>
    <div v-if="!buCombos||buCombos.length===0" style="text-align:center;padding:24px;color:var(--text-secondary)">暂无关联的服务组合</div>
    <template v-else>
      <div style="margin-bottom:8px"><el-checkbox v-model="buForm.selectAll" :indeterminate="buIndeterminate" @change="toggleBuAll">全选（已选 {{buSelectedCount}} / {{buCombos.length}}）</el-checkbox></div>
      <el-table :data="buCombos" border stripe size="small" max-height="280">
        <el-table-column width="50"><template #default="s"><el-checkbox v-model="buForm.selectedCombos[s.row.code]"></el-checkbox></template></el-table-column>
        <el-table-column prop="code" label="服务组合" min-width="260"></el-table-column>
        <el-table-column prop="ch" label="渠道" width="80"></el-table-column>
        <el-table-column prop="costPrice" label="当前成本价" min-width="100"></el-table-column>
        <el-table-column label="更新后" min-width="100"><template #default><span style="color:#2DA44E;font-weight:bold">{{buForm.newPrice}}</span></template></el-table-column>
      </el-table>
    </template>
    </div>
    <template #footer><el-button @click="showBuDialog=false">{{ buRow && !buRow.enabled ? '关闭' : '取消' }}</el-button><el-button v-if="!buRow || buRow.enabled" type="primary" @click="confirmBatchUpdate" :disabled="buSelectedCount===0">确认更新（{{buSelectedCount}} 个组合）</el-button></template>
  </el-dialog>
</div>
<script>
(function(){
var app=Vue.createApp({
data:function(){return{
  activeSeg:'揽收段', showEdit:false, editMode:false, showBuDialog:false, buRow:null,
  buForm:{newPrice:0,selectAll:true,selectedCombos:{}},
  editForm:{name:'',formulaType:10,dpVal:0,cur:'RMB',idx:-1},
  items:[
    {seg:'揽收段',name:'装柜费',dp:'1200',dpVal:1200,cur:'RMB',formulaType:10,_useDefaultPrice:true,enabled:true},
    {seg:'揽收段',name:'拖车费',_preset:true,dp:'900',dpVal:900,cur:'RMB',formulaType:10,_useDefaultPrice:true,enabled:true},
    {seg:'干线运输段',name:'海运费',dp:'5.0',dpVal:5,cur:'USD',formulaType:20,_useDefaultPrice:true,enabled:true},
    {seg:'干线运输段',name:'港杂费',dp:'250',dpVal:250,cur:'RMB',formulaType:10,_useDefaultPrice:true,enabled:true},
    {seg:'关务段',name:'国内报关费',dp:'2800',dpVal:2800,cur:'RMB',formulaType:10,_useDefaultPrice:true,enabled:true},
    {seg:'关务段',name:'国外清关费',dp:'1500',dpVal:1500,cur:'USD',formulaType:20,_useDefaultPrice:true,enabled:true},
    {seg:'关务段',name:'税金',dp:'1800',dpVal:1800,cur:'USD',formulaType:20,_useDefaultPrice:true,enabled:true},
    {seg:'仓储段',name:'国内存储费',dp:'15',dpVal:15,cur:'RMB',formulaType:10,_useDefaultPrice:true,enabled:true},
    {seg:'仓储段',name:'国外存储费',dp:'2.0',dpVal:2,cur:'USD',formulaType:20,_useDefaultPrice:true,enabled:true},
    {seg:'仓储段',name:'库内操作费',dp:'5.0',dpVal:5,cur:'RMB',formulaType:10,_useDefaultPrice:true,enabled:true},
    {seg:'派送段',name:'目的港提还柜费',dp:'350',dpVal:350,cur:'USD',formulaType:20,enabled:true,_useDefaultPrice:true},
    {seg:'派送段',name:'仓点成本（卡派）',_preset:true,dp:'—',dpVal:0,cur:'—',formulaType:20,enabled:true,_useDefaultPrice:false},
    {seg:'派送段',name:'快递派单价（快递派）',_preset:true,dp:'—',dpVal:0,cur:'RMB',formulaType:10,enabled:true,_useDefaultPrice:false}
  ],comboAffectedMap:{海运费:[{code:"美森360-海运-卡派-KG-包税-散货",ch:"美森360",costPrice:"5.0"},{code:"美森360-海运-卡派-KG-不包税-散货",ch:"美森360",costPrice:"5.0"},{code:"美森360-海运-卡派-m³-包税-散货",ch:"美森360",costPrice:"5.0"},{code:"美森432-海运-卡派-KG-包税-散货",ch:"美森432",costPrice:"5.2"}],港杂费:[{code:"美森360-海运-卡派-KG-包税-散货",ch:"美森360",costPrice:"250"}],国内报关费:[{code:"美森360-海运-卡派-KG-包税-散货",ch:"美森360",costPrice:"2800"},{code:"美森432-海运-卡派-KG-包税-散货",ch:"美森432",costPrice:"2800"}]}
}},computed:{
  isReadonly: function(){ return this.editMode && this.items[this.editForm.idx] && !this.items[this.editForm.idx].enabled; },
  segGroups:function(){var self=this,map={};this.items.forEach(function(i){if(!map[i.seg])map[i.seg]=0;map[i.seg]++});return Object.keys(map).map(function(k){return{name:k,count:map[k]}})},
  buCombos:function(){if(!this.buRow)return[];return this.comboAffectedMap[this.buRow.name]||[]},buSelectedCount:function(){var self=this;return this.buCombos.filter(function(c){return self.buForm.selectedCombos[c.code]}).length},buIndeterminate:function(){var c=this.buSelectedCount;return c>0&&c<this.buCombos.length},
  segItems:function(){var self=this;return this.items.filter(function(i){return i.seg===self.activeSeg})}
},methods:{
  selectSeg:function(seg){this.activeSeg=seg},
  toggleStatus:function(row){var self=this;var action=row.enabled?'冻结':'启用';ElementPlus.ElMessageBox.confirm('确定要'+action+'成本项【'+row.name+'】吗？','状态变更提示',{type:'warning'}).then(function(){row.enabled=!row.enabled;ElementPlus.ElMessage.success('已成功'+action+'该成本项')}).catch(function(){})},
  openAdd:function(){this.editMode=false;this.editForm={name:'',dpVal:0,cur:'RMB',idx:-1};this.showEdit=true},
  openEdit:function(row){this.editMode=true;this.editForm={name:row.name,dpVal:row.dpVal,cur:row.cur,idx:this.items.indexOf(row)};this.showEdit=true},
  saveEdit:function(){
    if(!this.editForm.name){ElementPlus.ElMessage.warning('请输入成本项名称');return}
    if(this.editForm.dpVal===null){ElementPlus.ElMessage.warning('请输入建议默认价');return}
    if(this.editMode){var row=this.items[this.editForm.idx];row.name=this.editForm.name;row.formulaType=this.editForm.cur==='RMB'?10:20;row.dp=String(this.editForm.dpVal);row.dpVal=this.editForm.dpVal;row.cur=this.editForm.cur;ElementPlus.ElMessage.success(row.name+' 已更新')}
    else{this.items.push({seg:this.activeSeg,name:this.editForm.name,formulaType:this.editForm.cur==='RMB'?10:20,_useDefaultPrice:true,dp:String(this.editForm.dpVal),dpVal:this.editForm.dpVal,cur:this.editForm.cur,enabled:true});ElementPlus.ElMessage.success('已新增 '+this.editForm.name)}
    this.showEdit=false
  },
  openBatchUpdate:function(row){this.buRow=row;var self=this,combos=this.comboAffectedMap[row.name]||[],sel={};combos.forEach(function(c){sel[c.code]=true});this.buForm={newPrice:parseFloat(row.dp)||0,selectAll:true,selectedCombos:sel};this.showBuDialog=true},
  toggleBuAll:function(val){var self=this;this.buCombos.forEach(function(c){self.buForm.selectedCombos[c.code]=val})},
  confirmBatchUpdate:function(){
    if(this.buForm.newPrice===null||this.buForm.newPrice<0){ElementPlus.ElMessage.warning("请输入新价格");return}
    if(this.buSelectedCount===0){ElementPlus.ElMessage.warning("请至少选择一个服务组合");return}
    this.buRow.dp=String(this.buForm.newPrice);this.buRow.dpVal=this.buForm.newPrice;var self=this,updated=[];this.buCombos.forEach(function(c){if(self.buForm.selectedCombos[c.code]){c.costPrice=String(self.buForm.newPrice);updated.push(c.code)}});
    ElementPlus.ElMessage.success(this.buRow.name+"建议默认价已更新为"+this.buForm.newPrice+"，已同步"+updated.length+"个组合。成本底价变更已标记待重算，请前往运价工作台处理");this.showBuDialog=false
  }
}});
app.use(ElementPlus);app.mount('#app');
})();
</script>
</body>
</html>
