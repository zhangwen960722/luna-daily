<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物流事件 - 主列表</title>
    <!-- 引入 Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- 引入 Element Plus 样式 -->
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
    <!-- 引入 Element Plus 组件库 -->
    <script src="https://unpkg.com/element-plus"></script>
    <!-- 引入 Element Plus 图标 -->
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <style>
        :root {
            --el-color-primary: #2DA44E;
            --el-color-primary-light-3: #6bc083;
            --el-color-primary-light-5: #95cfa4;
            --el-color-primary-light-7: #bee5c6;
            --el-color-primary-light-8: #d3efe8;
            --el-color-primary-light-9: #e9f7ea;
            --el-color-primary-dark-2: #24833e;
        }
        body, html {
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "微软雅黑", Arial, sans-serif;
            height: 100%;
        }
        #app {
            padding: 20px;
            box-sizing: border-box;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        /* 统一卡片样式 */
        .content-card {
            background-color: #fff;
            padding: 20px;
            border-radius: 4px;
            box-shadow: 0 1px 4px rgba(0,21,41,.08);
            margin-bottom: 16px;
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            margin-bottom: 0;
        }

        /* 搜索区域样式 */
        .search-area {
            display: flex;
            gap: 16px;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        .search-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .search-item label {
            color: #606266;
            font-size: 14px;
            font-weight: 500;
        }
        
        /* 统一主列表搜索按钮样式 */
        .btn-search-primary {
            background-color: #2DA44E !important;
            border-color: #2DA44E !important;
            color: #FFFFFF !important;
            height: 32px;
        }
        .btn-search-primary:hover,
        .btn-search-primary:focus,
        .btn-search-primary:active {
            background-color: #2DA44E !important;
            border-color: #2DA44E !important;
            color: #FFFFFF !important;
            opacity: 1 !important;
            filter: none !important;
        }
        .btn-search-primary .el-icon {
            color: #FFFFFF !important;
        }
        
        .btn-search-reset {
            background-color: #FFFFFF !important;
            border-color: #DCDFE6 !important;
            color: #000000 !important;
            height: 32px;
        }
        .btn-search-reset:hover,
        .btn-search-reset:focus,
        .btn-search-reset:active {
            background-color: #E6F2FF !important;
            border-color: #DCDFE6 !important;
            color: #000000 !important;
            opacity: 1 !important;
            filter: none !important;
        }
        .btn-search-reset .el-icon {
            color: #000000 !important;
        }

        /* 操作栏与表格样式 */
        .action-bar {
            margin-bottom: 16px;
            display: flex;
            justify-content: flex-start;
            gap: 10px;
        }
        .table-container {
            flex: 1;
            overflow: hidden;
        }
        .pagination-container {
            margin-top: 16px;
            display: flex;
            justify-content: flex-end;
        }

        /* 表格首行视觉区分优化 */
        .el-table th.el-table__cell {
            background-color: #FAFAFA !important;
            color: #303133;
            font-weight: 500;
        }

        /* 无障碍表单布局 (响应式标签间距) */
        .a11y-form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }
        .a11y-form-label {
            font-size: 14px;
            color: #606266;
            margin-bottom: 8px; /* 桌面端 8px 间距 */
            font-weight: 500;
            text-align: left;
            line-height: 1.2;
        }
        @media screen and (max-width: 768px) {
            .a11y-form-label {
                margin-bottom: 12px; /* 移动端 12px 间距 */
            }
        }
        
        .placeholder-tags {
            margin-top: 8px;
            padding: 10px;
            background-color: #f8f9fa;
            border-radius: 4px;
            border: 1px solid #ebeef5;
        }
        .placeholder-tags .el-checkbox {
            margin-right: 16px;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 搜索区域 -->
        <div class="content-card">
            <div class="search-area">
                <div class="search-item">
                    <!-- 根据规范：Input 不显示外部 label，使用内联 placeholder -->
                    <el-input v-model="searchForm.eventName" placeholder="物流事件名称" clearable style="width: 220px;"></el-input>
                </div>
                <div class="search-item">
                    <el-select v-model="searchForm.amazonEvent" placeholder="绑定亚马逊物流事件" clearable style="width: 200px;">
                        <el-option label="已开船/已起飞-VD/NS" value="已开船/已起飞-VD/NS"></el-option>
                        <el-option label="船只到港-VA/NS" value="船只到港-VA/NS"></el-option>
                        <el-option label="进口清关查验" value="进口清关查验"></el-option>
                    </el-select>
                </div>
                <div style="display: flex; gap: 10px;">
                    <el-button class="btn-search-primary" @click="handleSearch">
                        <el-icon style="margin-right: 4px;"><Search /></el-icon>查询
                    </el-button>
                    <el-button class="btn-search-reset" @click="resetSearch">
                        <el-icon style="margin-right: 4px;"><RefreshRight /></el-icon>重置
                    </el-button>
                </div>
                <div style="margin-left: auto;">
                    <el-button type="primary" @click="openDialog('add')">
                        <el-icon style="margin-right: 4px;"><Plus /></el-icon>新增物流事件
                    </el-button>
                </div>
            </div>
        </div>

        <!-- 主体内容 -->
        <div class="content-card main-content">
            <!-- 操作栏 -->
            <div class="action-bar">
                
            </div>

            <!-- 数据表格 -->
            <div class="table-container">
                <el-table 
                    :data="tableData" 
                    border 
                    style="width: 100%" 
                    height="100%">
                    <el-table-column prop="eventName" label="物流事件名称" min-width="150"></el-table-column>
                    <el-table-column prop="amazonEvent" label="绑定亚马逊物流事件" min-width="200"></el-table-column>
                    <el-table-column prop="notifyCustomer" label="是否需要通知客户" min-width="150" align="center">
                        <template #default="scope">
                            <el-tag :type="scope.row.notifyCustomer === '是' ? 'success' : 'info'" effect="plain">
                                {{ scope.row.notifyCustomer }}
                            </el-tag>
                        </template>
                    </el-table-column>
                    <el-table-column prop="status" label="状态" min-width="100" align="center">
                        <template #default="scope">
                            <el-tag :type="scope.row.status === '正常' ? 'success' : 'danger'" effect="plain">
                                {{ scope.row.status }}
                            </el-tag>
                        </template>
                    </el-table-column>
                    <el-table-column prop="createTime" label="创建时间" min-width="160"></el-table-column>
                    <el-table-column prop="updateTime" label="更新时间" min-width="160"></el-table-column>
                    <el-table-column label="操作" width="160" align="center" fixed="right">
                        <template #default="scope">
                            <el-button link type="primary" size="small" @click="openDialog('edit', scope.row)">
                                编辑
                            </el-button>
                            <el-button 
                                link 
                                :type="scope.row.status === '正常' ? 'danger' : 'success'" 
                                size="small" 
                                @click="toggleStatus(scope.row)">
                                {{ scope.row.status === '正常' ? '冻结' : '启用' }}
                            </el-button>
                        </template>
                    </el-table-column>
                </el-table>
            </div>

            <!-- 分页 -->
            <div class="pagination-container">
                <el-pagination
                    v-model:current-page="currentPage"
                    v-model:page-size="pageSize"
                    :page-sizes="[10, 20, 50, 100]"
                    layout="total, sizes, prev, pager, next, jumper"
                    :total="total">
                </el-pagination>
            </div>
        </div>

        <!-- 新增/编辑弹窗 -->
        <el-dialog 
            :title="dialogType === 'add' ? '新增物流事件' : '编辑物流事件'" 
            v-model="dialogVisible" 
            width="650px"
            destroy-on-close>
            <div style="padding: 10px 0; max-height: 60vh; overflow-y: auto;">
                <div class="a11y-form-group">
                    <label for="event-name-input" class="a11y-form-label">
                        <span style="color: #F56C6C; margin-right: 4px;">*</span>物流事件名称
                    </label>
                    <el-input 
                        id="event-name-input"
                        v-model="formData.eventName" 
                        placeholder="请输入物流事件名称 (必填)">
                    </el-input>
                </div>

                <div class="a11y-form-group">
                    <label for="amazon-event-select" class="a11y-form-label">
                        绑定亚马逊物流事件
                    </label>
                    <el-select 
                        id="amazon-event-select"
                        v-model="formData.amazonEvent" 
                        placeholder="请选择绑定的亚马逊物流事件 (非必填)"
                        style="width: 100%;"
                        clearable>
                        <el-option label="已开船/已起飞-VD/NS" value="已开船/已起飞-VD/NS"></el-option>
                        <el-option label="船只到港-VA/NS" value="船只到港-VA/NS"></el-option>
                    </el-select>
                </div>

                <div class="a11y-form-group">
                    <label for="notify-select" class="a11y-form-label">
                        <span style="color: #F56C6C; margin-right: 4px;">*</span>是否需要通知客户
                    </label>
                    <el-select 
                        id="notify-select"
                        v-model="formData.notifyCustomer" 
                        placeholder="请选择"
                        style="width: 100%;">
                        <el-option label="是" value="是"></el-option>
                        <el-option label="否" value="否"></el-option>
                    </el-select>
                </div>

                <!-- 事件话术模板区块 -->
                <div class="a11y-form-group" style="background-color: #fdfdfd; padding: 16px; border-radius: 4px; border: 1px solid #ebeef5;">
                    <label class="a11y-form-label">
                        <span style="color: #F56C6C; margin-right: 4px;">*</span>事件话术模板
                    </label>
                    <el-input 
                        type="textarea"
                        :rows="3"
                        v-model="formData.eventTemplate" 
                        placeholder="输入固定描述，添加占位符，形成话术模板。(必填)">
                    </el-input>
                    <div class="placeholder-tags">
                        <div style="font-size: 12px; color: #909399; margin-bottom: 8px;">占位符可选项（点击复选框插入占位符）：</div>
                        <el-checkbox-group v-model="formData.eventPlaceholders">
                            <el-checkbox label="本地仓名称">本地仓名称</el-checkbox>
                            <el-checkbox label="海外仓代码">海外仓代码</el-checkbox>
                            <el-checkbox label="预计到港时间">预计到港时间</el-checkbox>
                        </el-checkbox-group>
                    </div>
                </div>

                <!-- 通知话术模板区块 -->
                <div class="a11y-form-group" style="background-color: #fdfdfd; padding: 16px; border-radius: 4px; border: 1px solid #ebeef5;">
                    <label class="a11y-form-label">
                        <span v-if="formData.notifyCustomer === '是'" style="color: #F56C6C; margin-right: 4px;">*</span>通知话术模板
                    </label>
                    <el-input 
                        type="textarea"
                        :rows="3"
                        v-model="formData.notifyTemplate" 
                        placeholder="输入固定描述，添加占位符，形成话术模板。&#10;备注：【是否需要通知客户】为是时，该字段必填。">
                    </el-input>
                    <div class="placeholder-tags">
                        <div style="font-size: 12px; color: #909399; margin-bottom: 8px;">占位符可选项（点击复选框插入占位符）：</div>
                        <el-checkbox-group v-model="formData.notifyPlaceholders">
                            <el-checkbox label="客户名称">客户名称</el-checkbox>
                            <el-checkbox label="订单号">订单号</el-checkbox>
                            <el-checkbox label="本地仓名称">本地仓名称</el-checkbox>
                            <el-checkbox label="海外仓代码">海外仓代码</el-checkbox>
                        </el-checkbox-group>
                    </div>
                </div>
            </div>
            <template #footer>
                <span class="dialog-footer">
                    <el-button @click="dialogVisible = false">返回</el-button>
                    <el-button type="primary" @click="saveData">确定</el-button>
                </span>
            </template>
        </el-dialog>
    </div>

    <script>
        const { createApp, ref, reactive, watch } = Vue;

        const app = createApp({
            setup() {
                // 搜索表单
                const searchForm = reactive({
                    eventName: '',
                    amazonEvent: ''
                });

                // 表格数据
                const tableData = ref([
                    { 
                        id: 1, 
                        eventName: '已开船', 
                        openScope: ['提单', '运单'],
                        amazonEvent: '已开船/已起飞-VD/NS', 
                        notifyCustomer: '是',
                        eventTemplate: '货物已于[预计开船时间]开船',
                        eventPlaceholders: [],
                        notifyTemplate: '尊敬的[客户名称]，您的订单[订单号]已开船。',
                        notifyPlaceholders: ['客户名称', '订单号'],
                        status: '正常',
                        createTime: '2023-10-01 10:00',
                        updateTime: '2023-10-01 10:00'
                    },
                    { 
                        id: 2, 
                        eventName: '货物已入仓', 
                        openScope: ['运单'],
                        amazonEvent: '', 
                        notifyCustomer: '否',
                        eventTemplate: '货物已安全到达[本地仓名称]',
                        eventPlaceholders: ['本地仓名称'],
                        notifyTemplate: '',
                        notifyPlaceholders: [],
                        status: '已冻结',
                        createTime: '2023-10-02 11:30',
                        updateTime: '2023-10-05 09:15'
                    }
                ]);
                
                // 分页
                const currentPage = ref(1);
                const pageSize = ref(10);
                const total = ref(2);
                
                // 搜索逻辑
                const handleSearch = () => {
                    ElementPlus.ElMessage.success('执行搜索');
                };
                const resetSearch = () => {
                    searchForm.eventName = '';
                    searchForm.amazonEvent = '';
                    ElementPlus.ElMessage.success('已重置搜索条件');
                };

                // 切换状态 (启用/冻结)
                const toggleStatus = (row) => {
                    const action = row.status === '正常' ? '冻结' : '启用';
                    ElementPlus.ElMessageBox.confirm(
                        `确定要${action}事件【${row.eventName}】吗？`,
                        `${action}提示`,
                        {
                            confirmButtonText: '确定',
                            cancelButtonText: '取消',
                            type: 'warning',
                        }
                    ).then(() => {
                        row.status = row.status === '正常' ? '已冻结' : '正常';
                        ElementPlus.ElMessage.success(`已${action}`);
                    }).catch(() => {});
                };

                // 弹窗控制
                const dialogVisible = ref(false);
                const dialogType = ref('add');
                const formData = reactive({
                    id: null,
                    eventName: '',
                    amazonEvent: '',
                    notifyCustomer: '是',
                    eventTemplate: '',
                    eventPlaceholders: [],
                    notifyTemplate: '',
                    notifyPlaceholders: []
                });

                // 打开弹窗
                const openDialog = (type, row) => {
                    dialogType.value = type;
                    if (type === 'edit' && row) {
                        formData.id = row.id;
                        formData.eventName = row.eventName;
                        formData.amazonEvent = row.amazonEvent || '';
                        formData.notifyCustomer = row.notifyCustomer;
                        formData.eventTemplate = row.eventTemplate || '';
                        formData.eventPlaceholders = [...row.eventPlaceholders];
                        formData.notifyTemplate = row.notifyTemplate || '';
                        formData.notifyPlaceholders = [...row.notifyPlaceholders];
                    } else {
                        formData.id = null;
                        formData.eventName = '';
                        formData.amazonEvent = '';
                        formData.notifyCustomer = '是';
                        formData.eventTemplate = '';
                        formData.eventPlaceholders = [];
                        formData.notifyTemplate = '';
                        formData.notifyPlaceholders = [];
                    }
                    dialogVisible.value = true;
                };

                // 监听复选框变化，自动向文本框中插入或移除占位符
                watch(() => formData.eventPlaceholders, (newVal, oldVal) => {
                    if (!oldVal) return;
                    const added = newVal.filter(x => !oldVal.includes(x));
                    if (added.length > 0) {
                        formData.eventTemplate += `[${added[0]}]`;
                    }
                });

                watch(() => formData.notifyPlaceholders, (newVal, oldVal) => {
                    if (!oldVal) return;
                    const added = newVal.filter(x => !oldVal.includes(x));
                    if (added.length > 0) {
                        formData.notifyTemplate += `[${added[0]}]`;
                    }
                });

                // 保存数据
                const saveData = () => {
                    if (!formData.eventName.trim()) {
                        ElementPlus.ElMessage.warning('请输入物流事件名称');
                        return;
                    }
                    if (!formData.notifyCustomer) {
                        ElementPlus.ElMessage.warning('请选择是否需要通知客户');
                        return;
                    }
                    
                    // 条件校验：事件话术模板始终必填（不论选是或否，目前逻辑等价于必填）
                    if (!formData.eventTemplate.trim()) {
                        ElementPlus.ElMessage.warning('【事件话术模板】必填');
                        return;
                    }
                    
                    // 条件校验：通知客户为是时，通知话术模板必填
                    if (formData.notifyCustomer === '是' && !formData.notifyTemplate.trim()) {
                        ElementPlus.ElMessage.warning('当【是否需要通知客户】为是时，【通知话术模板】必填');
                        return;
                    }
                    
                    ElementPlus.ElMessage.success(dialogType.value === 'add' ? '新增成功' : '编辑成功');
                    dialogVisible.value = false;
                };

                return {
                    searchForm,
                    tableData,
                    currentPage,
                    pageSize,
                    total,
                    handleSearch,
                    resetSearch,
                    toggleStatus,
                    dialogVisible,
                    dialogType,
                    formData,
                    openDialog,
                    saveData
                };
            }
        });

        // 注册所有 Element Plus 图标
        if (window.ElementPlusIconsVue) {
            for (const [key, component] of Object.entries(window.ElementPlusIconsVue)) {
                app.component(key, component);
            }
        }

        app.use(ElementPlus);
        app.mount('#app');
    </script>
</body>
</html>
