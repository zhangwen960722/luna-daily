<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>重量段模板 - 超级运价</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
<script src="https://unpkg.com/element-plus"></script>
<style>
:root{--el-color-primary:#2DA44E}
body,html{margin:0;padding:0;background:#f0f2f5;font-family:"Helvetica Neue",Helvetica,"PingFang SC","Hiragino Sans GB","Microsoft YaHei","微软雅黑",Arial,sans-serif;height:100%}
#app{padding:20px;box-sizing:border-box;height:100%;display:flex;flex-direction:column}
.content-card{background:#fff;padding:20px;border-radius:4px;box-shadow:0 1px 4px rgba(0,21,41,.08);margin-bottom:16px}
.main-content{flex:1;display:flex;flex-direction:column;margin-bottom:0}
.search-area{display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap}
.search-item{display:flex;flex-direction:column;gap:8px}
.search-item label{color:#606266;font-size:14px;font-weight:500}
.btn-search-primary{background-color:#2DA44E!important;border-color:#2DA44E!important;color:#FFF!important;height:32px}
.btn-search-reset{background-color:#FFF!important;border-color:#DCDFE6!important;color:#000!important;height:32px}
.table-container{flex:1;overflow:hidden}
.el-table th.el-table__cell{background-color:#FAFAFA!important;color:#303133;font-weight:500}
.is-readonly { pointer-events: none; opacity: 0.7; }
</style>
</head>
<body>
<div id="app">
  <div class="content-card">
    <div class="search-area">
      <div style="display:flex;align-items:center;gap:8px"><el-select v-model="filterTransport" placeholder="全部运输方式" clearable size="small" style="width:140px"><el-option label="海运" :value="10"></el-option><el-option label="空运" :value="20"></el-option></el-select></div>
      <div style="display:flex;align-items:center;gap:8px"><el-select v-model="filterUnit" placeholder="全部计价单位" clearable size="small" style="width:140px"><el-option label="KG" value="KG"></el-option><el-option label="m³" value="m³"></el-option></el-select></div>
      <el-button class="btn-search-primary" @click="doSearch">查询</el-button>
      <el-button class="btn-search-reset" @click="resetSearch">重置</el-button>
      <div style="margin-left:auto"><el-button type="primary" @click="addRow">新增模板行</el-button></div>
    </div>
  </div>
  <div class="content-card main-content">
    <div class="table-container">
      <el-table :data="filteredList" border height="100%" style="width:100%">
        <el-table-column label="运输方式" min-width="100"><template #default="s">{{ s.row.transportLabel }}</template></el-table-column>
        <el-table-column label="计价单位" min-width="100" align="center"><template #default="s">{{ s.row.unit }}</template></el-table-column>
        <el-table-column prop="tierName" label="段名称" min-width="150"></el-table-column>
        <el-table-column label="起始值" min-width="120" align="right"><template #default="s">{{ s.row.startVal }}</template></el-table-column>
        <el-table-column label="结束值" min-width="120" align="right"><template #default="s">{{ s.row.endVal!=null?s.row.endVal:'以上' }}</template></el-table-column>
        <el-table-column label="状态" min-width="80" align="center"><template #default="s"><el-tag :type="s.row.enabled?'success':'danger'">{{s.row.enabled?'正常':'已冻结'}}</el-tag></template></el-table-column>
        <el-table-column label="操作" min-width="140" align="center" fixed="right">
          <template #default="s">
            <el-button size="small" @click="editRow(s.row)">编辑</el-button>
            <el-button size="small" :type="s.row.enabled?'danger':'success'" @click="toggleStatus(s.row)">{{s.row.enabled?'冻结':'启用'}}</el-button>
          </template>
        </el-table-column>
      </el-table>
    </div>
  </div>
  <el-dialog v-model="showEdit" :title="editMode?(isReadonly?'查看重量段':'编辑重量段'):'新增重量段'" width="480px" :close-on-click-modal="false">
    <div :class="{'is-readonly': isReadonly}">
    <el-form :model="form" label-width="100px">
      <el-form-item label="运输方式" required><el-select v-model="form.transportMode" style="width:100%"><el-option label="海运" :value="10"></el-option><el-option label="空运" :value="20"></el-option></el-select></el-form-item>
      <el-form-item label="计价单位" required><el-select v-model="form.unit" style="width:100%"><el-option label="KG" value="KG"></el-option><el-option label="m³" value="m³"></el-option></el-select></el-form-item>
      <el-form-item label="段名称" required><el-input v-model="form.tierName" placeholder="如 101KG+"></el-input></el-form-item>
      <el-row :gutter="16"><el-col :span="12"><el-form-item label="起始值" required><el-input-number v-model="form.startVal" :min="0" :precision="0" style="width:100%"></el-input-number></el-form-item></el-col><el-col :span="12"><el-form-item label="结束值"><el-input-number v-model="form.endVal" :min="0" :precision="0" style="width:100%"></el-input-number><span style="font-size:11px;color:#909399">留空=以上</span></el-form-item></el-col></el-row>
    </el-form>
    </div>
    <template #footer><el-button @click="showEdit=false">{{ isReadonly ? '关闭' : '取消' }}</el-button><el-button v-if="!isReadonly" type="primary" @click="saveEdit">保存</el-button></template>
  </el-dialog>
</div>
<script>
(function(){
var app=Vue.createApp({
data:function(){return{
  filterTransport:'',filterUnit:'',showEdit:false,editMode:false,editIdx:-1,form:{transportMode:10,unit:'KG',tierName:'',startVal:0,endVal:null},
  list:[
    {transportMode:10,transportLabel:'海运',unit:'KG',tierName:'8KG+',startVal:8,endVal:101,sortOrder:1,enabled:true},
    {transportMode:10,transportLabel:'海运',unit:'KG',tierName:'101KG+',startVal:101,endVal:null,sortOrder:2,enabled:true},
    {transportMode:10,transportLabel:'海运',unit:'m³',tierName:'2m³+',startVal:2,endVal:null,sortOrder:1,enabled:true},
    {transportMode:20,transportLabel:'空运',unit:'KG',tierName:'12KG+',startVal:12,endVal:21,sortOrder:1,enabled:true},
    {transportMode:20,transportLabel:'空运',unit:'KG',tierName:'21KG+',startVal:21,endVal:51,sortOrder:2,enabled:true},
    {transportMode:20,transportLabel:'空运',unit:'KG',tierName:'51KG+',startVal:51,endVal:101,sortOrder:3,enabled:true},
    {transportMode:20,transportLabel:'空运',unit:'KG',tierName:'101KG+',startVal:101,endVal:null,sortOrder:4,enabled:true}
  ]
}},computed:{
  isReadonly: function(){ return this.editMode && this.list[this.editIdx] && !this.list[this.editIdx].enabled; },
  filteredList:function(){var self=this;return self.list.filter(function(x){if(self.filterTransport&&x.transportMode!==self.filterTransport)return false;if(self.filterUnit&&x.unit!==self.filterUnit)return false;return true})}
},methods:{
  doSearch:function(){ElementPlus.ElMessage.success('查询完成')},
  resetSearch:function(){this.filterTransport='';this.filterUnit=''},
  addRow:function(){this.editMode=false;this.form={transportMode:10,unit:'KG',tierName:'',startVal:0,endVal:null};this.showEdit=true},
  toggleStatus:function(row){var self=this;var action=row.enabled?'冻结':'启用';ElementPlus.ElMessageBox.confirm('确定要'+action+'该重量段吗？','状态变更提示',{type:'warning'}).then(function(){row.enabled=!row.enabled;ElementPlus.ElMessage.success('已成功'+action)}).catch(function(){})},
  editRow:function(row){this.editMode=true;this.editIdx=this.list.indexOf(row);this.form={transportMode:row.transportMode,unit:row.unit,tierName:row.tierName,startVal:row.startVal,endVal:row.endVal};this.showEdit=true},
  saveEdit:function(){
    if(!this.form.tierName){ElementPlus.ElMessage.warning('请输入段名称');return}
    var transportLabel=this.form.transportMode===10?'海运':'空运';
    if(this.editMode){var row=this.list[this.editIdx];row.transportMode=this.form.transportMode;row.transportLabel=transportLabel;row.unit=this.form.unit;row.tierName=this.form.tierName;row.startVal=this.form.startVal;row.endVal=this.form.endVal;ElementPlus.ElMessage.success('重量段模板已更新')}
    else{this.list.push({transportMode:this.form.transportMode,transportLabel:transportLabel,unit:this.form.unit,tierName:this.form.tierName,startVal:this.form.startVal,endVal:this.form.endVal,sortOrder:this.list.length+1,enabled:true});ElementPlus.ElMessage.success('重量段模板已新增')}
    this.showEdit=false
  }
}});
app.use(ElementPlus);app.mount('#app');
})();
</script>
</body>
</html>
