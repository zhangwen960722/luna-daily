<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亚马逊物流事件 - 主列表</title>
    <!-- 引入 Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- 引入 Element Plus 样式 -->
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
    <!-- 引入 Element Plus 组件库 -->
    <script src="https://unpkg.com/element-plus"></script>
    <!-- 引入 Element Plus 图标 -->
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <style>
        :root {
            --el-color-primary: #2DA44E;
            --el-color-primary-light-3: #6bc083;
            --el-color-primary-light-5: #95cfa4;
            --el-color-primary-light-7: #bee5c6;
            --el-color-primary-light-8: #d3efe8;
            --el-color-primary-light-9: #e9f7ea;
            --el-color-primary-dark-2: #24833e;
        }
        body, html {
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "微软雅黑", Arial, sans-serif;
            height: 100%;
        }
        #app {
            padding: 20px;
            box-sizing: border-box;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .main-content {
            background-color: #fff;
            padding: 20px;
            border-radius: 4px;
            box-shadow: 0 1px 4px rgba(0,21,41,.08);
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .action-bar {
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .table-container {
            flex: 1;
            overflow: hidden;
        }
        .pagination-container {
            margin-top: 16px;
            display: flex;
            justify-content: flex-end;
        }
        
        /* 表格首行视觉区分优化 */
        .el-table th.el-table__cell {
            background-color: #FAFAFA !important;
            color: #303133;
            font-weight: 500;
        }

        /* 无障碍表单布局 (响应式标签间距) */
        .a11y-form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 16px;
        }
        .a11y-form-label {
            font-size: 14px;
            color: #606266;
            margin-bottom: 8px; /* 桌面端 8px 间距 */
            font-weight: 500;
            text-align: left;
            line-height: 1.2;
        }
        @media screen and (max-width: 768px) {
            .a11y-form-label {
                margin-bottom: 12px; /* 移动端 12px 间距 */
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 主体内容 -->
        <div class="main-content">
            <!-- 操作栏 -->
            <div class="action-bar" style="justify-content: flex-end;">
                <div>
                    <el-button type="primary" @click="openDialog('add')">
                        <el-icon style="margin-right: 4px;"><Plus /></el-icon>新增
                    </el-button>
                </div>
            </div>

            <!-- 数据表格 -->
            <div class="table-container">
                <el-table 
                    :data="tableData" 
                    border 
                    style="width: 100%" 
                    height="100%">
                    <el-table-column prop="eventName" label="亚马逊物流事件名称" min-width="200"></el-table-column>
                    <el-table-column prop="eventCode" label="亚马逊物流事件代码" min-width="200"></el-table-column>
                    <el-table-column label="操作" width="150" align="center" fixed="right">
                        <template #default="scope">
                            <el-button link type="primary" size="small" @click="openDialog('edit', scope.row)">
                                编辑
                            </el-button>
                        </template>
                    </el-table-column>
                </el-table>
            </div>

            <!-- 分页 -->
            <div class="pagination-container">
                <el-pagination
                    v-model:current-page="currentPage"
                    v-model:page-size="pageSize"
                    :page-sizes="[10, 20, 50, 100]"
                    layout="total, sizes, prev, pager, next, jumper"
                    :total="total">
                </el-pagination>
            </div>
        </div>

        <!-- 新增/编辑弹窗 -->
        <el-dialog 
            :title="dialogType === 'add' ? '新增亚马逊物流事件' : '编辑亚马逊物流事件'" 
            v-model="dialogVisible" 
            width="500px"
            destroy-on-close>
            <div style="padding: 10px 0;">
                <div class="a11y-form-group">
                    <label for="event-name-input" class="a11y-form-label">
                        <span style="color: #F56C6C; margin-right: 4px;">*</span>亚马逊物流事件名称
                    </label>
                    <el-input 
                        id="event-name-input"
                        v-model="formData.eventName" 
                        placeholder="请输入亚马逊物流事件名称">
                    </el-input>
                </div>
                
                <div class="a11y-form-group">
                    <label for="event-code-input" class="a11y-form-label">
                        <span style="color: #F56C6C; margin-right: 4px;">*</span>亚马逊物流事件代码
                    </label>
                    <el-input 
                        id="event-code-input"
                        v-model="formData.eventCode" 
                        placeholder="请输入亚马逊物流事件代码 (如 K1/O1)">
                    </el-input>
                </div>
            </div>
            <template #footer>
                <span class="dialog-footer">
                    <el-button @click="dialogVisible = false">返回</el-button>
                    <el-button type="primary" @click="saveData">确定</el-button>
                </span>
            </template>
        </el-dialog>
    </div>

    <script>
        const { createApp, ref, reactive } = Vue;

        const app = createApp({
            setup() {
                // 表格数据
                const tableData = ref([
                    { id: 1, eventName: '出口报关查验', eventCode: 'K1/O1' },
                    { id: 2, eventName: '货物已离港', eventCode: 'D1' },
                    { id: 3, eventName: '货物已到港', eventCode: 'A1' },
                    { id: 4, eventName: '进口清关查验', eventCode: 'K2' },
                    { id: 5, eventName: '海外仓接收', eventCode: 'R1' }
                ]);
                
                // 分页
                const currentPage = ref(1);
                const pageSize = ref(10);
                const total = ref(5);
                
                // 弹窗控制
                const dialogVisible = ref(false);
                const dialogType = ref('add');
                const formData = reactive({
                    id: null,
                    eventName: '',
                    eventCode: ''
                });

                // 打开弹窗
                const openDialog = (type, row) => {
                    dialogType.value = type;
                    if (type === 'edit' && row) {
                        formData.id = row.id;
                        formData.eventName = row.eventName;
                        formData.eventCode = row.eventCode;
                    } else {
                        formData.id = null;
                        formData.eventName = '';
                        formData.eventCode = '';
                    }
                    dialogVisible.value = true;
                };

                // 保存数据
                const saveData = () => {
                    if (!formData.eventName.trim()) {
                        ElementPlus.ElMessage.warning('请输入亚马逊物流事件名称');
                        return;
                    }
                    if (!formData.eventCode.trim()) {
                        ElementPlus.ElMessage.warning('请输入亚马逊物流事件代码');
                        return;
                    }
                    
                    ElementPlus.ElMessage.success(dialogType.value === 'add' ? '新增成功' : '编辑成功');
                    dialogVisible.value = false;
                };

                return {
                    tableData,
                    currentPage,
                    pageSize,
                    total,
                    dialogVisible,
                    dialogType,
                    formData,
                    openDialog,
                    saveData
                };
            }
        });

        // 注册所有 Element Plus 图标
        if (window.ElementPlusIconsVue) {
            for (const [key, component] of Object.entries(window.ElementPlusIconsVue)) {
                app.component(key, component);
            }
        }

        app.use(ElementPlus);
        app.mount('#app');
    </script>
</body>
</html>
