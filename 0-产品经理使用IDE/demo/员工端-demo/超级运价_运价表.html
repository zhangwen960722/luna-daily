<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>运价查询 - 超级运价</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
<script src="https://unpkg.com/element-plus"></script>
<style>
:root{--el-color-primary:#2DA44E;--bg:#F0F2F5;--card-bg:#fff;--text:#303133;--text-secondary:#909399}
*{box-sizing:border-box}
body{margin:0;padding:16px;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);font-size:14px;line-height:1.5}
.top-nav{display:none}
.top-nav .logo{font-weight:700;font-size:16px;color:var(--el-color-primary)}
.top-nav .breadcrumb{font-size:13px;color:var(--text-secondary)}
.top-nav .breadcrumb span{color:var(--text)}
.page{padding:16px 20px;max-width:1400px;margin:0 auto}
.page-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.page-hd-left h2{margin:0;font-size:18px;font-weight:600}
.page-hd-left .subtitle{margin-top:4px;font-size:13px;color:var(--text-secondary)}
.page-hd-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.card{background:var(--card-bg);border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);padding:20px;margin-bottom:16px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.card-header h3{margin:0;font-size:15px;font-weight:600}
.filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.el-table th{background:#FAFAFA!important;color:#606266;font-weight:600;font-size:13px}
.el-table td{font-size:13px}
.empty-state{text-align:center;padding:48px 20px;color:var(--text-secondary)}
.empty-state p{margin:8px 0}
.price-red{color:#F53F3F;font-weight:bold}
.price-yellow{color:#E6A23C;font-weight:bold}
.price-green{color:#2DA44E;font-weight:bold}
.query-section{border-bottom:1px solid #EBEEF5;padding-bottom:16px;margin-bottom:12px}
.query-section:last-child{border-bottom:none;padding-bottom:0;margin-bottom:0}
</style>
</head>
<body>
<div id="app">
  <div class="top-nav">
    <div><span class="logo">飞点 TMS</span><span class="breadcrumb"> / 头程管理 / <span>运价查询</span></span></div>
    <span style="font-size:12px;color:var(--text-secondary)">超级运价 v1.0</span>
  </div>
  <div class="page" style="padding: 0; margin: 0; max-width: none;">
    
    </div>
    <div class="card" style="margin-bottom: 0;">

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h3 style="margin:0;font-size:15px;font-weight:600">运价查询</h3>
        <div style="display:flex;align-items:center;gap:8px;">
          
        </div>
      </div>
      <div class="query-section">
        <el-form :inline="true" :model="q">
          <el-form-item label="目的国" required><el-select v-model="q.dest" style="width:100px"><el-option label="美国" value="US"></el-option></el-select></el-form-item>
          <el-form-item label="目的仓点" required><el-select v-model="q.wh" filterable style="width:120px"><el-option label="ONT8" value="ONT8"></el-option><el-option label="LAX9" value="LAX9"></el-option></el-select></el-form-item>
          <el-form-item label="件数" required><el-input-number v-model="q.pcs" :min="1" style="width:90px"></el-input-number></el-form-item>
          <el-form-item label="单件重量(kg)" required><el-input-number v-model="q.wt" :min="0.1" :step="0.1" :precision="1" style="width:120px"></el-input-number></el-form-item>
          <el-form-item label="计费方式"><el-checkbox-group v-model="q.bill"><el-checkbox label="KG"></el-checkbox><el-checkbox label="CBM"></el-checkbox></el-checkbox-group></el-form-item>
          <el-form-item><el-button type="primary" @click="go">查询报价</el-button></el-form-item>
        </el-form>
      </div>
      <div class="query-section">
        <el-form :inline="true">
          <el-form-item label="运输方式"><el-select v-model="q.mode" clearable placeholder="不限" style="width:90px"><el-option label="海运" value="sea"></el-option><el-option label="空运" value="air"></el-option></el-select></el-form-item>
          <el-form-item label="服务渠道"><el-select v-model="q.ch" clearable placeholder="不限" style="width:120px"><el-option label="美森360" value="USMS360"></el-option><el-option label="美森432" value="USMS432"></el-option></el-select></el-form-item>
          <el-form-item label="包税方式"><el-select v-model="q.tax" clearable placeholder="不限" style="width:90px"><el-option label="包税" value="tax"></el-option><el-option label="不包税" value="notax"></el-option></el-select></el-form-item>
          <el-form-item label="交货地"><el-select v-model="q.pu" style="width:100px"><el-option label="珠三角" value="珠三角"></el-option><el-option label="汕头" value="汕头"></el-option><el-option label="义乌" value="义乌"></el-option></el-select></el-form-item>
          <el-form-item label="客户"><el-select v-model="q.cust" clearable filterable placeholder="选填" style="width:160px"><el-option label="深圳市XX科技(VIP)" value="C001"></el-option></el-select></el-form-item>
          <el-form-item label="产品类型"><el-select v-model="q.prodType" clearable placeholder="选填" style="width:100px"><el-option label="粉末" value="powder"></el-option><el-option label="液体" value="liquid"></el-option><el-option label="带电" value="battery"></el-option></el-select></el-form-item>
        </el-form>
      </div>
      <div class="query-section">
        <el-form :inline="true">
          <el-form-item label="单件尺寸(cm)">
            <el-input-number v-model="q.len" :min="0" :precision="1" placeholder="长" style="width:72px"></el-input-number>
            <span style="margin:0 4px;color:#909399">×</span>
            <el-input-number v-model="q.wid" :min="0" :precision="1" placeholder="宽" style="width:72px"></el-input-number>
            <span style="margin:0 4px;color:#909399">×</span>
            <el-input-number v-model="q.ht" :min="0" :precision="1" placeholder="高" style="width:72px"></el-input-number>
            <span style="margin-left:8px;font-size:12px;color:#909399">选填，用于匹配公式阈值型附加费</span>
          </el-form-item>
        </el-form>
      </div>
    </div>
    <div class="card" v-if="show">
      <div class="card-header">
        <h3>{{ q.pcs }} 件 × {{ q.wt }} kg，{{ q.wh }}，总重 {{ q.pcs * q.wt }} kg</h3>
      </div>
      <el-table :data="r" border stripe>
        <el-table-column prop="ch" label="渠道" min-width="120"></el-table-column>
        <el-table-column prop="bill" label="计价" width="60"></el-table-column>
        <el-table-column prop="pub" label="公布价" min-width="100"></el-table-column>
        <el-table-column label="运费优惠后" min-width="100"><template #default="s">{{ s.row.disc || '-' }}</template></el-table-column>
        <el-table-column label="附加费" min-width="200"><template #default="s"><span v-for="x in s.row.surch" style="margin-right:8px;font-size:12px">{{ x }}</span></template></el-table-column>
        <el-table-column label="最终报价" min-width="110"><template #default="s"><span :class="s.row.fp>=s.row.cost*1.05?'price-green':(s.row.fp>=s.row.cost?'price-yellow':'price-red')">{{ s.row.fp }}/KG</span></template></el-table-column>
        <el-table-column label="盈亏" width="60"><template #default="s"><span v-if="s.row.fp>=s.row.cost*1.05">🟢</span><span v-else-if="s.row.fp>=s.row.cost">🟡</span><span v-else>🔴</span></template></el-table-column>
        <el-table-column prop="sail" label="船期" min-width="160"></el-table-column>
        <el-table-column prop="pick" label="最快提取" min-width="90"></el-table-column>
      </el-table>
      <p v-if="un" style="color:#E6A23C;margin-top:12px;font-size:13px">快船600、奥克兰744：ONT8 暂无报价记录（暂未报价，二期进入在线询价）</p>
    </div>
  </div>
</div>
<script>
(function(){var app=Vue.createApp({data:function(){return{show:false,un:true,q:{dest:'US',wh:'ONT8',pcs:3,wt:60,bill:['KG'],mode:null,ch:null,tax:null,pu:'珠三角',cust:null,prodType:null,len:null,wid:null,ht:null},r:[]}},methods:{go:function(){this.show=true;var v=this.q.cust?0.9:1;this.r=[{ch:'美森360',bill:'KG',pub:'10.0',disc:(10*v).toFixed(1),surch:['粉末+1.5/KG (优惠后1.0/KG)'],fp:(10*v+1).toFixed(1),cost:9.71,sail:'1/28-2/8 航程11天',pick:'2/10'},{ch:'美森432',bill:'KG',pub:'9.7',disc:this.q.cust?'8.7':'-',surch:['粉末+1.5/KG (优惠后1.0/KG)'],fp:(9.7*v+1).toFixed(1),cost:9.0,sail:'1/29-2/9 航程11天',pick:'2/11'},{ch:'EX456',bill:'KG',pub:'5.6',disc:'-',surch:['粉末+1.5/KG (优惠后1.0/KG)'],fp:(5.6*v+1).toFixed(1),cost:4.8,sail:'1/28-2/11 航程14天',pick:'2/14'}]}}});app.use(ElementPlus);app.mount('#app')})();
</script>
</body>
</html>
