<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>利润策略 - 超级运价</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
<script src="https://unpkg.com/element-plus"></script>
<style>
:root{--el-color-primary:#2DA44E}
body,html{margin:0;padding:0;background:#f0f2f5;font-family:"Helvetica Neue",Helvetica,"PingFang SC","Hiragino Sans GB","Microsoft YaHei","微软雅黑",Arial,sans-serif;height:100%}
#app{padding:20px;box-sizing:border-box;height:100%;display:flex;flex-direction:column}
.content-card{background:#fff;padding:20px;border-radius:4px;box-shadow:0 1px 4px rgba(0,21,41,.08);margin-bottom:16px}
.main-content{flex:1;display:flex;flex-direction:column;margin-bottom:0}
.table-container{flex:1;overflow:hidden}
.el-table th.el-table__cell{background-color:#FAFAFA!important;color:#303133;font-weight:500}
.is-readonly { pointer-events: none; opacity: 0.7; }
</style>
</head>
<body>
<div id="app">
  <div class="content-card main-content">
    <div style="margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">
      <h2 style="margin:0;font-size:16px;font-weight:600">利润策略</h2>
      <el-button type="primary" @click="addRow">新增策略</el-button>
    </div>
    <div class="table-container">
      <el-table :data="list" border height="100%" style="width:100%">
        <el-table-column prop="name" label="策略名称" min-width="200"></el-table-column>
        <el-table-column label="默认利润率" width="120" align="right"><template #default="s">{{ s.row.rate }}%</template></el-table-column>
        <el-table-column label="适用范围" width="120"><template #default="s">{{ s.row.scopeLabel }}</template></el-table-column>
        <el-table-column label="状态" width="80" align="center"><template #default="s"><el-tag :type="s.row.enabled?'success':'danger'">{{s.row.enabled?'正常':'已冻结'}}</el-tag></template></el-table-column>
        <el-table-column label="操作" width="140" align="center" fixed="right">
          <template #default="s">
            <el-button size="small" @click="editRow(s.row)">编辑</el-button>
            <el-button size="small" :type="s.row.enabled?'danger':'success'" @click="toggleStatus(s.row)">{{s.row.enabled?'冻结':'启用'}}</el-button>
          </template>
        </el-table-column>
      </el-table>
    </div>
  </div>
  <el-dialog v-model="showEdit" :title="editMode?(isReadonly?'查看利润策略':'编辑利润策略'):'新增利润策略'" width="420px" :close-on-click-modal="false">
    <div :class="{'is-readonly': isReadonly}">
    <el-form :model="form" label-width="100px">
      <el-form-item label="策略名称" required><el-input v-model="form.name"></el-input></el-form-item>
      <el-form-item label="默认利润率" required><el-input-number v-model="form.rate" :min="0" :max="99" :precision="1" style="width:160px"></el-input-number> %</el-form-item>
      <el-form-item label="适用范围" required><el-select v-model="form.scope" style="width:100%"><el-option label="全段服务" :value="10"></el-option><el-option label="分段服务" :value="20"></el-option></el-select></el-form-item>
    </el-form>
    </div>
    <template #footer><el-button @click="showEdit=false">{{ isReadonly ? '关闭' : '取消' }}</el-button><el-button v-if="!isReadonly" type="primary" @click="saveEdit">保存</el-button></template>
  </el-dialog>
</div>
<script>
(function(){
var app=Vue.createApp({
data:function(){return{
  showEdit:false,editMode:false,editIdx:-1,form:{name:'',rate:15.0,scope:10},
  list:[{name:'全段默认利润率',rate:15.0,scope:10,scopeLabel:'全段服务',enabled:true},{name:'分段默认利润率',rate:18.0,scope:20,scopeLabel:'分段服务',enabled:true}]
}},
  computed:{
  isReadonly: function(){ return this.editMode && this.list[this.editIdx] && !this.list[this.editIdx].enabled; }
  },
methods:{
  addRow:function(){this.editMode=false;this.form={name:'',rate:15.0,scope:10};this.showEdit=true},
  toggleStatus:function(row){var self=this;var action=row.enabled?'冻结':'启用';ElementPlus.ElMessageBox.confirm('确定要'+action+'该利润策略吗？','状态变更提示',{type:'warning'}).then(function(){row.enabled=!row.enabled;ElementPlus.ElMessage.success('已成功'+action)}).catch(function(){})},
  editRow:function(row){this.editMode=true;this.editIdx=this.list.indexOf(row);this.form={name:row.name,rate:row.rate,scope:row.scope};this.showEdit=true},
  saveEdit:function(){
    if(!this.form.name){ElementPlus.ElMessage.warning('请输入策略名称');return}
    var scopeLabel=this.form.scope===10?'全段服务':'分段服务';
    if(this.editMode){var row=this.list[this.editIdx];row.name=this.form.name;row.rate=this.form.rate;row.scope=this.form.scope;row.scopeLabel=scopeLabel;ElementPlus.ElMessage.success('利润策略已更新')}
    else{this.list.push({name:this.form.name,rate:this.form.rate,scope:this.form.scope,scopeLabel:scopeLabel,enabled:true});ElementPlus.ElMessage.success('利润策略已新增')}
    this.showEdit=false
  }
}});
app.use(ElementPlus);app.mount('#app');
})();
</script>
</body>
</html>
