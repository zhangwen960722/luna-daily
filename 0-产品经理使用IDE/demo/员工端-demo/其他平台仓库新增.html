<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增/编辑其他平台仓库 - 多地址支持优化版</title>
    <!-- 引入 Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- 引入 Element Plus 样式 -->
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
    <!-- 引入 Element Plus 组件库 -->
    <script src="https://unpkg.com/element-plus"></script>
    <!-- 引入 Element Plus 图标 -->
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <style>
        /* 遵循 UI 设计规范的自定义样式 */
        :root {
            --el-color-primary: #2DA44E;
            --el-color-primary-light-3: #2C974B;
            --el-color-danger: #F53F3F;
            --el-border-color: #DCDFE6;
            --el-bg-color: #F5F7FA;
            --el-text-color-primary: #303133;
            --el-text-color-regular: #606266;
            --el-border-radius-base: 4px;
        }
        
        body {
            font-family: Helvetica Neue, Helvetica, PingFang SC, Hiragino Sans GB, Microsoft YaHei, 微软雅黑, Arial, sans-serif;
            background-color: var(--el-bg-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .demo-container {
            width: 860px; /* 稍微加宽以适应多地址布局 */
            background-color: #fff;
            padding: 24px;
            border-radius: var(--el-border-radius-base);
            box-shadow: 0 4px 16px 0 rgba(0, 0, 0, 0.08);
        }

        .dialog-title {
            font-size: 16px;
            color: var(--el-text-color-primary);
            font-weight: 500;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--el-border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .el-form-item__label {
            color: var(--el-text-color-regular);
            font-size: 14px;
            font-weight: 500;
        }

        .form-actions {
            margin-top: 32px;
            text-align: right;
            padding-top: 16px;
            border-bottom: none;
            border-top: 1px solid var(--el-border-color);
        }

        /* 统一输入框宽度 */
        .el-input, .el-select {
            width: 100%;
        }
        
        /* 逻辑分组区块样式 */
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .form-group-title {
            font-size: 14px;
            font-weight: bold;
            color: var(--el-text-color-primary);
            display: flex;
            align-items: center;
        }
        
        .form-group-title::before {
            content: '';
            display: inline-block;
            width: 3px;
            height: 14px;
            background-color: var(--el-color-primary);
            margin-right: 8px;
            border-radius: 2px;
        }

        /* 动态地址块样式 */
        .address-item {
            background-color: #f8f9fb;
            border: 1px solid #ebeef5;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 16px;
            position: relative;
            transition: all 0.3s;
        }

        .address-item:hover {
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.05);
            border-color: #dcdfe6;
        }

        .address-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px dashed #ebeef5;
        }

        .address-index {
            font-size: 13px;
            color: var(--el-text-color-regular);
            font-weight: 600;
            background-color: #e4e7ed;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .btn-remove {
            color: var(--el-color-danger);
            cursor: pointer;
            display: flex;
            align-items: center;
            font-size: 13px;
        }
        
        .btn-remove:hover {
            opacity: 0.8;
        }

        .btn-remove .el-icon {
            margin-right: 4px;
        }

        /* 添加地址按钮 */
        .add-address-btn {
            width: 100%;
            border-style: dashed;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="demo-container">
            <div class="dialog-title">
                <span>{{ isEdit ? '编辑其他平台仓库' : '新增其他平台仓库' }}</span>
                <el-icon style="cursor: pointer; color: #909399;" @click="handleCancel"><Close /></el-icon>
            </div>
            
            <el-form 
                ref="formRef"
                :model="formData" 
                label-position="top" 
                size="default"
            >
                <!-- 基础信息分组 -->
                <div class="form-group">
                    <div class="form-group-title" style="margin-bottom: 16px;">基础信息</div>
                    <el-row :gutter="24">
                        <el-col :span="12">
                            <el-form-item 
                                label="仓库所属平台" 
                                prop="platform"
                                :rules="[{ required: true, message: '请输入仓库所属平台', trigger: 'blur' }]"
                            >
                                <el-input v-model="formData.platform" placeholder="请输入仓库所属平台"></el-input>
                            </el-form-item>
                        </el-col>
                        <el-col :span="12">
                            <el-form-item 
                                label="仓库代码" 
                                prop="warehouseCode"
                                :rules="[{ required: true, message: '请输入仓库代码', trigger: 'blur' }]"
                            >
                                <el-input v-model="formData.warehouseCode" placeholder="请输入仓库代码"></el-input>
                            </el-form-item>
                        </el-col>
                    </el-row>
                </div>

                <!-- 动态地址列表分组 -->
                <div class="form-group">
                    <div class="form-group-header">
                        <div class="form-group-title">地址信息（支持多个）</div>
                    </div>

                    <!-- 循环渲染地址块 -->
                    <div 
                        v-for="(address, index) in formData.addresses" 
                        :key="address.id" 
                        class="address-item"
                    >
                        <div class="address-item-header">
                            <span class="address-index">地址 {{ index + 1 }}</span>
                            <span 
                                class="btn-remove" 
                                v-if="formData.addresses.length > 1"
                                @click="removeAddress(index)"
                            >
                                <el-icon><Delete /></el-icon> 删除地址
                            </span>
                        </div>

                        <el-row :gutter="24">
                            <el-col :span="8">
                                <el-form-item 
                                    label="国家代码" 
                                    :prop="`addresses.${index}.countryCode`"
                                    :rules="[{ required: true, message: '请选择国家', trigger: 'change' }]"
                                >
                                    <el-select v-model="address.countryCode" filterable placeholder="请选择国家">
                                        <el-option label="中国 (CN)" value="CN"></el-option>
                                        <el-option label="美国 (US)" value="US"></el-option>
                                        <el-option label="英国 (UK)" value="UK"></el-option>
                                    </el-select>
                                </el-form-item>
                            </el-col>
                            <el-col :span="8">
                                <el-form-item 
                                    label="州/省" 
                                    :prop="`addresses.${index}.province`"
                                    :rules="[{ required: true, message: '请选择州/省', trigger: 'change' }]"
                                >
                                    <el-select v-model="address.province" filterable placeholder="请选择州/省">
                                        <el-option label="广东省" value="GD"></el-option>
                                        <el-option label="浙江省" value="ZJ"></el-option>
                                        <el-option label="加利福尼亚州" value="CA"></el-option>
                                    </el-select>
                                </el-form-item>
                            </el-col>
                            <el-col :span="8">
                                <el-form-item 
                                    label="城市" 
                                    :prop="`addresses.${index}.city`"
                                    :rules="[{ required: true, message: '请输入城市', trigger: 'blur' }]"
                                >
                                    <el-input v-model="address.city" placeholder="请输入城市"></el-input>
                                </el-form-item>
                            </el-col>
                        </el-row>

                        <el-row :gutter="24">
                            <el-col :span="16">
                                <el-form-item 
                                    label="详细地址" 
                                    :prop="`addresses.${index}.addressDetail`"
                                    :rules="[{ required: true, message: '请输入详细地址', trigger: 'blur' }]"
                                >
                                    <el-input v-model="address.addressDetail" placeholder="请输入街道、门牌号等详细地址"></el-input>
                                </el-form-item>
                            </el-col>
                            <el-col :span="8">
                                <el-form-item 
                                    label="邮编" 
                                    :prop="`addresses.${index}.zipCode`"
                                    :rules="[{ required: true, message: '请输入邮编', trigger: 'blur' }]"
                                >
                                    <el-input v-model="address.zipCode" placeholder="请输入邮编"></el-input>
                                </el-form-item>
                            </el-col>
                        </el-row>

                        <!-- 业务配置移动到地址层级，因为每个地址可能是不同供应商的专用地址 -->
                        <el-row :gutter="24" style="margin-top: 8px;">
                            <el-col :span="8">
                                <el-form-item 
                                    label="是否是供应商专用地址" 
                                    :prop="`addresses.${index}.isSupplierOnly`"
                                >
                                    <el-radio-group v-model="address.isSupplierOnly">
                                        <el-radio label="yes">是</el-radio>
                                        <el-radio label="no">否</el-radio>
                                    </el-radio-group>
                                </el-form-item>
                            </el-col>
                            <!-- 仅当选择“是”时，显示供应商选择框 -->
                            <el-col :span="16">
                                <el-form-item 
                                    label="关联供应商" 
                                    :prop="`addresses.${index}.supplier`"
                                    v-if="address.isSupplierOnly === 'yes'"
                                    :rules="[{ required: true, message: '请选择关联的供应商', trigger: 'change' }]"
                                >
                                    <el-select v-model="address.supplier" multiple filterable placeholder="请选择供应商（可多选）">
                                        <el-option label="深圳顺丰速运" value="SF"></el-option>
                                        <el-option label="圆通国际" value="YTO"></el-option>
                                        <el-option label="FBA官方" value="FBA"></el-option>
                                    </el-select>
                                </el-form-item>
                            </el-col>
                        </el-row>
                    </div>

                    <!-- 添加新地址按钮 -->
                    <el-button class="add-address-btn" @click="addAddress" :icon="Plus">
                        添加新地址
                    </el-button>
                </div>

                <div class="form-actions">
                    <el-button @click="handleCancel">取消</el-button>
                    <el-button type="primary" @click="handleSubmit">确定</el-button>
                </div>
            </el-form>
        </div>
    </div>

    <script>
        const { createApp, ref, reactive, markRaw } = Vue;
        const { ElMessage } = ElementPlus;
        const { Close, Delete, Plus } = ElementPlusIconsVue;

        const app = createApp({
            setup() {
                const formRef = ref(null);
                const isEdit = ref(false);
                
                // 基础的数据模板，用于新增地址时克隆
                const getEmptyAddress = () => ({
                    id: Date.now() + Math.random().toString(36).substr(2, 5), // 唯一标识符，用于 v-for 的 key
                    countryCode: '',
                    province: '',
                    city: '',
                    addressDetail: '',
                    zipCode: '',
                    isSupplierOnly: 'no',
                    supplier: [] // 修改为数组以支持多选
                });

                const formData = reactive({
                    platform: '',
                    warehouseCode: '',
                    // 默认包含一个空地址
                    addresses: [getEmptyAddress()]
                });

                // 初始化编辑数据
                const initEditData = () => {
                    const urlParams = new URLSearchParams(window.location.search);
                    if (urlParams.get('action') === 'edit') {
                        isEdit.value = true;
                        const editDataStr = sessionStorage.getItem('editOtherPlatformData');
                        if (editDataStr) {
                            try {
                                const editData = JSON.parse(editDataStr);
                                formData.platform = editData.platform || '';
                                formData.warehouseCode = editData.warehouseCode || '';
                                formData.addresses[0].countryCode = editData.countryCode || '';
                                formData.addresses[0].province = editData.province || '';
                                formData.addresses[0].city = editData.city || '';
                                formData.addresses[0].addressDetail = editData.detail || '';
                                formData.addresses[0].zipCode = editData.zipCode || '';
                            } catch (e) {
                                console.error('Failed to parse edit data', e);
                            }
                        }
                    }
                };
                initEditData();

                // 添加地址
                const addAddress = () => {
                    formData.addresses.push(getEmptyAddress());
                };

                // 移除地址
                const removeAddress = (index) => {
                    if (formData.addresses.length > 1) {
                        formData.addresses.splice(index, 1);
                    }
                };

                const handleSubmit = async () => {
                    if (!formRef.value) return;
                    await formRef.value.validate((valid, fields) => {
                        if (valid) {
                            console.log('提交的数据：', JSON.stringify(formData, null, 2));
                            ElMessage.success(isEdit.value ? '编辑成功！' : '新增成功！');
                            setTimeout(() => {
                                window.location.href = '海外仓库列表_主列表.html';
                            }, 500);
                        } else {
                            ElMessage.warning('请完善必填信息');
                        }
                    });
                };

                const handleCancel = () => {
                    window.location.href = '海外仓库列表_主列表.html';
                };

                return {
                    isEdit,
                    formRef,
                    formData,
                    addAddress,
                    removeAddress,
                    handleSubmit,
                    handleCancel,
                    Plus: markRaw(Plus)
                };
            }
        });

        // 注册图标
        app.component('Close', Close);
        app.component('Delete', Delete);
        app.use(ElementPlus);
        app.mount('#app');
    </script>
</body>
</html>
