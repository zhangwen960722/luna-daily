<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仓库列表 - 主列表</title>
    <!-- 引入 Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- 引入 Element Plus 样式 -->
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
    <!-- 引入 Element Plus 组件库 -->
    <script src="https://unpkg.com/element-plus"></script>
    <!-- 引入 Element Plus 图标 -->
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <style>
        :root {
            --el-color-primary: #2DA44E;
            --el-color-primary-light-3: #2C974B;
            --el-border-color: #DCDFE6;
            --el-bg-color: #F5F7FA;
            --el-text-color-primary: #303133;
            --el-text-color-regular: #606266;
            --el-border-radius-base: 4px;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Helvetica Neue, Helvetica, PingFang SC, Hiragino Sans GB, Microsoft YaHei, Arial, sans-serif;
            background-color: var(--el-bg-color);
            color: var(--el-text-color-primary);
            font-size: 14px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #app {
            flex: 1;
            padding: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .content-card {
            background-color: #FFFFFF;
            border-radius: var(--el-border-radius-base);
            padding: 16px;
            height: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        /* 搜索筛选区 */
        .search-area {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            margin-bottom: 16px;
        }

        .search-item {
            display: flex;
            align-items: center;
        }

        .search-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 统一主列表搜索按钮样式 */
        .btn-search-primary {
            background-color: #2DA44E !important;
            border-color: #2DA44E !important;
            color: #FFFFFF !important;
        }
        .btn-search-reset {
            background-color: #FFFFFF !important;
            border-color: #DCDFE6 !important;
            color: #000000 !important;
        }

        /* 表格区 */
        .table-container {
            flex: 1;
            width: 100%;
            overflow: hidden;
            border: 1px solid var(--el-border-color);
            border-bottom: none;
        }

        .el-table {
            --el-table-header-bg-color: #FAFAFA;
            --el-table-header-text-color: #303133;
        }

        .el-table th.el-table__cell {
            font-weight: 500;
        }

        .pagination-area {
            margin-top: 16px;
            display: flex;
            justify-content: flex-end;
        }

        /* 弹窗样式 */
        .section-title { 
            font-size: 14px; 
            font-weight: bold; 
            color: var(--el-text-color-primary); 
            margin-top: 24px; 
            margin-bottom: 16px; 
            padding-left: 8px; 
            border-left: 4px solid #2DA44E; 
        }
        .section-title:first-child {
            margin-top: 0;
        }
        .is-readonly { pointer-events: none; opacity: 0.7; }
    </style>
</head>
<body>
    <div id="app">
        <div class="content-card">
            <!-- 搜索筛选区与新增按钮 -->
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px;">
                <div class="search-area" style="margin-bottom: 0;">
                    <div class="search-item">
                        <el-input v-model="searchForm.warehouseCode" placeholder="仓库代码" clearable style="width: 200px;"></el-input>
                    </div>
                    <div class="search-item">
                        <el-input v-model="searchForm.warehouseName" placeholder="仓库名称" clearable style="width: 200px;"></el-input>
                    </div>
                    <div class="search-actions">
                        <el-button class="btn-search-primary" @click="handleSearch">
                            <el-icon style="margin-right: 4px;"><Search /></el-icon>查询
                        </el-button>
                        <el-button class="btn-search-reset" @click="resetSearch">
                            <el-icon style="margin-right: 4px;"><RefreshRight /></el-icon>重置
                        </el-button>
                    </div>
                </div>
                <div class="toolbar-right">
                    <el-button type="primary" @click="openDialog('add')">
                        <el-icon style="margin-right: 4px;"><Plus /></el-icon>新增仓库
                    </el-button>
                </div>
            </div>

            <!-- 列表状态tab -->
            <el-tabs v-model="activeTab" class="demo-tabs">
                <el-tab-pane label="本地仓" name="本地仓"></el-tab-pane>
                <el-tab-pane label="海外仓" name="海外仓"></el-tab-pane>
            </el-tabs>

            <!-- 表格区 (本地仓) -->
            <div class="table-container" v-show="activeTab === '本地仓'">
                <el-table :data="tableData" style="width: 100%; min-width: 1200px;" border height="100%">
                    <el-table-column prop="warehouseCode" label="仓库代码" min-width="120"></el-table-column>
                    <el-table-column prop="warehouseName" label="仓库名称" min-width="150"></el-table-column>
                    <el-table-column prop="country" label="国家" min-width="100"></el-table-column>
                    <el-table-column prop="province" label="省份" min-width="100"></el-table-column>
                    <el-table-column prop="city" label="城市" min-width="100"></el-table-column>
                    <el-table-column prop="zipcode" label="邮编" min-width="100"></el-table-column>
                    <el-table-column prop="address" label="详细地址" min-width="250" show-overflow-tooltip></el-table-column>
                    <el-table-column prop="contactName" label="收货人" min-width="100"></el-table-column>
                    <el-table-column prop="phone" label="手机号" min-width="120"></el-table-column>
                    <el-table-column prop="status" label="状态" min-width="80" align="center">
                        <template #default="scope">
                            <el-tag :type="scope.row.status === '正常' ? 'success' : 'danger'">{{ scope.row.status }}</el-tag>
                        </template>
                    </el-table-column>
                    <el-table-column label="操作" width="160" fixed="right" align="center">
                        <template #default="scope">
                            <el-button link type="primary" size="small" @click="openDialog('edit', scope.row)">
                                编辑
                            </el-button>
                            <el-button link :type="scope.row.status === '正常' ? 'danger' : 'success'" size="small" @click="toggleStatus(scope.row)">
                                {{ scope.row.status === '正常' ? '冻结' : '启用' }}
                            </el-button>
                        </template>
                    </el-table-column>
                </el-table>
            </div>

            <!-- 表格区 (海外仓 占位) -->
            <div class="table-container" v-show="activeTab === '海外仓'" style="display: flex; align-items: center; justify-content: center; background: #fafafa;">
                <el-empty description="显示后期提供"></el-empty>
            </div>

            <!-- 分页区 -->
            <div class="pagination-area">
                <el-pagination
                    v-model:current-page="currentPage"
                    v-model:page-size="pageSize"
                    :page-sizes="[10, 20, 50, 100]"
                    layout="total, sizes, prev, pager, next, jumper"
                    :total="total"
                />
            </div>
        </div>

        <!-- 新增/编辑本地仓弹窗 -->
        <el-dialog v-model="dialogVisible" :title="dialogTitle" width="800px" destroy-on-close>
            <div :class="{'is-readonly': isReadonly}">
            <el-form ref="formRef" :model="formData" :rules="formRules" label-position="top">
                
                <div class="section-title">基本信息</div>
                <el-row :gutter="24">
                    <el-col :span="12">
                        <el-form-item label="仓库代码" prop="warehouseCode">
                            <el-input v-model="formData.warehouseCode" placeholder="请输入"></el-input>
                        </el-form-item>
                    </el-col>
                    <el-col :span="12">
                        <el-form-item label="仓库名称" prop="warehouseName">
                            <el-input v-model="formData.warehouseName" placeholder="请输入"></el-input>
                        </el-form-item>
                    </el-col>
                    <el-col :span="12">
                        <el-form-item label="收货人" prop="contactName">
                            <el-input v-model="formData.contactName" placeholder="请输入"></el-input>
                        </el-form-item>
                    </el-col>
                    <el-col :span="12">
                        <el-form-item label="手机号" prop="phone">
                            <el-input v-model="formData.phone" placeholder="请输入"></el-input>
                        </el-form-item>
                    </el-col>
                </el-row>

                <div class="section-title">地址详情</div>
                <el-row :gutter="24">
                    <el-col :span="8">
                        <el-form-item label="国家" prop="country">
                            <el-select v-model="formData.country" placeholder="请选择国家" style="width: 100%;">
                                <el-option label="中国" value="中国"></el-option>
                                <el-option label="美国" value="美国"></el-option>
                                <el-option label="英国" value="英国"></el-option>
                            </el-select>
                        </el-form-item>
                    </el-col>
                    <el-col :span="8">
                        <el-form-item label="省份" prop="province">
                            <el-select v-model="formData.province" placeholder="请选择省份" style="width: 100%;">
                                <el-option label="广东省" value="广东省"></el-option>
                                <el-option label="浙江省" value="浙江省"></el-option>
                                <el-option label="加利福尼亚州" value="加利福尼亚州"></el-option>
                            </el-select>
                        </el-form-item>
                    </el-col>
                    <el-col :span="8">
                        <el-form-item label="城市" prop="city">
                            <el-select v-model="formData.city" placeholder="请选择城市" style="width: 100%;">
                                <el-option label="广州市" value="广州市"></el-option>
                                <el-option label="深圳市" value="深圳市"></el-option>
                                <el-option label="义乌市" value="义乌市"></el-option>
                                <el-option label="洛杉矶" value="洛杉矶"></el-option>
                            </el-select>
                        </el-form-item>
                    </el-col>
                    <el-col :span="8">
                        <el-form-item label="邮编" prop="zipcode">
                            <el-input v-model="formData.zipcode" placeholder="请输入"></el-input>
                        </el-form-item>
                    </el-col>
                    <el-col :span="16">
                        <el-form-item label="详细地址" prop="address">
                            <el-input v-model="formData.address" placeholder="请输入"></el-input>
                        </el-form-item>
                    </el-col>
                </el-row>
            </el-form>
            </div>
            <template #footer>
                <span class="dialog-footer">
                    <el-button @click="dialogVisible = false">{{ isReadonly ? '关闭' : '取消' }}</el-button>
                    <el-button v-if="!isReadonly" type="primary" @click="confirmSave">确 定</el-button>
                </span>
            </template>
        </el-dialog>
    </div>

    <script>
        const { createApp, ref, reactive, computed } = Vue;
        const { ElMessage } = ElementPlus;

        const app = createApp({
            setup() {
                const activeTab = ref('本地仓');
                
                const searchForm = reactive({
                    warehouseCode: '',
                    warehouseName: ''
                });

                const currentPage = ref(1);
                const pageSize = ref(10);

                // 原始数据
                const allData = ref([
                    { warehouseCode: 'huadu', warehouseName: '花都仓', country: '中国', province: '广东省', city: '广州市', zipcode: '10001', address: '花都区测试大道飞点物流园', contactName: '张三', phone: '13645627485', status: '正常' },
                    { warehouseCode: 'baiyun', warehouseName: '白云仓', country: '中国', province: '广东省', city: '广州市', zipcode: '10002', address: '白云区测试大道飞点仓库', contactName: '李四', phone: '13147851235', status: '已冻结' }
                ]);

                const tableData = computed(() => {
                    return allData.value;
                });
                
                const total = computed(() => tableData.value.length);

                const handleSearch = () => { ElMessage.success('查询成功'); };
                const resetSearch = () => {
                    searchForm.warehouseCode = '';
                    searchForm.warehouseName = '';
                };

                const toggleStatus = (row) => {
                    const action = row.status === '正常' ? '冻结' : '启用';
                    ElMessageBox.confirm(
                        `确定要${action}该仓库吗？`,
                        '提示',
                        {
                            confirmButtonText: '确定',
                            cancelButtonText: '取消',
                            type: 'warning',
                        }
                    ).then(() => {
                        row.status = row.status === '正常' ? '已冻结' : '正常';
                        ElMessage({
                            type: 'success',
                            message: `${action}成功`
                        });
                    }).catch(() => {});
                };

                // 弹窗逻辑
                const dialogVisible = ref(false);
                const dialogTitle = ref('');
                const dialogType = ref(''); // add or edit
                const isReadonly = ref(false);
                const formRef = ref(null);
                
                const formData = reactive({
                    id: null,
                    warehouseCode: '',
                    warehouseName: '',
                    contactName: '',
                    phone: '',
                    country: '',
                    province: '',
                    city: '',
                    zipcode: '',
                    address: ''
                });

                const formRules = reactive({
                    warehouseCode: [{ required: true, message: '必填', trigger: 'blur' }],
                    warehouseName: [{ required: true, message: '必填', trigger: 'blur' }],
                    contactName: [{ required: true, message: '必填', trigger: 'blur' }],
                    phone: [{ required: true, message: '必填', trigger: 'blur' }],
                    country: [{ required: true, message: '必选', trigger: 'change' }],
                    province: [{ required: true, message: '必选', trigger: 'change' }],
                    city: [{ required: true, message: '必选', trigger: 'change' }],
                    zipcode: [{ required: true, message: '必填', trigger: 'blur' }],
                    address: [{ required: true, message: '必填', trigger: 'blur' }]
                });

                const openDialog = (type, row) => {
                    dialogType.value = type;
                    isReadonly.value = type === 'edit' && row && row.status !== '正常';
                    if (activeTab.value !== '本地仓') {
                        ElMessage.warning('海外仓功能正在开发中...');
                        return;
                    }

                    if (formRef.value) formRef.value.resetFields();
                    
                    if (type === 'add') {
                        dialogTitle.value = '新增本地仓';
                        Object.assign(formData, {
                            id: null, warehouseCode: '', warehouseName: '', contactName: '', phone: '',
                            country: '中国', province: '', city: '', zipcode: '', address: ''
                        });
                    } else {
                        dialogTitle.value = isReadonly.value ? '查看本地仓' : '编辑本地仓';
                        Object.assign(formData, JSON.parse(JSON.stringify(row)));
                    }
                    dialogVisible.value = true;
                };

                const confirmSave = () => {
                    if (!formRef.value) return;
                    formRef.value.validate((valid) => {
                        if (valid) {
                            ElMessage.success('保存成功');
                            dialogVisible.value = false;
                        }
                    });
                };

                return {
                    activeTab, searchForm, tableData, currentPage, pageSize, total,
                    handleSearch, resetSearch, toggleStatus,
                    dialogVisible, dialogTitle, isReadonly, formRef, formData, formRules,
                    openDialog, confirmSave
                };
            }
        });

        for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
            app.component(key, component);
        }
        app.use(ElementPlus);
        app.mount('#app');
    </script>
</body>
</html>
