<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务管理 - 主列表</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <style>
        :root {
            --el-color-primary: #2DA44E;
            --el-border-color: #DCDFE6;
            --el-bg-color: #F5F7FA;
            --el-text-color-primary: #303133;
            --el-text-color-regular: #606266;
        }
        body { margin: 0; padding: 16px; background-color: var(--el-bg-color); font-family: sans-serif; }
        .content-card { background-color: #fff; border-radius: 4px; padding: 16px; height: calc(100vh - 32px); display: flex; flex-direction: column; box-sizing: border-box; }
        .search-area { display: flex; gap: 16px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
        .search-item { display: flex; align-items: center; }
        .search-item label { margin-right: 8px; color: var(--el-text-color-regular); font-size: 14px; }
        .table-container { flex: 1; overflow: hidden; }
        .pagination-area { margin-top: 16px; display: flex; justify-content: flex-end; }
        .el-table th.el-table__cell { background-color: #FAFAFA; color: #303133; font-weight: 500; }
        .is-required-custom::before {
            content: '*';
            color: var(--el-color-danger);
            margin-right: 4px;
        }

        
  
        
  
        /* 统一主列表搜索按钮样式 */
        .btn-search-primary {
            background-color: #2DA44E !important;
            border-color: #2DA44E !important;
            color: #FFFFFF !important;
        }
        .btn-search-primary:hover,
        .btn-search-primary:focus,
        .btn-search-primary:active {
            background-color: #2DA44E !important;
            border-color: #2DA44E !important;
            color: #FFFFFF !important;
            opacity: 1 !important;
            filter: none !important;
        }
        .btn-search-primary .el-icon {
            color: #FFFFFF !important;
        }
        .btn-search-reset {
            background-color: #FFFFFF !important;
            border-color: #DCDFE6 !important;
            color: #000000 !important;
        }
        .btn-search-reset:hover,
        .btn-search-reset:focus,
        .btn-search-reset:active {
            background-color: #E6F2FF !important;
            border-color: #DCDFE6 !important;
            color: #000000 !important;
            opacity: 1 !important;
            filter: none !important;
        }
        .btn-search-reset .el-icon {
            color: #000000 !important;
        }
    </style>



</head>
<body>
    <div id="app">
        <!-- 搜索与新增区域独立卡片 -->
        <div class="content-card" style="height: auto; margin-bottom: 16px; padding-bottom: 0;">
            <div class="search-area">
                <div class="search-item">
                    <el-input v-model="searchForm.serviceName" placeholder="服务渠道" clearable style="width: 200px;"></el-input>
                </div>
                <div class="search-item">
                    <el-select v-model="searchForm.transportMode" placeholder="运输方式" clearable style="width: 200px;">
                        <el-option label="空运" value="空运"></el-option>
                        <el-option label="洲际火车" value="洲际火车"></el-option>
                        <el-option label="洲际卡车" value="洲际卡车"></el-option>
                        <el-option label="海运" value="海运"></el-option>
                    </el-select>
                </div>
                <div>
                    <el-button class="btn-search-primary" @click="handleSearch">
                        <el-icon style="margin-right: 4px;"><Search /></el-icon>查询
                    </el-button>
                    <el-button class="btn-search-reset" @click="resetSearch">
                        <el-icon style="margin-right: 4px;"><RefreshRight /></el-icon>重置
                    </el-button>
                </div>
                <div style="margin-left: auto;">
                    <el-button type="success" @click="handleAdd">新增服务</el-button>
                </div>
            </div>
        </div>

        <div class="content-card" style="height: calc(100vh - 106px);">
            <!-- Tab 页签 -->
            <el-tabs v-model="activeTab" @tab-click="handleTabClick">
                <el-tab-pane label="全段服务" name="全段服务"></el-tab-pane>
            </el-tabs>

            <!-- 表格 -->
            <div class="table-container">
                <el-table :data="tableData" border height="100%" style="width: 100%">
                    <el-table-column prop="serviceName" label="服务渠道" min-width="120"></el-table-column>
                    <el-table-column prop="transportMode" label="运输方式" min-width="100"></el-table-column>
                    <el-table-column prop="taxType" label="包税方式" min-width="120"></el-table-column>
                    <el-table-column prop="serviceType" label="服务类型" min-width="100"></el-table-column>
                    <el-table-column prop="billingMethod" label="计费方式" min-width="100"></el-table-column>
                    <el-table-column prop="lastMileMethod" label="尾程派送方式" min-width="120"></el-table-column>
                    <el-table-column prop="needClaim" label="是否需要理赔时效" min-width="140">
                        <template #default="scope">
                            <el-select v-model="scope.row.needClaim" placeholder="请选择" @change="handleNeedClaimChange(scope.row)">
                                <el-option label="是" value="是"></el-option>
                                <el-option label="否" value="否"></el-option>
                            </el-select>
                        </template>
                    </el-table-column>
                    <el-table-column prop="status" label="状态" min-width="80">
                        <template #default="scope">
                            <el-tag :type="scope.row.status === '正常' ? 'success' : 'danger'">{{ scope.row.status }}</el-tag>
                        </template>
                    </el-table-column>
                    <el-table-column label="操作" width="180" fixed="right" align="center">
                        <template #default="scope">
                            <el-button link type="primary" size="small" @click="handleEdit(scope.row)">编辑</el-button>
                            <el-button link type="primary" size="small" @click="handleConfigTime(scope.row)">配置时效</el-button>
                            <el-button link :type="scope.row.status === '正常' ? 'danger' : 'success'" size="small" @click="toggleStatus(scope.row)">
                                {{ scope.row.status === '正常' ? '冻结' : '启用' }}
                            </el-button>
                        </template>
                    </el-table-column>
                </el-table>
            </div>

            <!-- 分页 -->
            <div class="pagination-area">
                <el-pagination background layout="total, prev, pager, next" :total="total"></el-pagination>
            </div>
        </div>

        <!-- 配置时效 弹窗 -->
        <el-dialog v-model="timeConfigDialogVisible" :title="'配置时效 - ' + (currentEditRow ? currentEditRow.serviceName : '')" width="800px">
            <el-tabs v-model="activeTimeTab">
                <!-- 预估运输时效 Tab -->
                <el-tab-pane label="预估运输时效" name="transit">
                    <el-form :model="transitForm" ref="transitFormRef" label-position="top">
                        <el-row :gutter="24">
                            <el-col :span="12">
                                <el-form-item label="FBA运单同步" prop="fbaSync" :rules="{ required: true, message: '请选择FBA运单同步', trigger: 'change' }">
                                    <el-select v-model="transitForm.fbaSync" placeholder="必填" style="width: 100%;" @change="handleTransitFbaSyncChange">
                                        <el-option label="是" value="是"></el-option>
                                        <el-option label="否" value="否"></el-option>
                                    </el-select>
                                </el-form-item>
                            </el-col>
                            <el-col :span="12">
                                <el-form-item label="亚马逊服务等级" prop="amazonLevel" :rules="[{ required: transitForm.fbaSync === '是', message: '请选择亚马逊服务等级', trigger: 'change' }]">
                                    <el-select v-model="transitForm.amazonLevel" :disabled="transitForm.fbaSync === '否'" placeholder="FBA运单同步为是时必填" style="width: 100%;">
                                        <el-option label="快速" value="快速"></el-option>
                                        <el-option label="加急" value="加急"></el-option>
                                        <el-option label="标准" value="标准"></el-option>
                                    </el-select>
                                </el-form-item>
                            </el-col>
                        </el-row>
                        <el-row :gutter="24">
                            <el-col :span="12">
                                <el-form-item label="运输最小天数" prop="minDays" :rules="[{ required: transitForm.fbaSync === '是', message: '请输入运输最小天数', trigger: 'blur' }]">
                                    <el-input-number v-model="transitForm.minDays" :disabled="transitForm.fbaSync === '否'" :min="0" :precision="0" style="width: 100%;" controls-position="right" placeholder="FBA运单同步为是时必填"></el-input-number>
                                </el-form-item>
                            </el-col>
                            <el-col :span="12">
                                <el-form-item label="运输最大天数" prop="maxDays" :rules="[{ required: transitForm.fbaSync === '是', message: '请输入运输最大天数', trigger: 'blur' }]">
                                    <el-input-number v-model="transitForm.maxDays" :disabled="transitForm.fbaSync === '否'" :min="0" :precision="0" style="width: 100%;" controls-position="right" placeholder="FBA运单同步为是时必填"></el-input-number>
                                </el-form-item>
                            </el-col>
                        </el-row>
                    </el-form>
                </el-tab-pane>

                <!-- 送仓预估时效 Tab -->
                <el-tab-pane label="送仓预估时效" name="eta">
                    <div style="margin-bottom: 16px;">
                        <el-button type="primary" size="small" @click="handleAddEtaRow">新增一条</el-button>
                    </div>
                    <el-table :data="etaTableData" border style="width: 100%" max-height="400">
                        <el-table-column prop="fbaCode" label="FBA仓库代码" min-width="150">
                            <template #default="scope">
                                <el-select v-model="scope.row.fbaCode" placeholder="请选择FBA仓库" filterable style="width: 100%;">
                                    <el-option v-for="item in fbaWarehouseList" :key="item.code" :label="item.code" :value="item.code"></el-option>
                                </el-select>
                            </template>
                        </el-table-column>
                        <el-table-column prop="etaDays" label="预估时效(天)" min-width="150">
                            <template #default="scope">
                                <el-input-number v-model="scope.row.etaDays" :min="0" :precision="0" style="width: 100%;" controls-position="right"></el-input-number>
                            </template>
                        </el-table-column>
                        <el-table-column label="操作" width="80" align="center">
                            <template #default="scope">
                                <el-button link type="danger" size="small" @click="handleDeleteEtaRow(scope.$index)">删除</el-button>
                            </template>
                        </el-table-column>
                    </el-table>
                </el-tab-pane>

                <!-- 理赔承诺时效 Tab -->
                <el-tab-pane label="理赔承诺时效" name="claim" :disabled="currentEditRow && currentEditRow.needClaim === '否'">
                    <div style="margin-bottom: 16px;">
                        <el-button type="primary" size="small" @click="handleAddClaimRow" :disabled="currentEditRow && currentEditRow.needClaim === '否'">新增一条</el-button>
                    </div>
                    <el-table :data="claimTableData" border style="width: 100%" max-height="400">
                        <el-table-column prop="deliveryMethod" label="派送方式" width="120">
                            <template #default="scope">
                                <el-select v-model="scope.row.deliveryMethod" placeholder="请选择" :disabled="currentEditRow && currentEditRow.needClaim === '否'">
                                    <el-option 
                                        v-for="method in availableLastMileMethods" 
                                        :key="method" 
                                        :label="method" 
                                        :value="method">
                                    </el-option>
                                </el-select>
                            </template>
                        </el-table-column>
                        <el-table-column prop="warehouses" label="FBA仓库代码" min-width="200">
                            <template #header>
                                <span :class="{ 'is-required-custom': hasCardDeliveryInClaim }">FBA仓库代码</span>
                            </template>
                            <template #default="scope">
                                <div style="display: flex; align-items: center; width: 100%;">
                                    <span v-if="scope.row.deliveryMethod === '卡派'" style="color: var(--el-color-danger); margin-right: 4px;">*</span>
                                    <el-select v-model="scope.row.warehouses" multiple collapse-tags :placeholder="scope.row.deliveryMethod === '快递派' ? '非必填' : '卡派必填'" :disabled="currentEditRow && currentEditRow.needClaim === '否'" filterable style="flex: 1;">
                                        <el-option v-for="item in fbaWarehouseList" :key="item.code" :label="item.code" :value="item.code"></el-option>
                                    </el-select>
                                </div>
                            </template>
                        </el-table-column>
                        <el-table-column prop="claimDays" label="理赔时效(工作日)" width="150">
                            <template #header>
                                <span :class="{ 'is-required-custom': true }">理赔时效(工作日)</span>
                            </template>
                            <template #default="scope">
                                <el-input-number v-model="scope.row.claimDays" :min="0" :precision="0" style="width: 100%;" controls-position="right" :disabled="currentEditRow && currentEditRow.needClaim === '否'"></el-input-number>
                            </template>
                        </el-table-column>
                        <el-table-column label="操作" width="80" align="center">
                            <template #default="scope">
                                <el-button link type="danger" size="small" @click="handleDeleteClaimRow(scope.$index)" :disabled="currentEditRow && currentEditRow.needClaim === '否'">删除</el-button>
                            </template>
                        </el-table-column>
                    </el-table>
                </el-tab-pane>
            </el-tabs>
            <template #footer>
                <span class="dialog-footer">
                    <el-button @click="timeConfigDialogVisible = false">取消</el-button>
                    <el-button type="primary" @click="saveTimeConfig">保存</el-button>
                </span>
            </template>
        </el-dialog>
    </div>

    <script>
        const { createApp, ref, reactive, computed } = Vue;
        const { ElMessage } = ElementPlus;

        const app = createApp({
            setup() {
                const activeTab = ref('全段服务');
                const searchForm = reactive({ serviceName: '', transportMode: '' });
                const total = ref(2);
                const tableData = ref([
                    { 
                        serviceName: '大陆UPS', transportMode: '空运', taxType: '包税, 不包税', serviceType: '散货', billingMethod: '重量KG', lastMileMethod: '快递派', needClaim: '是', status: '正常',
                        etaData: [ { fbaCode: 'ONT8', etaDays: 5 } ],
                        claimData: [ { deliveryMethod: '快递派', warehouses: '', claimDays: 7 } ]
                    },
                    { 
                        serviceName: '美森360', transportMode: '海运', taxType: '包税, 不包税, 自主税号, 自税递延', serviceType: '散货, 整柜', billingMethod: '重量KG, 体积m³', lastMileMethod: '卡派, 快递派', needClaim: '是', status: '正常',
                        etaData: [ { fbaCode: 'ABQ2', etaDays: 14 }, { fbaCode: 'AVP1', etaDays: 17 } ],
                        claimData: [
                            { deliveryMethod: '卡派', warehouses: 'ONT8,LAX9,LGB8', claimDays: 13 },
                            { deliveryMethod: '卡派', warehouses: 'SBD1,POC1,POC3', claimDays: 14 },
                            { deliveryMethod: '快递派', warehouses: '', claimDays: 12 }
                        ]
                    },
                    { 
                        serviceName: '美森432', transportMode: '海运', taxType: '包税, 不包税, 自主税号, 自税递延', serviceType: '散货, 整柜', billingMethod: '重量KG, 体积m³', lastMileMethod: '卡派, 快递派', needClaim: '是', status: '正常',
                        etaData: [ { fbaCode: 'ABQ2', etaDays: 14 } ],
                        claimData: [ { deliveryMethod: '快递派', warehouses: '', claimDays: 12 } ]
                    }
                ]);

                const handleNeedClaimChange = (row) => {
                    if (row.needClaim === '否') {
                        row.claimData = [];
                        ElMessage.warning(`已自动清空 ${row.serviceName} 的理赔时效配置`);
                    }
                };

                const handleTabClick = () => { ElMessage.success('切换标签'); };
                const handleSearch = () => { ElMessage.success('执行查询'); };
                const resetSearch = () => { searchForm.serviceName = ''; searchForm.transportMode = ''; };
                const handleAdd = () => { window.location.href = '干线运输服务新增.html?action=add'; };
                const handleEdit = (row) => {
                    sessionStorage.setItem('editTransportServiceData', JSON.stringify(row));
                    window.location.href = `干线运输服务新增.html?action=edit&serviceName=${encodeURIComponent(row.serviceName)}`; 
                };
                
                const toggleStatus = (row) => {
                    const action = row.status === '正常' ? '冻结' : '启用';
                    const msg = action === '冻结' 
                        ? `确定要冻结运输服务【${row.serviceName}】吗？<br><span style="color:#F56C6C;font-size:12px;">注：冻结后，其项下关联的所有服务组合也将同步变更为“已冻结”。</span>`
                        : `确定要启用运输服务【${row.serviceName}】吗？`;
                        
                    ElementPlus.ElMessageBox.confirm(msg, '状态变更提示', {
                        confirmButtonText: '确定',
                        cancelButtonText: '取消',
                        type: 'warning',
                        dangerouslyUseHTMLString: true
                    }).then(() => {
                        row.status = row.status === '正常' ? '已冻结' : '正常';
                        
                        // 同步状态到 localStorage 供《服务组合_主列表.html》读取
                        let frozenList = JSON.parse(localStorage.getItem('frozenTransportServices') || '[]');
                        if (row.status === '已冻结') {
                            if (!frozenList.includes(row.serviceName)) frozenList.push(row.serviceName);
                        } else {
                            frozenList = frozenList.filter(name => name !== row.serviceName);
                        }
                        localStorage.setItem('frozenTransportServices', JSON.stringify(frozenList));
                        
                        ElMessage.success(`已成功${action}该运输服务！`);
                    }).catch(() => {});
                };

                // 时效配置弹窗逻辑
                const timeConfigDialogVisible = ref(false);
                const activeTimeTab = ref('transit'); // 默认显示预估运输时效
                const currentEditRow = ref(null);
                const transitFormRef = ref(null);
                
                const transitForm = reactive({
                    fbaSync: '否',
                    amazonLevel: '',
                    minDays: undefined,
                    maxDays: undefined
                });

                const etaTableData = ref([]);
                const claimTableData = ref([]);
                const availableLastMileMethods = ref([]);
                
                // 计算属性：判断当前理赔表格中是否至少有一行的派送方式为"卡派"
                const hasCardDeliveryInClaim = computed(() => {
                    return claimTableData.value.some(item => item.deliveryMethod === '卡派');
                });
                
                // 模拟调用平台仓库列表接口获取FBA仓库数据
                const fbaWarehouseList = ref([
                    { code: 'ONT8' }, { code: 'LGB8' }, { code: 'LAX9' },
                    { code: 'SBD1' }, { code: 'POC1' }, { code: 'POC3' },
                    { code: 'ABQ2' }, { code: 'AVP1' }, { code: 'GYR2' }
                ]);

                const handleTransitFbaSyncChange = (val) => {
                    if (val === '否') {
                        transitForm.amazonLevel = '';
                        transitForm.minDays = undefined;
                        transitForm.maxDays = undefined;
                    }
                };

                const handleConfigTime = (row) => {
                    currentEditRow.value = row;
                    activeTimeTab.value = 'transit'; // 打开弹窗时默认选中预估运输时效
                    
                    // 加载该服务现有的预估运输时效数据
                    Object.assign(transitForm, {
                        fbaSync: row.fbaSync || '否',
                        amazonLevel: row.amazonLevel || '',
                        minDays: row.minDays,
                        maxDays: row.maxDays
                    });
                    
                    // 根据当前行的尾程派送方式（逗号分隔的字符串）提取可选的派送方式
                    if (row.lastMileMethod) {
                        availableLastMileMethods.value = row.lastMileMethod.split(',').map(m => m.trim());
                    } else {
                        availableLastMileMethods.value = [];
                    }
                    
                    // 加载该服务现有的预估时效数据
                    etaTableData.value = JSON.parse(JSON.stringify(row.etaData || []));

                    // 加载该服务现有的理赔承诺时效数据
                    claimTableData.value = JSON.parse(JSON.stringify(row.claimData || [])).map(item => {
                        // 将以前的逗号分隔字符串转为数组，以适配多选下拉框
                        if (typeof item.warehouses === 'string' && item.warehouses.length > 0) {
                            item.warehouses = item.warehouses.split(',').map(w => w.trim());
                        } else if (!item.warehouses) {
                            item.warehouses = [];
                        }
                        return item;
                    });

                    timeConfigDialogVisible.value = true;
                };

                const handleAddEtaRow = () => {
                    etaTableData.value.push({ fbaCode: '', etaDays: undefined });
                };

                const handleDeleteEtaRow = (index) => {
                    etaTableData.value.splice(index, 1);
                };

                const handleAddClaimRow = () => {
                    claimTableData.value.push({ deliveryMethod: '卡派', warehouses: [], claimDays: undefined });
                };

                const handleDeleteClaimRow = (index) => {
                    claimTableData.value.splice(index, 1);
                };

                const saveTimeConfig = async () => {
                    // 校验预估运输时效
                    if (transitFormRef.value) {
                        try {
                            await transitFormRef.value.validate();
                        } catch (e) {
                            activeTimeTab.value = 'transit';
                            ElMessage.warning('请完善【预估运输时效】中的必填信息');
                            return;
                        }
                    }

                    // 校验送仓预估时效
                    const isEtaValid = etaTableData.value.every(item => item.fbaCode && item.etaDays !== undefined && item.etaDays !== null);
                    if (!isEtaValid) {
                        ElMessage.warning('请完善【送仓预估时效】中的 FBA仓库代码 和 预估时效');
                        activeTimeTab.value = 'eta';
                        return;
                    }
                    
                    // 校验送仓预估时效中的FBA仓库代码是否重复
                    const etaFbaCodes = etaTableData.value.map(item => item.fbaCode);
                    if (new Set(etaFbaCodes).size !== etaFbaCodes.length) {
                        ElMessage.warning('【送仓预估时效】中存在重复的 FBA仓库代码，请检查并修改');
                        activeTimeTab.value = 'eta';
                        return;
                    }
                    
                    // 如果需要理赔，才校验理赔数据
                    if (currentEditRow.value.needClaim === '是') {
                        const isClaimValid = claimTableData.value.every(item => {
                            if (!item.deliveryMethod || item.claimDays === undefined || item.claimDays === null) {
                                return false;
                            }
                            if (item.deliveryMethod === '卡派' && (!item.warehouses || item.warehouses.length === 0)) {
                                return false; // 卡派必须填写仓点
                            }
                            return true;
                        });
                        if (!isClaimValid) {
                            ElMessage.warning('请完善【理赔承诺时效】中的必填信息（派送方式、理赔时效，若为卡派则FBA仓库代码必填）');
                            activeTimeTab.value = 'claim';
                            return;
                        }
                        
                        // 校验理赔承诺时效中的FBA仓库代码是否重复 (所有行选中的仓库代码组合起来不能有重复)
                        const allClaimWarehouses = [];
                        let hasDuplicateClaimWarehouse = false;
                        claimTableData.value.forEach(item => {
                            if (item.warehouses && item.warehouses.length > 0) {
                                item.warehouses.forEach(w => {
                                    if (allClaimWarehouses.includes(w)) {
                                        hasDuplicateClaimWarehouse = true;
                                    }
                                    allClaimWarehouses.push(w);
                                });
                            }
                        });
                        if (hasDuplicateClaimWarehouse) {
                            ElMessage.warning('【理赔承诺时效】中不同的行不能选择相同的 FBA仓库代码，请检查并修改');
                            activeTimeTab.value = 'claim';
                            return;
                        }
                    }

                    // 保存数据到当前行
                    currentEditRow.value.fbaSync = transitForm.fbaSync;
                    currentEditRow.value.amazonLevel = transitForm.amazonLevel;
                    currentEditRow.value.minDays = transitForm.minDays;
                    currentEditRow.value.maxDays = transitForm.maxDays;
                    
                    currentEditRow.value.etaData = JSON.parse(JSON.stringify(etaTableData.value));
                    
                    // 将理赔数据的 warehouses 数组转换回字符串以兼容原有数据结构展示 (可选)
                    const finalClaimData = JSON.parse(JSON.stringify(claimTableData.value)).map(item => {
                        if (Array.isArray(item.warehouses)) {
                            item.warehouses = item.warehouses.join(',');
                        }
                        return item;
                    });
                    currentEditRow.value.claimData = finalClaimData;

                    ElMessage.success(`保存 ${currentEditRow.value.serviceName} 的时效配置成功`);
                    timeConfigDialogVisible.value = false;
                };

                return { 
                    activeTab, searchForm, tableData, total, handleNeedClaimChange, handleTabClick, handleSearch, resetSearch, handleAdd, handleEdit, toggleStatus,
                    timeConfigDialogVisible, activeTimeTab, currentEditRow, transitForm, transitFormRef, etaTableData, claimTableData, availableLastMileMethods,
                    hasCardDeliveryInClaim, fbaWarehouseList,
                    handleTransitFbaSyncChange, handleConfigTime, handleAddEtaRow, handleDeleteEtaRow, 
                    handleAddClaimRow, handleDeleteClaimRow, saveTimeConfig
                };
            }
        });
        app.use(ElementPlus);
        app.mount('#app');
    </script>
</body>
</html>
