<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 飞点跨境供应链货主端</title>
    <!-- 引入 Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- 引入 Element Plus 样式 -->
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
    <!-- 引入 Element Plus 组件库 -->
    <script src="https://unpkg.com/element-plus"></script>
    <!-- 引入 Element Plus 图标 -->
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <style>
        :root {
            --el-color-primary: #2DA44E;
            --el-color-primary-light-3: #6bc083;
            --el-color-primary-light-5: #95cfa4;
            --el-color-primary-light-7: #bee5c6;
            --el-color-primary-light-8: #d3efe8;
            --el-color-primary-light-9: #e9f7ea;
            --el-color-primary-dark-2: #24833e;
        }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "微软雅黑", Arial, sans-serif;
            background-color: #f0f2f5;
        }
        
        .login-container {
            display: flex;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* 左侧物流主题视觉区 */
        .login-left {
            flex: 1;
            position: relative;
            background-image: url('https://images.unsplash.com/photo-1578575437130-527eed3abbec?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80'); /* 更大气的货轮/集装箱图 */
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .login-left::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(24, 43, 86, 0.92) 0%, rgba(26, 115, 232, 0.85) 100%);
            z-index: 1;
        }

        .left-content {
            position: relative;
            z-index: 2;
            color: #ffffff;
            text-align: left;
            padding: 0 80px;
            width: 100%;
            box-sizing: border-box;
            max-width: 800px;
        }

        .brand-header {
            display: flex;
            align-items: center;
            margin-bottom: 40px;
        }

        .brand-header .logo-icon {
            font-size: 48px;
            margin-right: 16px;
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
        }

        .brand-header h1 {
            font-size: 36px;
            margin: 0;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .left-content h2 {
            font-size: 46px;
            margin: 0 0 24px 0;
            line-height: 1.3;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .left-content p {
            font-size: 18px;
            line-height: 1.8;
            opacity: 0.85;
            margin: 0;
            max-width: 500px;
        }

        /* 数据看板装饰 */
        .mock-dashboard {
            display: flex;
            gap: 20px;
            margin-top: 60px;
        }

        .mock-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 20px;
            width: 160px;
        }

        .mock-card .val {
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 8px;
        }
        
        .mock-card .label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
        }

        /* 右侧登录表单区 */
        .login-right {
            width: 520px;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.1);
            z-index: 2;
            position: relative;
        }

        .login-box {
            width: 360px;
        }

        .login-header {
            margin-bottom: 40px;
            text-align: left;
        }

        .login-header h2 {
            font-size: 32px;
            color: #1a1a1a;
            margin: 0 0 12px 0;
            font-weight: 600;
        }

        .login-header p {
            color: #606266;
            font-size: 15px;
            margin: 0;
        }

        /* 优化 Element Plus 输入框样式 */
        .el-input__wrapper {
            box-shadow: none !important;
            background-color: #f5f7fa;
            border: 1px solid transparent;
            padding: 1px 15px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .el-input__wrapper.is-focus,
        .el-input__wrapper:hover {
            background-color: #fff;
            border-color: #2DA44E;
            box-shadow: 0 0 0 2px rgba(45, 164, 78, 0.1) !important;
        }

        .el-input__inner {
            height: 48px;
            line-height: 48px;
            font-size: 15px;
        }

        .el-input__prefix-inner {
            font-size: 18px;
            color: #909399;
        }

        .el-form-item {
            margin-bottom: 24px;
        }

        .login-btn {
            width: 100%;
            height: 50px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 8px;
            margin-top: 10px;
            background: #1a73e8;
            border: none;
            transition: all 0.3s;
            letter-spacing: 2px;
        }

        .login-btn:hover {
            background: #1557b0;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(26, 115, 232, 0.3);
        }

        .login-footer {
            margin-top: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .login-footer a {
            color: #1a73e8;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s;
        }

        .login-footer a:hover {
            color: #1557b0;
            text-decoration: underline;
        }

        .register-link {
            text-align: center;
            margin-top: 30px;
            font-size: 14px;
            color: #606266;
            padding-top: 20px;
            border-top: 1px solid #ebeef5;
        }

        .register-link a {
            color: #1a73e8;
            text-decoration: none;
            font-weight: 500;
        }

        /* 响应式处理 */
        @media screen and (max-width: 1024px) {
            .login-left {
                display: none;
            }
            .login-right {
                width: 100%;
            }
            .login-box {
                width: 400px;
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <div id="app" class="login-container">
        <!-- 左侧：品牌与跨境物流视觉展示 -->
        <div class="login-left">
            <div class="left-content">
                <div class="brand-header">
                    <el-icon class="logo-icon"><Ship /></el-icon>
                    <h1>飞点跨境供应链</h1>
                </div>
                <h2>连接全球<br>交付信任</h2>
                <p>为您提供一站式、可视化、智能化的跨境物流服务体验。让复杂的国际物流变得像国内快递一样简单。</p>
                
                <div class="mock-dashboard">
                    <div class="mock-card">
                        <div class="val">100+</div>
                        <div class="label">覆盖国家与地区</div>
                    </div>
                    <div class="mock-card">
                        <div class="val">24/7</div>
                        <div class="label">全天候货物追踪</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧：登录表单 -->
        <div class="login-right">
            <div class="login-box">
                <div class="login-header">
                    <h2>货主端登录</h2>
                    <p>欢迎回来，请输入您的账号密码</p>
                </div>

                <el-form 
                    ref="loginFormRef"
                    :model="loginForm"
                    :rules="rules"
                    @keyup.enter="handleLogin"
                >
                    <el-form-item prop="username">
                        <el-input 
                            v-model="loginForm.username" 
                            placeholder="请输入账户/邮箱" 
                            :prefix-icon="User"
                            clearable
                        />
                    </el-form-item>
                    
                    <el-form-item prop="password">
                        <el-input 
                            v-model="loginForm.password" 
                            type="password" 
                            placeholder="请输入登录密码" 
                            :prefix-icon="Lock"
                            show-password
                            clearable
                        />
                    </el-form-item>

                    <div class="login-footer" style="margin-top: -10px; margin-bottom: 20px;">
                        <el-checkbox v-model="loginForm.rememberMe">记住密码</el-checkbox>
                        <a href="#">忘记密码？</a>
                    </div>

                    <el-form-item>
                        <el-button 
                            type="primary" 
                            class="login-btn" 
                            :loading="loading" 
                            @click="handleLogin"
                        >
                            {{ loading ? '登录中...' : '立 即 登 录' }}
                        </el-button>
                    </el-form-item>
                </el-form>

                <div class="register-link">
                    还没有企业账号？ <a href="#">立即免费注册</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, reactive, shallowRef } = Vue;
        const { User, Lock, Ship } = ElementPlusIconsVue;

        const app = createApp({
            setup() {
                const loginFormRef = ref(null);
                const loading = ref(false);
                
                const loginForm = reactive({
                    username: '',
                    password: '',
                    rememberMe: false
                });

                const rules = reactive({
                    username: [
                        { required: true, message: '请输入账号', trigger: 'blur' },
                        { min: 3, message: '账号长度不能小于3位', trigger: 'blur' }
                    ],
                    password: [
                        { required: true, message: '请输入密码', trigger: 'blur' },
                        { min: 6, message: '密码长度不能小于6位', trigger: 'blur' }
                    ]
                });

                const handleLogin = () => {
                    if (!loginFormRef.value) return;
                    
                    loginFormRef.value.validate((valid) => {
                        if (valid) {
                            loading.value = true;
                            // 模拟接口请求延迟
                            setTimeout(() => {
                                loading.value = false;
                                ElementPlus.ElMessage({
                                    message: '登录成功！正在跳转...',
                                    type: 'success',
                                    duration: 1500
                                });
                                
                                // 存储登录状态和用户名，以便与 index 联动
                                localStorage.setItem('shipper_token', 'mock_token_' + new Date().getTime());
                                localStorage.setItem('shipper_username', loginForm.username);
                                
                                // 延迟跳转到首页
                                setTimeout(() => {
                                    window.location.href = 'index.html';
                                }, 1000);
                            }, 800);
                        } else {
                            return false;
                        }
                    });
                };

                return {
                    loginFormRef,
                    loginForm,
                    rules,
                    loading,
                    handleLogin,
                    User: shallowRef(User),
                    Lock: shallowRef(Lock),
                    Ship: shallowRef(Ship)
                };
            }
        });

        // 注册图标
        app.component('User', User);
        app.component('Lock', Lock);
        app.component('Ship', Ship);

        app.use(ElementPlus);
        app.mount('#app');
    </script>
</body>
</html>
