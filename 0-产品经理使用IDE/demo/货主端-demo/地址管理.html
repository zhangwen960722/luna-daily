<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地址管理 - 货主端</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <style>
        :root { --el-color-primary: #2DA44E; --el-bg-color: #F5F7FA; --el-text-color-regular: #606266; }
        body { margin: 0; padding: 16px; background-color: var(--el-bg-color); font-family: sans-serif; }
        .content-card { background-color: #fff; border-radius: 4px; padding: 16px; height: calc(100vh - 32px); display: flex; flex-direction: column; box-sizing: border-box; }
        .search-area { display: flex; gap: 16px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
        .search-item { display: flex; align-items: center; }
        .search-item label { margin-right: 8px; color: var(--el-text-color-regular); font-size: 14px; }
        .table-container { flex: 1; overflow: hidden; }
        .pagination-area { margin-top: 16px; display: flex; justify-content: flex-end; }
        .el-table th.el-table__cell { background-color: #FAFAFA; color: #303133; font-weight: 500; }

        /* 统一主列表搜索按钮样式 */
        .btn-search-primary {
            background-color: #2DA44E !important;
            border-color: #2DA44E !important;
            color: #FFFFFF !important;
        }
        .btn-search-primary:hover,
        .btn-search-primary:focus,
        .btn-search-primary:active {
            background-color: #2DA44E !important;
            border-color: #2DA44E !important;
            color: #FFFFFF !important;
            opacity: 1 !important;
            filter: none !important;
        }
        .btn-search-primary .el-icon {
            color: #FFFFFF !important;
        }
        .btn-search-reset {
            background-color: #FFFFFF !important;
            border-color: #DCDFE6 !important;
            color: #000000 !important;
        }
        .btn-search-reset:hover,
        .btn-search-reset:focus,
        .btn-search-reset:active {
            background-color: #E6F2FF !important;
            border-color: #DCDFE6 !important;
            color: #000000 !important;
            opacity: 1 !important;
            filter: none !important;
        }
        /* 审核详情弹窗样式 */
        .section-title {
            font-size: 15px;
            font-weight: bold;
            color: #303133;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--el-border-color-light, #E4E7ED);
            display: flex;
            align-items: center;
        }
        .section-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 14px;
            background-color: var(--el-color-primary);
            margin-right: 8px;
            border-radius: 2px;
        }
        .detail-row {
            margin-bottom: 16px;
        }
        .detail-label {
            color: #909399;
            font-size: 13px;
            margin-bottom: 6px;
            display: block;
        }
        .detail-value {
            color: #303133;
            font-size: 14px;
            padding: 6px 10px;
            background-color: #f8f9fa;
            border-radius: 4px;
            border: 1px solid #e4e7ed;
            min-height: 20px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 搜索区（上层独立卡片） -->
        <div class="content-card" style="height: auto; margin-bottom: 16px; padding-bottom: 0;">
            <div class="search-area">
                <template v-if="mainTab === 'shipping'">
                    <div class="search-item">
                        <el-input v-model="searchForm.contact" placeholder="联系人" clearable style="width: 200px;"></el-input>
                    </div>
                    <div class="search-item">
                        <el-input v-model="searchForm.phone" placeholder="联系电话" clearable style="width: 200px;"></el-input>
                    </div>
                    <div>
                        <el-button class="btn-search-primary" @click="handleSearch">
                            <el-icon style="margin-right: 4px;"><Search /></el-icon>查询
                        </el-button>
                        <el-button class="btn-search-reset" @click="resetSearch">
                            <el-icon style="margin-right: 4px;"><RefreshRight /></el-icon>重置
                        </el-button>
                    </div>
                    <div style="margin-left: auto;">
                        <el-button type="success" @click="handleAdd">新增收货地址</el-button>
                    </div>
                </template>
                <template v-else>
                    <div class="search-item">
                        <el-input v-model="pickupSearch.contact" placeholder="联系人" clearable style="width: 200px;"></el-input>
                    </div>
                    <div class="search-item">
                        <el-input v-model="pickupSearch.phone" placeholder="联系电话" clearable style="width: 200px;"></el-input>
                    </div>
                    <div>
                        <el-button class="btn-search-primary" @click="handlePickupSearch">
                            <el-icon style="margin-right: 4px;"><Search /></el-icon>查询
                        </el-button>
                        <el-button class="btn-search-reset" @click="resetPickupSearch">
                            <el-icon style="margin-right: 4px;"><RefreshRight /></el-icon>重置
                        </el-button>
                    </div>
                    <div style="margin-left: auto;">
                        <el-button type="success" @click="handlePickupAdd">新增取件地址</el-button>
                    </div>
                </template>
            </div>
        </div>

        <!-- 内容区（下层卡片：Tab + 表格） -->
        <div class="content-card" style="height: calc(100vh - 106px);">
            <el-tabs v-model="mainTab">
                <!-- ===== 收货地址管理 ===== -->
                <el-tab-pane label="收货地址管理" name="shipping">
                    <el-tabs v-model="activeTab" @tab-click="handleTabClick">
                        <el-tab-pane label="待审核" name="待审核"></el-tab-pane>
                        <el-tab-pane label="已通过" name="已通过"></el-tab-pane>
                        <el-tab-pane label="已拒绝" name="已拒绝"></el-tab-pane>
                        <el-tab-pane label="全部" name="全部"></el-tab-pane>
                    </el-tabs>
                    <div class="table-container">
                        <el-table :data="tableData" border height="100%" style="width: 100%">
                            <el-table-column prop="contact" label="联系人" min-width="120"></el-table-column>
                            <el-table-column prop="phone" label="联系电话" min-width="150"></el-table-column>
                            <el-table-column prop="country" label="国家" min-width="100"></el-table-column>
                            <el-table-column prop="state" label="省/州" min-width="100"></el-table-column>
                            <el-table-column prop="city" label="城市" min-width="120"></el-table-column>
                            <el-table-column prop="zip" label="邮编" min-width="100"></el-table-column>
                            <el-table-column prop="address" label="详细地址" min-width="200" show-overflow-tooltip></el-table-column>
                            <el-table-column prop="status" label="审核状态" min-width="100" align="center">
                                <template #default="scope">
                                    <el-tag :type="scope.row.status === '已通过' ? 'success' : (scope.row.status === '待审核' ? 'warning' : 'danger')">
                                        {{ scope.row.status === '待审核' ? '未审核' : (scope.row.status === '已通过' ? '已审核' : scope.row.status) }}
                                    </el-tag>
                                </template>
                            </el-table-column>
                            <el-table-column label="操作" width="120" fixed="right" align="center">
                                <template #default="scope">
                                    <el-button v-if="scope.row.status === '待审核' || scope.row.status === '已通过'" link type="primary" size="small" @click="handleView(scope.row)">查看</el-button>
                                    <el-button v-if="scope.row.status === '已拒绝'" link type="primary" size="small" @click="handleEdit(scope.row)">编辑</el-button>
                                </template>
                            </el-table-column>
                        </el-table>
                    </div>
                    <div class="pagination-area">
                        <el-pagination background layout="total, prev, pager, next" :total="total"></el-pagination>
                    </div>
                </el-tab-pane>

                <!-- ===== 取件地址管理 ===== -->
                <el-tab-pane label="取件地址管理" name="pickup">
                    <div class="table-container">
                        <el-table :data="pickupTableData" border height="100%" style="width: 100%">
                            <el-table-column prop="contact" label="联系人" min-width="120"></el-table-column>
                            <el-table-column prop="phone" label="联系电话" min-width="150"></el-table-column>
                            <el-table-column prop="country" label="国家" min-width="100"></el-table-column>
                            <el-table-column prop="state" label="省/州" min-width="100"></el-table-column>
                            <el-table-column prop="city" label="城市" min-width="120"></el-table-column>
                            <el-table-column prop="zip" label="邮编" min-width="100"></el-table-column>
                            <el-table-column prop="address" label="详细地址" min-width="200" show-overflow-tooltip></el-table-column>
                            <el-table-column prop="source" label="数据来源" min-width="110" align="center">
                                <template #default="scope">
                                    <el-tag :type="scope.row.source === '入驻带入' ? 'primary' : 'warning'" size="small">{{ scope.row.source }}</el-tag>
                                </template>
                            </el-table-column>
                            <el-table-column label="操作" width="100" fixed="right" align="center">
                                <template #default="scope">
                                    <el-button link type="primary" size="small" @click="handlePickupEdit(scope.row)">编辑</el-button>
                                </template>
                            </el-table-column>
                        </el-table>
                    </div>
                    <div class="pagination-area">
                        <el-pagination background layout="total, prev, pager, next" :total="pickupTotal"></el-pagination>
                    </div>
                </el-tab-pane>
            </el-tabs>
        </div>

        <!-- 新增/编辑/查看弹窗 -->
        <el-dialog v-model="dialogVisible" :title="dialogTitle" width="600px" destroy-on-close>
            <!-- 针对查看模式，使用详情样式展示 -->
            <div v-if="pageMode === 'view'" class="audit-detail-section">
                <div class="section-title">收货人信息</div>
                <el-row :gutter="20" class="detail-row">
                    <el-col :span="12">
                        <span class="detail-label">联系人</span>
                        <div class="detail-value">{{ formData.contact }}</div>
                    </el-col>
                    <el-col :span="12">
                        <span class="detail-label">联系电话</span>
                        <div class="detail-value">{{ formData.phone }}</div>
                    </el-col>
                </el-row>

                <div class="section-title" style="margin-top: 20px;">地址详情</div>
                <el-row :gutter="20" class="detail-row">
                    <el-col :span="8">
                        <span class="detail-label">国家</span>
                        <div class="detail-value">{{ formData.country }}</div>
                    </el-col>
                    <el-col :span="8">
                        <span class="detail-label">省/州</span>
                        <div class="detail-value">{{ formData.state }}</div>
                    </el-col>
                    <el-col :span="8">
                        <span class="detail-label">城市</span>
                        <div class="detail-value">{{ formData.city }}</div>
                    </el-col>
                </el-row>
                <el-row :gutter="20" class="detail-row">
                    <el-col :span="8">
                        <span class="detail-label">邮编</span>
                        <div class="detail-value">{{ formData.zip }}</div>
                    </el-col>
                    <el-col :span="16">
                        <span class="detail-label">详细地址</span>
                        <div class="detail-value">{{ formData.address }}</div>
                    </el-col>
                </el-row>
            </div>
            
            <!-- 针对新增/编辑模式，使用表单展示 -->
            <el-form v-else ref="formRef" :model="formData" label-position="top">
                <div class="section-title">收货人信息</div>
                <el-row :gutter="20">
                    <el-col :span="12">
                        <el-form-item label="联系人" prop="contact" required>
                            <el-input v-model="formData.contact" placeholder="请输入联系人"></el-input>
                        </el-form-item>
                    </el-col>
                    <el-col :span="12">
                        <el-form-item label="联系电话" prop="phone" required>
                            <el-input v-model="formData.phone" placeholder="请输入联系电话"></el-input>
                        </el-form-item>
                    </el-col>
                </el-row>

                <div class="section-title" style="margin-top: 10px;">地址详情</div>
                <el-row :gutter="20">
                    <el-col :span="8">
                        <el-form-item label="国家" prop="country" required>
                            <el-select v-model="formData.country" placeholder="请选择国家" style="width:100%" @change="onCountryChange">
                                <el-option v-for="c in countryOptions" :key="c" :label="c" :value="c"></el-option>
                            </el-select>
                        </el-form-item>
                    </el-col>
                    <el-col :span="8">
                        <el-form-item label="省/州" prop="state" required>
                            <el-select v-model="formData.state" placeholder="请选择省/州" style="width:100%" filterable @change="onStateChange">
                                <el-option v-for="s in stateOptions" :key="s" :label="s" :value="s"></el-option>
                            </el-select>
                        </el-form-item>
                    </el-col>
                    <el-col :span="8">
                        <el-form-item label="城市" prop="city" required>
                            <el-select v-model="formData.city" placeholder="请选择城市" style="width:100%" filterable>
                                <el-option v-for="c in cityOptions" :key="c" :label="c" :value="c"></el-option>
                            </el-select>
                        </el-form-item>
                    </el-col>
                </el-row>
                <el-row :gutter="20">
                    <el-col :span="8">
                        <el-form-item label="邮编" prop="zip" required>
                            <el-input v-model="formData.zip" placeholder="邮编"></el-input>
                        </el-form-item>
                    </el-col>
                    <el-col :span="16">
                        <el-form-item label="详细地址" prop="address" required>
                            <el-input v-model="formData.address" placeholder="请输入详细地址"></el-input>
                        </el-form-item>
                    </el-col>
                </el-row>
            </el-form>

            <template #footer>
                <span class="dialog-footer">
                    <el-button @click="dialogVisible = false">{{ pageMode === 'view' ? '关闭' : '取消' }}</el-button>
                    <el-button v-if="pageMode !== 'view'" type="primary" @click="handleSubmit">提交</el-button>
                </span>
            </template>
        </el-dialog>
    </div>

    <script>
        const { createApp, ref, reactive, computed } = Vue;
        const { ElMessage, ElMessageBox } = ElementPlus;

        const app = createApp({
            setup() {
                // V2.3: 顶层Tab
                const mainTab = ref('shipping');

                // === 收货地址 ===
                const activeTab = ref('待审核');
                const searchForm = reactive({ contact: '', phone: '' });
                const total = ref(2);
                
                const allData = [
                    { contact: 'Greg Bailys', phone: '904-559-3808', country: 'US', state: 'FL', city: 'Jacksonville', zip: '32256', address: '7800 Bayberry Road', status: '待审核' },
                    { contact: 'Sunny', phone: '+1 (626) 838-2088', country: 'US', state: 'CA', city: 'Commerce', zip: '90040', address: '2638 Yates Ave', status: '已通过' }
                ];

                const tableData = computed(() => {
                    let data = allData;
                    if (searchForm.contact) {
                        data = data.filter(item => item.contact.includes(searchForm.contact));
                    }
                    if (searchForm.phone) {
                        data = data.filter(item => item.phone.includes(searchForm.phone));
                    }
                    if (activeTab.value === '全部') {
                        return data;
                    }
                    return data.filter(item => item.status === activeTab.value);
                });

                const handleMainTabClick = () => {};
                const handleTabClick = () => {};
                const handleSearch = () => { ElMessage.success('执行查询'); };
                const resetSearch = () => { searchForm.contact = ''; searchForm.phone = ''; };
                
                const dialogVisible = ref(false);
                const dialogTitle = ref('新增收货地址');
                const pageMode = ref('add'); // add, edit, view
                const formData = reactive({
                    contact: '', phone: '', country: '', state: '', city: '', zip: '', address: ''
                });

                // 国家-省/州-城市 级联数据（模拟 基础资料-行政区划 接口）
                const countryOptions = ['中国', '美国', '英国', '德国', '日本', '澳大利亚'];
                const regionMap = {
                    '中国': { '广东省': ['深圳市', '广州市', '东莞市'], '浙江省': ['杭州市', '宁波市', '义乌市'], '上海市': ['上海市'] },
                    '美国': { 'CA - 加利福尼亚州': ['Los Angeles', 'San Francisco', 'Commerce'], 'NJ - 新泽西州': ['Edison', 'Newark'], 'FL - 佛罗里达州': ['Jacksonville', 'Miami'] },
                    '英国': { 'England': ['London', 'Manchester'] },
                    '德国': { 'Bayern': ['München', 'Nürnberg'] },
                    '日本': { '東京都': ['東京'], '大阪府': ['大阪'] },
                    '澳大利亚': { 'NSW': ['Sydney'], 'VIC': ['Melbourne'] }
                };
                const stateOptions = ref([]);
                const cityOptions = ref([]);
                const onCountryChange = (val) => {
                    formData.state = ''; formData.city = '';
                    stateOptions.value = val ? Object.keys(regionMap[val] || {}) : [];
                    cityOptions.value = [];
                };
                const onStateChange = (val) => {
                    formData.city = '';
                    cityOptions.value = (val && formData.country && regionMap[formData.country])
                        ? (regionMap[formData.country][val] || [])
                        : [];
                };

                const resetForm = () => {
                    formData.contact = ''; formData.phone = '';
                    formData.country = ''; formData.state = ''; formData.city = ''; formData.zip = ''; formData.address = '';
                    stateOptions.value = []; cityOptions.value = [];
                };

                const handleAdd = () => {
                    resetForm();
                    pageMode.value = 'add';
                    dialogTitle.value = '新增收货地址';
                    dialogVisible.value = true;
                };

                const handleEdit = (row) => { 
                    Object.assign(formData, row);
                    pageMode.value = 'edit';
                    dialogTitle.value = '编辑收货地址';
                    dialogVisible.value = true;
                };

                const handleView = (row) => {
                    Object.assign(formData, row);
                    pageMode.value = 'view';
                    dialogTitle.value = '查看收货地址';
                    dialogVisible.value = true;
                }

                const handleSubmit = () => {
                    if (!formData.contact || !formData.phone || !formData.country || !formData.address) {
                        ElMessage.warning('请填写必填项');
                        return;
                    }
                    if (mainTab.value === 'pickup') {
                        ElMessage.success('取件地址保存成功！（无需审核）');
                    } else {
                        ElMessage.success('提交成功！');
                    }
                    dialogVisible.value = false;
                };

                // === 取件地址 ===
                const pickupSearch = reactive({ contact: '', phone: '' });
                const pickupTotal = ref(2);
                const pickupAllData = [
                    { contact: '张物流', phone: '13800138000', country: '中国', state: '广东省', city: '深圳市', zip: '518000', address: '深圳市南山区科技园路1号', source: '入驻带入' },
                    { contact: '李经理', phone: '13900139000', country: '中国', state: '浙江省', city: '义乌市', zip: '322000', address: '义乌市稠州北路888号', source: '手工新增' }
                ];
                const pickupTableData = computed(() => {
                    let data = pickupAllData;
                    if (pickupSearch.contact) data = data.filter(item => item.contact.includes(pickupSearch.contact));
                    if (pickupSearch.phone) data = data.filter(item => item.phone.includes(pickupSearch.phone));
                    return data;
                });
                const handlePickupSearch = () => { ElMessage.success('执行查询'); };
                const resetPickupSearch = () => { pickupSearch.contact = ''; pickupSearch.phone = ''; };
                const handlePickupAdd = () => {
                    resetForm();
                    formData.country = '中国';
                    onCountryChange('中国');
                    pageMode.value = 'add';
                    dialogTitle.value = '新增取件地址';
                    dialogVisible.value = true;
                };
                const handlePickupEdit = (row) => {
                    Object.assign(formData, row);
                    pageMode.value = 'edit';
                    dialogTitle.value = '编辑取件地址';
                    dialogVisible.value = true;
                };

                return {
                    mainTab,
                    activeTab, searchForm, tableData, total,
                    handleMainTabClick, handleTabClick, handleSearch, resetSearch,
                    pickupSearch, pickupTableData, pickupTotal,
                    handlePickupSearch, resetPickupSearch, handlePickupAdd, handlePickupEdit,
                    dialogVisible, dialogTitle, pageMode, formData,
                    countryOptions, stateOptions, cityOptions,
                    onCountryChange, onStateChange,
                    handleAdd, handleEdit, handleView, handleSubmit
                };
            }
        });
        
        // 注册 Element Plus 图标
        for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
            app.component(key, component);
        }
        
        app.use(ElementPlus);
        app.mount('#app');
    </script>
</body>
</html>
